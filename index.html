<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>Sprout — 英単語を育てる</title>
<meta name="description" content="単語・フレーズをメモして、単語帳として育てる英語学習アプリ" />

<!-- PWA: ホーム画面に追加して全画面で使う -->
<meta name="theme-color" content="#2F6F5E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Sprout" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="manifest" href="manifest.webmanifest" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#F6F4EE;
  --surface:#FFFFFF;
  --surface-2:#FBFAF5;
  --ink:#1F2A28;
  --ink-2:#5C6B65;
  --ink-3:#92A09A;
  --line:#E7E3D8;
  --line-2:#EFEBE1;
  --green:#2F6F5E;
  --green-d:#245446;
  --green-soft:#E4EFE9;
  --amber:#F2B33D;
  --amber-d:#D9971C;
  --amber-soft:#FBEBC9;
  --r-again:#D8654F;
  --r-hard:#E0934A;
  --r-good:#2F6F5E;
  --r-easy:#4B7BA8;
  --blue:#3A78C2;
  --blue-soft:#E1ECF8;
  --shadow:0 1px 2px rgba(31,42,40,.06), 0 6px 18px rgba(31,42,40,.06);
  --shadow-lg:0 8px 40px rgba(31,42,40,.16);
  --radius:18px;
  --radius-sm:12px;
  --tabbar-h:64px;
  --safe-b:env(safe-area-inset-bottom, 0px);
  --safe-t:env(safe-area-inset-top, 0px);
  --font-ui:'Inter',-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;
  --font-en:'Lora',Georgia,serif;
}
html[data-theme="dark"]{
  --paper:#14181A;
  --surface:#1C2123;
  --surface-2:#222829;
  --ink:#ECEAE2;
  --ink-2:#A7B0AC;
  --ink-3:#76817C;
  --line:#2E3537;
  --line-2:#262C2E;
  --green:#4FA890;
  --green-d:#3C8C77;
  --green-soft:#1E2E2A;
  --amber:#F2B33D;
  --amber-soft:#33301F;
  --blue:#6BA3E6;
  --blue-soft:#1A2533;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 18px rgba(0,0,0,.3);
  --shadow-lg:0 8px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
html{min-height:100%;background:var(--paper);}
body{
  font-family:var(--font-ui);
  background:var(--paper);
  min-height:100vh;
  min-height:100dvh;
  color:var(--ink);
  font-size:16px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  /* 合字（ﬀ ﬁ など）を無効化して、f/fi/ff を通常の字形で表示 */
  font-variant-ligatures:none;
  -webkit-font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"calt" 0;
  font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"calt" 0;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:16px;color:inherit;}
::selection{background:var(--amber-soft);}

/* ---------- App shell ---------- */
#app{max-width:680px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;}
.view{display:none;padding:calc(var(--safe-t) + 8px) 18px calc(var(--tabbar-h) + var(--safe-b) + 28px);animation:fade .25s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:6px;margin-bottom:18px;}
.thread-top{position:sticky;top:0;z-index:20;background:var(--paper);margin:calc(-1 * (var(--safe-t) + 8px)) -18px 12px;padding:calc(var(--safe-t) + 10px) 18px 10px;box-shadow:0 1px 0 var(--line);}
.topbar h1{font-family:var(--font-en);font-weight:600;font-size:1.55rem;letter-spacing:-.01em;margin:0;}
.topbar .sub{color:var(--ink-2);font-size:.82rem;margin-top:1px;}
.icon-btn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--surface);box-shadow:var(--shadow);color:var(--ink-2);transition:transform .12s,background .15s;}
.icon-btn:active{transform:scale(.92);}
.icon-btn svg{width:20px;height:20px;}

/* mark / highlighter underline signature */
.mark{position:relative;display:inline;}
.mark::after{content:"";position:absolute;left:-2px;right:-2px;bottom:1px;height:38%;background:var(--amber-soft);z-index:-1;border-radius:3px;transform:rotate(-.6deg);}
.wordmark{display:flex;align-items:center;gap:9px;}
.wordmark .logo{width:34px;height:34px;flex:none;}

/* ---------- Cards / surfaces ---------- */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
.tile{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 16px;display:flex;flex-direction:column;gap:2px;}

/* ---------- Home ---------- */
.hero{background:linear-gradient(150deg,var(--green) 0%,var(--green-d) 100%);color:#F4F1E8;border-radius:24px;padding:22px;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(36,84,70,.28);}
.hero .leafbg{position:absolute;right:-26px;top:-26px;width:170px;height:170px;opacity:.16;}
.hero .due-num{font-family:var(--font-en);font-size:3.6rem;line-height:1;font-weight:600;}
.hero .due-label{opacity:.85;font-size:.9rem;margin-top:2px;}
.hero .cta{margin-top:16px;display:inline-flex;align-items:center;gap:8px;background:#F6F4EE;color:var(--green-d);font-weight:700;padding:12px 20px;border-radius:14px;font-size:.98rem;transition:transform .12s;}
.hero .cta:active{transform:scale(.96);}
.hero .cta.muted{background:rgba(255,255,255,.16);color:#F4F1E8;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.today-card{display:flex;flex-direction:column;gap:1px;background:var(--surface);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
.today-row{display:flex;align-items:center;gap:13px;padding:16px;background:var(--surface);text-align:left;border-bottom:1px solid var(--line);position:relative;transition:background .15s;}
.today-row:last-child{border-bottom:none;}
.today-row:active{background:var(--surface-2);}
/* 未学習：左に緑のアクセントバー＋わずかに強調 */
.today-row:not(.done)::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green);border-radius:0 3px 3px 0;}
.today-ic{width:40px;height:40px;border-radius:12px;background:var(--green-soft);color:var(--green-d);display:flex;align-items:center;justify-content:center;flex:none;transition:.2s;}
.today-ic svg{width:21px;height:21px;}
/* 完了：背景を薄緑、アイコンを塗り、文字を控えめ＋取り消し線 */
.today-row.done{background:linear-gradient(90deg,var(--green-soft),var(--surface));}
.today-row.done .today-ic{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(47,111,94,.35);}
.today-tx{flex:1;}
.today-t{font-weight:700;font-size:1rem;}
.today-row.done .today-t{color:var(--ink-3);text-decoration:line-through;text-decoration-color:var(--ink-3);}
.today-s{font-size:.75rem;color:var(--ink-3);margin-top:2px;}
.today-row.done .today-s{opacity:.7;}
.today-state{flex:none;}
.td-done{display:inline-flex;align-items:center;gap:4px;color:var(--green);font-weight:800;font-size:.82rem;background:rgba(47,111,94,.12);padding:5px 11px;border-radius:999px;}
.td-done svg{width:14px;height:14px;}
.td-go{display:inline-flex;align-items:center;color:#fff;background:var(--green);font-weight:700;font-size:.84rem;padding:6px 13px;border-radius:999px;box-shadow:0 2px 8px rgba(47,111,94,.3);}
.td-none{color:var(--ink-3);font-size:.82rem;}
.save-mini{margin-top:16px;background:transparent;border:1.5px solid var(--line);color:var(--green-d);font-weight:600;font-size:.82rem;padding:8px 16px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;}
.save-mini svg{width:15px;height:15px;}
.ex-peek{margin-top:16px;width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;}
.ex-peek-sen{background:var(--green-soft);border-radius:12px;padding:10px 14px;font-family:var(--font-en);font-size:.98rem;color:var(--ink);text-align:center;width:100%;line-height:1.5;}
.ex-peek-btn{background:transparent;border:1.5px dashed var(--green);color:var(--green-d);font-weight:600;font-size:.8rem;padding:7px 16px;border-radius:999px;}
.memo-box{margin-top:14px;width:100%;text-align:left;}
.memo-lab{font-size:.78rem;color:var(--ink-3);font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.memo-lab svg{width:13px;height:13px;}
.memo-edit{width:100%;min-height:48px;resize:vertical;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;font-size:.9rem;font-family:inherit;background:var(--surface);color:var(--ink);box-sizing:border-box;}
.card-btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.save-mini:active{background:var(--green-soft);}
.streak-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.streak-barlabel{font-size:.74rem;color:var(--ink-2);margin:10px 2px 5px;}
.streak-barlabel b{color:var(--green-d);}
.th-head{font-weight:800;font-size:1.05rem;margin:2px 0 12px;}
.th-tabs{display:flex;flex-wrap:wrap;gap:6px;}
.th-tab{flex:1;min-width:54px;padding:8px 4px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-2);font-size:.8rem;font-weight:600;}
.th-tab.on{background:var(--green);border-color:var(--green);color:#fff;}
.th-readout{margin-top:12px;min-height:30px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 12px;background:var(--surface-2);border-radius:10px;}
.th-readout .th-lab{font-size:.84rem;color:var(--ink-2);font-weight:600;}
.th-readout .th-val{font-size:1rem;font-weight:800;color:var(--green-d);font-family:var(--font-en);}
.th-readout .th-hint{font-size:.74rem;color:var(--ink-3);}
.bar-chart .bar.sel .fill{background:var(--amber);}
.bar-chart .bar.sel > span{color:var(--amber-d,var(--green-d));font-weight:700;}
.qa-tile{display:flex;align-items:center;gap:11px;background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:14px;text-align:left;}
.qa-tile:active{transform:scale(.98);}
.qa-ic{width:38px;height:38px;border-radius:11px;background:var(--green-soft);color:var(--green-d);display:flex;align-items:center;justify-content:center;flex:none;}
.qa-ic svg{width:20px;height:20px;}
.qa-t{font-weight:700;font-size:.95rem;}
.qa-s{font-size:.74rem;color:var(--ink-3);margin-top:1px;}
.streak-card{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:11px 15px;margin-top:14px;border:1.5px solid transparent;}
.streak-card.done{border-color:var(--amber);background:linear-gradient(180deg,var(--amber-soft),var(--surface));}
.streak-top{display:flex;align-items:center;gap:11px;}
.streak-flame{font-size:24px;filter:grayscale(1);opacity:.45;transition:.3s;}
.streak-flame.lit{filter:none;opacity:1;animation:flamePulse 2.4s ease-in-out infinite;}
@keyframes flamePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.streak-n{font-family:var(--font-en);font-weight:700;font-size:1.85rem;line-height:1;}
.streak-n small{font-size:.62rem;color:var(--ink-3);font-weight:600;margin-left:4px;}
.streak-sub{font-size:.82rem;color:var(--ink-2);margin-top:3px;}
.streak-today{font-size:.72rem;color:var(--ink-3);margin-top:3px;}
.streak-today b,.streak-today .ok{color:var(--green-d);font-weight:700;}
.streak-bar{height:7px;border-radius:999px;background:var(--line);overflow:hidden;margin:0 0 4px;}
.streak-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--amber));border-radius:999px;transition:width .5s cubic-bezier(.2,.8,.2,1);}
.streak-note{font-size:.78rem;color:var(--ink-3);}
.streak-pop{text-align:center;animation:streakPop .5s cubic-bezier(.2,1.3,.4,1);}
.streak-pop .big-flame{font-size:54px;animation:flamePulse 1.4s ease-in-out infinite;}
@keyframes streakPop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.stat-row .tile{align-items:flex-start;padding:14px 12px;}
.stat-row .v{font-family:var(--font-en);font-size:1.6rem;font-weight:600;line-height:1;}
.stat-row .k{color:var(--ink-2);font-size:.74rem;margin-top:6px;}
.stat-row .v.flame{color:var(--amber-d);}

.section-title{font-weight:600;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:24px 4px 10px;}

.quickadd{display:flex;gap:8px;align-items:center;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px 8px 8px 16px;}
.quickadd input{flex:1;border:none;background:none;outline:none;padding:8px 0;}
.quickadd input::placeholder{color:var(--ink-3);}
.qa-btn{background:var(--green);color:#fff;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;transition:transform .12s;}
.qa-btn:active{transform:scale(.9);}
.qa-btn.alt{background:var(--amber-soft,#FBEBC9);color:var(--amber-d,#B07C26);}
.qa-btn svg{width:22px;height:22px;}
.trans-panel{margin-top:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px 15px;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.trans-panel.trans-err{color:#b3402a;font-size:.88rem;}
.trans-load{color:var(--ink-3);font-size:.9rem;}
.trans-dir{font-size:.7rem;font-weight:700;color:var(--ink-3);letter-spacing:.02em;margin-bottom:6px;}
.trans-src{font-size:.86rem;color:var(--ink-2);padding-bottom:8px;border-bottom:1px dashed var(--line);margin-bottom:8px;word-break:break-word;}
.trans-out{display:flex;align-items:flex-start;gap:8px;font-size:1.06rem;font-weight:600;color:var(--ink);word-break:break-word;}
.trans-out>span{flex:1;}
.tp-ic{flex:none;width:30px;height:30px;border-radius:9px;background:var(--green-soft);color:var(--green);display:grid;place-items:center;}
.tp-ic svg{width:17px;height:17px;}
.trans-actions{display:flex;gap:8px;margin-top:12px;}
.tp-btn{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;font-weight:700;color:var(--ink-2);background:var(--surface-2,#F0ECDF);border-radius:999px;padding:7px 13px;}
.tp-btn svg{width:15px;height:15px;}
.tp-btn:active{transform:scale(.96);}

.bar-chart{display:flex;align-items:flex-end;gap:6px;height:84px;padding:6px 2px 0;}
.chart-wrap{display:flex;align-items:flex-start;gap:7px;}
.chart-wrap .bar-chart{flex:1;}
.y-axis{display:flex;flex-direction:column;justify-content:space-between;padding:6px 0 0;font-size:.58rem;color:var(--ink-3);text-align:right;min-width:34px;box-sizing:border-box;}
.bar-chart.dense{gap:3px;}
.bar-chart.dense .bar > span{font-size:.52rem;bottom:-16px;}
.bar-chart .bar{flex:1;background:var(--green-soft);border-radius:6px 6px 3px 3px;min-height:4px;position:relative;display:flex;justify-content:center;}
.bar-chart .bar > span{position:absolute;bottom:-20px;font-size:.62rem;color:var(--ink-3);}
.bar-chart .bar .fill{position:absolute;bottom:0;left:0;right:0;background:var(--green);border-radius:6px 6px 3px 3px;}

/* ---------- Notes / tree ---------- */
.crumbs{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:.86rem;color:var(--ink-2);margin-bottom:14px;}
.crumbs button{color:var(--ink-2);padding:2px 0;}
.crumbs .here{color:var(--ink);font-weight:600;}
.crumbs .sep{color:var(--ink-3);}

.note-actions{display:flex;gap:8px;margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:.9rem;padding:10px 14px;border-radius:12px;transition:transform .12s,background .15s;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--green);color:#fff;}
.btn-ghost{background:var(--surface);box-shadow:var(--shadow);color:var(--ink);}
.btn-amber{background:var(--amber);color:#3a2e0c;}
.btn svg{width:17px;height:17px;}
.btn.full{width:100%;justify-content:center;}

.list{display:flex;flex-direction:column;gap:9px;}
.folder-row,.card-row{display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:13px 14px;transition:transform .12s;}
.folder-row:active,.card-row:active{transform:scale(.985);}
.folder-row .ico{width:38px;height:38px;border-radius:10px;background:var(--amber-soft);color:var(--amber-d);display:grid;place-items:center;flex:none;}
.folder-row .ico svg{width:20px;height:20px;}
.folder-row .meta{flex:1;min-width:0;}
.folder-row .nm{font-weight:600;}
.folder-row .ct{font-size:.76rem;color:var(--ink-3);}
.folder-row .ct.one{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-ctrls{display:flex;align-items:center;gap:6px;flex:none;}
.row-ctrls .rc{width:34px;height:34px;border-radius:9px;background:var(--surface-2);color:var(--ink-2);display:grid;place-items:center;font-size:.9rem;font-weight:700;}
.row-ctrls .rc:disabled{opacity:.3;}
.row-ctrls .rc.del{color:var(--r-again);}
.row-ctrls .rc svg{width:17px;height:17px;}
.reorderable{transition:transform .16s ease;}
.reorderable.dragging{transition:none;box-shadow:0 14px 32px rgba(0,0,0,.20);z-index:40;opacity:.98;}
.drag-handle{width:40px;height:40px;border-radius:10px;background:var(--surface-2);color:var(--ink-3);display:grid;place-items:center;flex:none;touch-action:none;cursor:grab;-webkit-user-select:none;user-select:none;}
.drag-handle:active{cursor:grabbing;background:var(--green-soft);color:var(--green);}
.drag-handle svg{width:20px;height:20px;pointer-events:none;}
.chev{color:var(--ink-3);flex:none;}

.card-row .term-wrap{flex:1;min-width:0;}
.card-row .term{font-family:var(--font-en);font-size:1.12rem;font-weight:500;line-height:1.2;}
.card-row .mean{font-size:.84rem;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-row .due-dot{width:8px;height:8px;border-radius:50%;flex:none;}
.spk{width:38px;height:38px;border-radius:10px;background:var(--green-soft);color:var(--green);display:grid;place-items:center;flex:none;transition:transform .12s;}
.ico-doc{width:38px;height:38px;border-radius:10px;background:var(--amber-soft);color:var(--amber-d);display:grid;place-items:center;flex:none;}
.ico-doc svg{width:20px;height:20px;}
.spk:active{transform:scale(.88);}
.spk svg{width:18px;height:18px;}
.tag-chip{display:inline-block;font-size:.68rem;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);padding:1px 8px;border-radius:20px;margin-right:4px;}
.pos-chip{display:inline-block;font-size:.74rem;font-weight:600;background:var(--green-soft);color:var(--green);padding:3px 11px;border-radius:20px;margin:0 6px 6px 0;}

/* card detail (read view) */
.cd-back{display:inline-flex;align-items:center;gap:5px;color:var(--ink-2);font-weight:600;font-size:.9rem;margin-bottom:12px;padding:6px 2px;}
.cd-back svg{width:18px;height:18px;}
.cd-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;}
.cd-head{display:flex;align-items:flex-start;gap:12px;}
.cd-term{flex:1;font-family:var(--font-en);font-size:2rem;font-weight:500;line-height:1.15;word-break:break-word;}
.cd-pron{color:var(--ink-2);font-size:1rem;margin-top:4px;}
.cd-pos{margin-top:14px;}
.cd-sec{margin-top:18px;}
.cd-sec > .lab{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:6px;}
.cd-sec .val{font-size:1.04rem;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.cd-ex{background:var(--surface-2);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:12px 14px;}
.cd-ex .en{font-family:var(--font-en);font-size:1.05rem;line-height:1.45;}
.cd-ex .ja{color:var(--ink-2);font-size:.9rem;margin-top:5px;}
.cd-actions{display:flex;gap:10px;margin-top:18px;}

.empty{text-align:center;color:var(--ink-3);padding:46px 20px;}
.empty svg{width:54px;height:54px;opacity:.4;margin-bottom:12px;}
.empty .t{font-weight:600;color:var(--ink-2);margin-bottom:4px;}
.empty .d{font-size:.86rem;}

.searchbar{display:flex;align-items:center;gap:9px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:10px 14px;margin-bottom:14px;}
.searchbar input{flex:1;border:none;background:none;outline:none;}
.searchbar svg{width:18px;height:18px;color:var(--ink-3);flex:none;}

/* ---------- Study ---------- */
.deck-pick{display:flex;flex-direction:column;gap:10px;}
.deck-row{display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px;transition:transform .12s;}
.deck-row:active{transform:scale(.985);}
.deck-row .meta{flex:1;}
.deck-row .nm{font-weight:600;}
.deck-row .ct{font-size:.78rem;color:var(--ink-3);}
.deck-row .badge{background:var(--green);color:#fff;font-weight:700;font-size:.82rem;min-width:30px;height:26px;padding:0 9px;border-radius:13px;display:grid;place-items:center;}
.mode-card{display:flex;align-items:center;gap:14px;background:var(--surface);box-shadow:var(--shadow);border-radius:16px;padding:16px;margin-bottom:12px;transition:transform .12s;cursor:pointer;}
.mode-card:active{transform:scale(.985);}
.mode-card .mc-ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;flex:none;}
.mode-card .mc-ic svg{width:24px;height:24px;}
.mode-card .mc-body{flex:1;min-width:0;}
.mode-card .mc-t{font-weight:700;font-size:1.05rem;}
.mode-card .mc-d{font-size:.8rem;color:var(--ink-3);margin-top:2px;}
.mode-card .badge{background:var(--green);color:#fff;font-weight:700;font-size:.82rem;min-width:30px;height:26px;padding:0 9px;border-radius:13px;display:grid;place-items:center;flex:none;}
.mode-card .badge.zero{background:var(--line);color:var(--ink-3);}
.opt-btn{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:15px 16px;margin-bottom:10px;transition:transform .12s;}
.opt-btn .ot{flex:1;}
.opt-count{flex:none;min-width:30px;text-align:center;background:var(--green-soft);color:var(--green-d);font-weight:700;font-size:.82rem;border-radius:999px;padding:3px 9px;}
.wl-num{flex:none;min-width:26px;text-align:right;color:var(--ink-3);font-weight:700;font-size:.82rem;font-variant-numeric:tabular-nums;}
.status-bar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--surface);box-shadow:var(--shadow);border-radius:12px;padding:10px 14px;margin:0 0 12px;font-size:.82rem;font-weight:600;color:var(--ink-2);}
.status-bar .sb-item{display:inline-flex;align-items:center;gap:6px;}
.status-bar .sb-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.result-actions{display:flex;gap:10px;margin-top:16px;}
.wl-group{font-weight:800;font-size:.92rem;color:var(--green-d);background:var(--green-soft);border-radius:10px;padding:7px 12px;margin:14px 0 8px;}
.wl-group:first-child{margin-top:2px;}
.wl-sticky-back{position:fixed;top:calc(var(--safe-t) + 10px);left:12px;z-index:60;display:inline-flex;align-items:center;gap:5px;background:var(--surface);color:var(--ink);font-weight:700;font-size:.85rem;border-radius:999px;padding:9px 14px 9px 11px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .18s,transform .18s;}
.wl-sticky-back.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.wl-sticky-back svg{width:17px;height:17px;}
.opt-btn:active{transform:scale(.985);}
.opt-btn .oic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;background:var(--green-soft);color:var(--green);}
.opt-btn .oic svg{width:22px;height:22px;}
.opt-btn .ot{font-weight:700;font-size:1rem;}
.opt-btn .od{font-size:.8rem;color:var(--ink-3);margin-top:2px;}
.deck-row .badge.zero{background:var(--line);color:var(--ink-3);}

.study-wrap{display:flex;flex-direction:column;min-height:calc(100dvh - var(--safe-t) - var(--safe-b) - var(--tabbar-h) - 24px);margin-bottom:-16px;}
.study-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.progress{flex:1;height:7px;background:var(--line);border-radius:4px;margin:0 12px;overflow:hidden;}
.progress > div{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
.study-count{font-size:.8rem;color:var(--ink-2);font-variant-numeric:tabular-nums;}

.flash{perspective:1600px;flex:1;display:flex;}
.flash-inner{position:relative;width:100%;transition:transform .5s cubic-bezier(.4,.1,.2,1);transform-style:preserve-3d;min-height:340px;}
.flash-inner.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border-radius:24px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;}
.face.back{transform:rotateY(180deg);justify-content:flex-start;padding-top:34px;overflow-y:auto;}
.face .face-tag{position:absolute;top:16px;left:18px;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600;}
.face .term{font-family:var(--font-en);font-size:2.5rem;font-weight:500;line-height:1.15;letter-spacing:-.01em;}
.face .pron{color:var(--ink-2);margin-top:8px;font-size:1rem;}
.face .spk-big{margin-top:20px;width:54px;height:54px;border-radius:50%;background:var(--green-soft);color:var(--green);display:grid;place-items:center;}
.face .spk-big svg{width:24px;height:24px;}
.face .tap-hint{position:absolute;bottom:18px;color:var(--ink-3);font-size:.78rem;}
.face.back .b-term{font-family:var(--font-en);font-size:1.5rem;font-weight:500;}
.face.back .b-mean{font-size:1.3rem;font-weight:600;margin-top:10px;}
.face.back .b-ex{margin-top:18px;background:var(--surface-2);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:12px 14px;text-align:left;width:100%;}
.face.back .b-ex .en{font-family:var(--font-en);font-size:1.02rem;line-height:1.4;}
.face.back .b-ex .ja{color:var(--ink-2);font-size:.88rem;margin-top:5px;}
.face.back .b-note{margin-top:14px;font-size:.88rem;color:var(--ink-2);text-align:left;width:100%;white-space:pre-wrap;}

.rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
.rate-btn{padding:12px 4px;border-radius:14px;color:#fff;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:60px;transition:transform .1s;box-shadow:var(--shadow);}
.rate-btn:active{transform:scale(.93);}
.rate-btn .lab{font-size:.86rem;}
.rate-btn .ivl{font-size:.66rem;opacity:.85;font-weight:600;}
.reveal-btn{margin-top:16px;width:100%;background:var(--green);color:#fff;font-weight:700;font-size:1.02rem;padding:16px;border-radius:16px;transition:transform .12s;box-shadow:var(--shadow);}
.reveal-btn:active{transform:scale(.97);}

.session-done{text-align:center;padding:50px 20px;}
.session-done .big{font-family:var(--font-en);font-size:2rem;font-weight:600;}
.session-done svg{width:74px;height:74px;color:var(--green);margin-bottom:14px;}

/* quiz */
.quiz-q{font-family:var(--font-en);font-size:2rem;text-align:center;font-weight:500;margin:30px 0 8px;}
.quiz-opts{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.quiz-opt{background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:18px 18px;text-align:left;font-weight:500;font-size:1.22rem;transition:transform .1s;border:2px solid transparent;}
.quiz-opt:active{transform:scale(.985);}
.quiz-opt.correct{border-color:var(--r-good);background:var(--green-soft);}
.quiz-opt.wrong{border-color:var(--r-again);background:#FBE9E5;}
html[data-theme="dark"] .quiz-opt.wrong{background:#2E1F1C;}

/* reading */
.read-tags{flex:1;text-align:center;font-size:.8rem;font-weight:700;color:var(--ink-3);}
.read-setup{padding:8px 2px;}
.rs-q{font-weight:800;font-size:.92rem;margin:18px 0 10px;}
.opt-pills{display:flex;flex-wrap:wrap;gap:9px;}
.opt-pills.lvl .opt-pill,.opt-pills.len .opt-pill{width:calc((100% - 27px)/4);flex:0 0 auto;}
.opt-pill{background:var(--surface);box-shadow:var(--shadow);border-radius:12px;padding:11px 16px;font-weight:600;font-size:.95rem;border:2px solid transparent;transition:transform .1s;display:flex;flex-direction:column;align-items:center;line-height:1.2;}
.opt-pill small{font-size:.66rem;color:var(--ink-3);font-weight:500;margin-top:2px;}
.opt-pill.sel small{color:rgba(255,255,255,.8);}
.opt-pill:active{transform:scale(.96);}
.opt-pill.sel{background:var(--green);color:#fff;border-color:var(--green);}
.read-loading{text-align:center;padding:60px 20px;color:var(--green);}
.read-loading svg{width:46px;height:46px;animation:pulse 1.3s ease-in-out infinite;}
.read-loading .big{font-weight:800;font-size:1.2rem;color:var(--ink);margin-top:14px;}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
.read-title{font-family:var(--font-en);font-size:1.4rem;font-weight:600;margin:6px 2px 4px;line-height:1.35;}
.read-hint{font-size:.74rem;color:var(--ink-3);margin:0 2px 12px;}
.read-pass{font-family:var(--font-en);font-size:1.18rem;line-height:2.05;letter-spacing:.005em;padding:2px;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.rw{cursor:pointer;border-radius:4px;padding:0 .5px;transition:background .1s;}
.rw:active,.rw.tapped{background:var(--amber-soft);box-shadow:0 0 0 2px var(--amber-soft);}
.rw.psel{background:var(--green-soft);box-shadow:0 0 0 2px var(--green-soft);}
.rd-custom{width:100%;margin-top:10px;background:var(--surface);box-shadow:var(--shadow);border-radius:13px;padding:13px 15px;font-size:1rem;border:1.5px solid var(--line);outline:none;font-family:var(--font-en);}
.rd-custom:focus{border-color:var(--green);}
.read-back{display:inline-flex;align-items:center;gap:4px;color:var(--green-d);font-weight:700;font-size:.86rem;margin-bottom:14px;background:var(--green-soft);padding:8px 14px;border-radius:999px;}
.rd-btn.speaking{background:var(--green);color:#fff;}
.read-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
.rd-btn{flex:1;min-width:88px;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--surface-2);border-radius:13px;padding:11px 6px;font-size:.78rem;font-weight:700;color:var(--ink-2);}
.rd-btn svg{width:19px;height:19px;}
.rd-btn:active{transform:scale(.97);}
.read-ja{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-top:14px;line-height:1.85;font-size:.98rem;animation:fadeIn .18s ease;}
.read-ja-lab{font-size:.7rem;font-weight:800;color:var(--ink-3);margin-bottom:6px;}
.read-pop{position:fixed;left:0;right:0;bottom:calc(var(--tabbar-h) + var(--safe-b));background:var(--surface);border-top:1px solid var(--line);box-shadow:0 -8px 26px rgba(0,0,0,.14);padding:16px 18px calc(16px + var(--safe-b));border-radius:20px 20px 0 0;z-index:45;transform:translateY(130%);visibility:hidden;transition:transform .22s cubic-bezier(.2,.8,.2,1),visibility .22s;max-width:680px;margin:0 auto;}
.read-pop.open{transform:none;visibility:visible;}
.rp-head{display:flex;align-items:center;gap:10px;}
.rp-word{flex:1;font-family:var(--font-en);font-weight:600;font-size:1.35rem;word-break:break-word;}
.rp-x{width:32px;height:32px;border-radius:50%;background:var(--surface-2);color:var(--ink-2);font-size:1.1rem;flex:none;}
.rp-mean{font-size:1.02rem;margin:8px 0 4px;min-height:1.4em;word-break:break-word;}
.rp-load{color:var(--ink-3);font-size:.92rem;}
.rp-actions{display:flex;gap:9px;margin-top:12px;}
.rp-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--surface-2);border-radius:11px;padding:11px;font-weight:700;font-size:.9rem;color:var(--ink-2);}
.rp-btn svg{width:16px;height:16px;}
.rp-btn.primary{background:var(--green);color:#fff;}
.rp-btn:disabled{opacity:.5;}

/* 瞬間英作文 (instant composition) */
.mic-btn{width:48px;height:48px;border-radius:50%;background:var(--green-soft);color:var(--green);display:grid;place-items:center;flex:none;transition:transform .12s;}
.mic-btn:active{transform:scale(.9);}
.mic-btn.listening{background:var(--r-again);color:#fff;animation:micpulse 1.1s infinite;}
.mic-btn svg{width:22px;height:22px;}
@keyframes micpulse{0%{box-shadow:0 0 0 0 rgba(192,80,64,.5)}70%{box-shadow:0 0 0 13px rgba(192,80,64,0)}100%{box-shadow:0 0 0 0 rgba(192,80,64,0)}}
.compo-kind{font-size:.72rem;color:var(--ink-3);font-weight:700;letter-spacing:.06em;margin-top:8px;}
.compo-jp{font-size:1.42rem;font-weight:600;line-height:1.55;margin:6px 0 4px;}
.compo-hint{font-size:.78rem;color:var(--ink-3);}
.compo-inrow{display:flex;align-items:flex-end;gap:10px;margin-top:18px;}
.compo-inrow textarea{flex:1;background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:13px 14px;font-family:var(--font-en);font-size:1.06rem;resize:none;min-height:48px;line-height:1.4;}
.compo-ref{margin-top:18px;background:var(--surface-2);border-left:3px solid var(--green);border-radius:0 10px 10px 0;padding:13px 15px;}
.compo-ref .lab{font-size:.72rem;color:var(--ink-3);font-weight:700;margin-bottom:5px;}
.compo-ref .en{font-family:var(--font-en);font-size:1.12rem;line-height:1.4;}
.verdict{font-size:1.7rem;font-weight:800;line-height:1;}
.verdict.o{color:var(--r-good);} .verdict.t{color:var(--amber-d);} .verdict.x{color:var(--r-again);}
.compo-fb{margin-top:14px;background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:14px 15px;font-size:.95rem;line-height:1.65;}
.compo-fb .fb-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.compo-fb .fixed{font-family:var(--font-en);background:var(--green-soft);border-radius:10px;padding:9px 12px;margin-top:8px;}
.compo-fb .alts{margin-top:9px;color:var(--ink-2);font-size:.88rem;}
.compo-fb .alts li{margin:2px 0;}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--green);animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.theme-chip{display:inline-block;background:var(--surface);box-shadow:var(--shadow);border:1.5px solid transparent;border-radius:20px;padding:9px 15px;margin:0 8px 9px 0;font-size:.88rem;font-weight:600;color:var(--ink);transition:transform .1s;}
.theme-chip:active{transform:scale(.94);border-color:var(--green);}
.sub-label{font-size:.74rem;color:var(--ink-3);font-weight:700;letter-spacing:.05em;margin:14px 0 8px;}
.compo-speak{display:flex;flex-direction:column;align-items:center;margin:30px 0 4px;}
.mic-big{width:108px;height:108px;border-radius:50%;background:var(--green-soft);color:var(--green);display:grid;place-items:center;box-shadow:0 10px 26px rgba(36,84,70,.18);transition:transform .12s;}
.mic-big:active{transform:scale(.93);}
.mic-big.listening{background:var(--r-again);color:#fff;animation:micpulse 1.1s infinite;}
.mic-big svg{width:46px;height:46px;}
.mic-cap{margin-top:13px;font-size:.92rem;color:var(--ink-2);font-weight:600;}
.compo-edit{width:100%;background:transparent;text-align:center;font-family:var(--font-en);font-size:1.16rem;margin-top:18px;padding:10px 12px;border-bottom:2px solid var(--line);}
.compo-edit:focus{border-color:var(--green);}
.compo-result-head{text-align:center;padding:12px 0 6px;}
.compo-grade{display:flex;gap:10px;margin-top:16px;}
.compo-grade .gb{flex:1;padding:15px 10px;border-radius:14px;border:2px solid var(--line);background:var(--surface);box-shadow:var(--shadow);font-weight:700;font-size:1.05rem;color:var(--ink-2);display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s;}
.compo-grade .gb:active{transform:scale(.96);}
.compo-grade .gb.sel-o{border-color:var(--r-good);background:var(--green-soft);color:var(--r-good);}
.compo-grade .gb.sel-x{border-color:var(--r-again);background:#fdecea;color:var(--r-again);}
.grade-hint{text-align:center;font-size:.78rem;color:var(--ink-3);margin-top:12px;font-weight:600;}
.speech-theme{font-size:1.25rem;font-weight:700;line-height:1.55;background:var(--surface);box-shadow:var(--shadow);border-radius:16px;padding:18px;text-align:center;margin-top:6px;}
.speech-timer{font-family:var(--font-en);font-size:2.4rem;font-weight:600;text-align:center;margin:12px 0 2px;}
.speech-input{width:100%;background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:13px 14px;font-family:var(--font-en);font-size:1.02rem;resize:none;margin-top:14px;line-height:1.4;}
.compo-result-head svg{width:48px;height:48px;color:var(--green);}
.compo-result-head .big{font-family:var(--font-en);font-size:2rem;font-weight:600;margin-top:6px;}
.compo-result-head .sub2{color:var(--ink-2);font-size:.85rem;}
.result-row{background:var(--surface);box-shadow:var(--shadow);border-radius:14px;margin-bottom:9px;overflow:hidden;}
.rr-head{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;}
.rr-meta{flex:1;min-width:0;}
.rr-jp{font-weight:600;font-size:.95rem;}
.rr-ans{font-family:var(--font-en);font-size:.82rem;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rr-detail{padding:2px 14px 14px;border-top:1px solid var(--line);}
.rr-detail .blk{margin-top:11px;}
.rr-detail .lab{font-size:.7rem;color:var(--ink-3);font-weight:700;margin-bottom:3px;}
.rr-detail .en{font-family:var(--font-en);line-height:1.4;}

/* ---------- AI ---------- */
.ai-tabs{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.ai-tabs button{flex:none;padding:8px 14px;border-radius:20px;font-size:.85rem;font-weight:600;background:var(--surface);box-shadow:var(--shadow);color:var(--ink-2);white-space:nowrap;}
.ai-tabs button.on{background:var(--green);color:#fff;}
.chat-log{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;min-height:40vh;}
.msg{max-width:86%;padding:12px 15px;border-radius:16px;font-size:.95rem;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.msg.user{align-self:flex-end;background:var(--green);color:#fff;border-bottom-right-radius:5px;}
.msg.ai{align-self:flex-start;background:var(--surface);box-shadow:var(--shadow);border-bottom-left-radius:5px;}
.msg.ai .save-card{margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:var(--amber);color:#3a2e0c;font-weight:700;font-size:.8rem;padding:7px 12px;border-radius:10px;}
.msg.ai .retry-btn{margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);color:var(--ink);font-weight:600;font-size:.82rem;padding:7px 12px;border-radius:10px;}
.msg.ai .retry-btn svg{width:15px;height:15px;}
.msg.ai .ex-list{display:flex;flex-direction:column;gap:13px;}
.msg.ai .ex-item .ex-en{font-family:var(--font-en);font-size:1.02rem;line-height:1.4;}
.msg.ai .ex-item .ex-ja{font-size:.86rem;color:var(--ink-2);margin-top:3px;}
.msg.ai .ex-item .save-card{margin-top:8px;}
.chat-input{position:sticky;bottom:calc(var(--tabbar-h) + var(--safe-b) + 8px);display:flex;gap:8px;align-items:flex-end;background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);padding:8px 8px 8px 14px;}
.chat-input textarea{flex:1;border:none;outline:none;background:none;resize:none;max-height:120px;padding:8px 0;line-height:1.4;}

.plan-badge{position:absolute;top:-9px;right:14px;background:var(--amber);color:#fff;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:999px;}

.bill-term{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:9px 4px;background:var(--surface);font-weight:600;font-size:.9rem;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink);}

.bill-term.sel{border-color:var(--green);background:var(--green-soft);color:var(--green-d);}

.cur-plan-card{background:linear-gradient(135deg,var(--green-soft),#fff);border:1.5px solid var(--green);border-radius:16px;padding:16px;margin:4px 0 6px;}

.cur-plan-card .cpc-name{font-size:1.18rem;font-weight:700;color:var(--ink-1);}
.cur-plan-card .cpc-sub{font-size:.8rem;color:var(--ink-3);margin-top:2px;}
.cur-plan-card .cpc-badge{background:var(--green-d);color:#fff;font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap;}
.cur-plan-card .cpc-ai{font-size:.84rem;color:var(--ink-2);margin-top:14px;}
.cur-plan-card .cpc-ai b{color:var(--green-d);}
.cpc-badge.cancel{background:var(--amber-d);}
.cpc-cancel-note{font-size:.78rem;color:var(--amber-d);margin-top:8px;line-height:1.5;}
.cpc-ai-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cpc-ai-reset{font-size:.74rem;color:var(--ink-3);}

.pw-wrap{position:relative;}

.sec-collapse .chev.open{transform:rotate(90deg);}

.faq-item summary::after{content:'＋';color:var(--ink-3);font-weight:400;}
.faq-item[open] summary::after{content:'－';}

.tk{white-space:normal;}
.tk-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.tk-row:last-child{border-bottom:none;}
.tk-k{flex:0 0 38%;font-weight:600;color:var(--ink);font-size:.84rem;}
.tk-v{flex:1;font-size:.86rem;}
.tk-note{font-size:.78rem;color:var(--ink-3);}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);box-shadow:var(--shadow);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:9px;}
.set-row .l{font-weight:500;}
.set-row .d{font-size:.78rem;color:var(--ink-3);margin-top:2px;}

.field label{display:block;font-weight:500;margin-bottom:8px;}
.field input,.field select{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px;outline:none;}
.field .d{font-size:.78rem;color:var(--ink-3);margin-top:7px;line-height:1.5;}
/* switch */
.switch{position:relative;width:48px;height:28px;flex:none;}
.switch input{opacity:0;width:0;height:0;}
.switch .sl{position:absolute;inset:0;background:var(--line);border-radius:20px;transition:.2s;}
.switch .sl::before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.switch input:checked + .sl{background:var(--green);}
.switch input:checked + .sl::before{transform:translateX(20px);}
.slider-row input[type=range]{width:130px;accent-color:var(--green);}

/* ---------- Bottom tab bar ---------- */
.tabbar{position:fixed;bottom:0;left:0;right:0;max-width:680px;margin:0 auto;height:calc(var(--tabbar-h) + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);border-top:1px solid var(--line);display:flex;z-index:40;}

.tabbar button svg{width:23px;height:23px;}
.tabbar button.on{color:var(--green);}

.modal-close{position:absolute;top:14px;right:14px;width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:1.45rem;line-height:1;color:var(--ink-2);background:var(--surface-2);z-index:6;}
.modal-close:active{transform:scale(.92);}
.x-btn{font-size:1.6rem;width:46px;height:46px;line-height:1;}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.modal .grip{width:40px;height:5px;background:var(--line);border-radius:3px;margin:6px auto 14px;}
.modal h2{font-family:var(--font-en);font-weight:600;font-size:1.3rem;margin:0 0 4px;}
.modal .mfield{margin-bottom:13px;}

.modal .mfield input,.modal .mfield textarea,.modal .mfield select{width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;outline:none;transition:border-color .15s;}

.modal-actions{display:flex;gap:10px;margin-top:18px;}

.del-link{display:block;width:100%;text-align:center;color:var(--r-again);font-weight:600;font-size:.88rem;padding:14px;margin-top:6px;}
.key-set{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface-2);border-radius:12px;padding:11px 14px;font-size:.9rem;color:var(--ink);}

#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

const STORE_KEY = 'sprout_v1';
let state;

function defaultState(){
  return {
    folders:{}, cards:{},
    threads:[], aiThreadSeed:false,
    settings:{ aiProvider:'openai', apiKey:'', model:'gpt-4o-mini', geminiKey:'', geminiModel:'gemini-2.5-flash', dark:false, ttsRate:0.9, newPerDay:20, goal:'daily', goalLevel:'B1', goalWords:20, goalIdioms:10, goalCompo:5, reviewCap:30, srsPreset:'standard', srsMaxIvl:180, saveDestWord:'auto', saveDestIdiom:'auto', saveDestReading:'auto' },
    stats:{ reviews:{}, streak:0, lastStudy:null, time:{}, dailyCount:{date:null, words:0, idioms:0, compo:0, reviews:0} },
    history:{ compo:[], speech:[] },
    aiUsage:{ date:null, uses:0, adResets:0, proUses:0 },
    seeded:false
  };
}
function normalizeState(){
  state.settings = Object.assign(defaultState().settings, state.settings || {});
  if(!state.stats) state.stats = defaultState().stats;
  if(!state.stats.time || typeof state.stats.time!=='object') state.stats.time={};
  if(!state.stats.dailyCount || typeof state.stats.dailyCount!=='object') state.stats.dailyCount={date:null,words:0,idioms:0,compo:0,reviews:0};
  if(!state.aiUsage || typeof state.aiUsage!=='object') state.aiUsage={date:null,uses:0,adResets:0,proUses:0};
  if(typeof state.stats.dailyCount.reviews!=='number') state.stats.dailyCount.reviews=0;
  if(typeof state.settings.reviewCap!=='number') state.settings.reviewCap=(typeof state.settings.reviewPerSession==='number'?Math.max(20,state.settings.reviewPerSession):30);
  if(typeof state.settings.srsPreset!=='string') state.settings.srsPreset='standard';
  if(typeof state.settings.srsMaxIvl!=='number') state.settings.srsMaxIvl=180;
  if(typeof state.settings.saveDestWord!=='string') state.settings.saveDestWord='auto';
  if(typeof state.settings.saveDestIdiom!=='string') state.settings.saveDestIdiom='auto';
  if(typeof state.settings.saveDestReading!=='string') state.settings.saveDestReading='auto';
  if(!state.settings.goalLevelAnchor) state.settings.goalLevelAnchor=state.settings.goalLevel;
  // 既存ユーザーの 単語学習／熟語学習 を 単語／熟語 にリネーム。無ければ作成
  if(state.seeded && state.folders){
    const renameMap={'単語学習':'単語','熟語学習':'熟語'};
    Object.values(state.folders).forEach(f=>{ if(f.parentId===null && renameMap[f.name]){
      // リネーム先が既にあれば重複作成しないようリネームのみ
      if(!Object.values(state.folders).some(g=>g!==f&&g.parentId===null&&g.name===renameMap[f.name])) f.name=renameMap[f.name];
    }});
    ['単語','熟語','ブックマーク'].forEach(nm=>{
      if(!Object.values(state.folders).some(f=>f.name===nm&&f.parentId===null)){
        const id=uid(); state.folders[id]={id,name:nm,parentId:null,createdAt:now()};
      }
    });
  }
  if(!state.memos || typeof state.memos!=='object') state.memos={}; // 単語/熟語へのユーザーメモ（term基準）
  if(!state.progress || typeof state.progress!=='object') state.progress = {}; // preset/idiom 学習進捗（永続SRS）
  if(!state.history || typeof state.history!=='object') state.history = {compo:[],speech:[]};
  if(!state.billing || typeof state.billing!=='object') state.billing = {plan:'free', term:null, since:null, card:null};
  if(!state.referral || typeof state.referral!=='object') state.referral = {myCode:null, usedCode:null, referredCount:0};
  if(!state.compoSrs || typeof state.compoSrs!=='object') state.compoSrs = {}; // 瞬間英作文の忘却曲線（誤答プール）
  if(!Array.isArray(state.history.compo)) state.history.compo=[];
  if(!Array.isArray(state.history.speech)) state.history.speech=[];
  if(!Array.isArray(state.threads)) state.threads = [];
  // migrate cards: tags -> pos (品詞), note -> other (その他)
  Object.values(state.cards||{}).forEach(c=>{
    if(!Array.isArray(c.pos)) c.pos = Array.isArray(c.tags) ? c.tags.slice() : [];
    if(typeof c.other !== 'string') c.other = c.note || '';
  });
}
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ state = Object.assign(defaultState(), JSON.parse(raw)); }
    else state = defaultState();
  }catch(e){ state = defaultState(); }
  normalizeState();
  save(); // persist any migrated/normalized fields
}
function save(opts){
  opts=opts||{};
  if(!opts.keepStamp) state._updatedAt = now();
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ toast('保存に失敗しました（容量超過の可能性）'); }
  if(!opts.noCloud) scheduleCloudPush();
}

async function cloudPull(){
  if(!_sb || !loggedIn()) return;
  try{
    const { data, error } = await _sb.from('sprout_state').select('data').eq('user_id',account.user.id).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      const remote = (typeof data.data==='string') ? JSON.parse(data.data) : data.data;
      const localT = state._updatedAt||0, remoteT = remote._updatedAt||0;
      if(remoteT >= localT){
        state = Object.assign(defaultState(), remote);
        normalizeState();
        save({keepStamp:true, noCloud:true});
        rerenderActive();
        toast('クラウドから同期しました');
      } else {
        await cloudPush();
      }

    }
    _lastSync=now(); renderSettings();
  }catch(e){ /* ignore network errors */ }

/* ---------- generic drag-to-reorder (pointer: touch+mouse) ---------- */
let _drag=null;
function bindReorder(container, onReorder){
  if(!container) return;
  container.querySelectorAll('.drag-handle').forEach(h=>{
    h.addEventListener('pointerdown', e=>reorderStart(e, container, onReorder));
  });
}
function reorderStart(e, container, onReorder){
  const row=e.target.closest('.reorderable'); if(!row) return;
  e.preventDefault(); e.stopPropagation();
  const rows=[...container.querySelectorAll('.reorderable')];
  const rects=rows.map(r=>r.getBoundingClientRect());
  const fromIndex=rows.indexOf(row);
  _drag={ container, row, rows, rects, onReorder, fromIndex, count:fromIndex,
          startY:e.clientY, pid:e.pointerId, h:e.target,
          gap:(rects[fromIndex]?rects[fromIndex].height:48)+9 };
  row.classList.add('dragging');
  try{ e.target.setPointerCapture(e.pointerId); }catch(_){}
  e.target.addEventListener('pointermove', reorderMove);
  e.target.addEventListener('pointerup', reorderEnd);
  e.target.addEventListener('pointercancel', reorderEnd);
}
function reorderMove(e){
  if(!_drag) return;
  const d=_drag;
  d.row.style.transform=`translateY(${e.clientY-d.startY}px) scale(1.03)`;
  let count=0; const y=e.clientY;
  d.rects.forEach(r=>{ if(y > r.top + r.height/2) count++; });
  d.count=count;
  const insertAt = count>d.fromIndex ? count-1 : count;
  d.rows.forEach((r,i)=>{
    if(r===d.row) return;
    let shift=0;
    if(d.fromIndex<insertAt && i>d.fromIndex && i<=insertAt) shift=-d.gap;
    else if(d.fromIndex>insertAt && i>=insertAt && i<d.fromIndex) shift=d.gap;
    r.style.transform = shift?`translateY(${shift}px)`:'';
  });
}
function reorderEnd(){
  if(!_drag) return;
  const d=_drag; _drag=null;
  d.row.classList.remove('dragging');
  d.rows.forEach(r=>{ r.style.transform=''; });
  try{ d.h.releasePointerCapture(d.pid); }catch(_){}
  d.h.removeEventListener('pointermove', reorderMove);
  d.h.removeEventListener('pointerup', reorderEnd);
  d.h.removeEventListener('pointercancel', reorderEnd);
  const ids=d.rows.map(r=>r.dataset.rid);
  const item=ids.splice(d.fromIndex,1)[0];
  let insertAt = d.count>d.fromIndex ? d.count-1 : d.count;
  insertAt=Math.max(0, Math.min(ids.length, insertAt));
  ids.splice(insertAt,0,item);
  d.onReorder(ids);
}

function idiomStudyPool(catId,lvlId){
  const cat=IDIOM_LIB.find(c=>c.id===catId); if(!cat) return [];
  const lv=cat.levels.find(l=>l.id===lvlId); if(!lv) return [];
  return lv.items.map(raw=>{ const o=idiomItem(raw,cat.fmt==='choice'?'choice':'fill');

// レベルID（大小文字無視）でのインデックス・近い順
function lvIdx(levels, lv){ const L=String(lv).toLowerCase(); return levels.findIndex(x=>String(x).toLowerCase()===L); }
function nearestLevels(levels, cur){ const i=lvIdx(levels,cur); if(i<0) return levels.slice(); return levels.slice().sort((a,b)=>Math.abs(lvIdx(levels,a)-i)-Math.abs(lvIdx(levels,b)-i)); }
function levelIdsFor(goalId){ const c=PRESET_LIB.find(x=>x.id===goalId)||IDIOM_LIB.find(x=>x.id===goalId); return c?c.levels.map(l=>l.id):[]; }
function goalAnchor(){ return state.settings.goalLevelAnchor || state.settings.goalLevel; }
function toSettingLevel(goalId, presetLvId){ const arr=GOAL_LEVELS[goalId]||[]; const m=arr.find(x=>String(x[0]).toLowerCase()===String(presetLvId).toLowerCase()); return m?m[0]:presetLvId; }
// 自分の目標で許可するレベル：設定（アンカー）から下は1段まで（合わなすぎを防ぐ）。上は無制限。近い順。
function allowedGoalLevels(){
  const goal=state.settings.goal; const levels=levelIdsFor(goal); const anchor=goalAnchor();
  const ai=lvIdx(levels, anchor); if(ai<0) return nearestLevels(levels, anchor);
  const floor=Math.max(0, ai-1);
  return nearestLevels(levels.filter((_,i)=>i>=floor), anchor);
}
function hasUnlearned(goalId, lvId){
  const pcat=PRESET_LIB.find(c=>c.id===goalId), icat=IDIOM_LIB.find(c=>c.id===goalId);
  return (pcat && presetPool(goalId,lvId).some(p=>p.srs.state==='new')) || (icat && idiomStudyPool(goalId,lvId).some(p=>p.srs.state==='new'));
}
// 設定レベルの教材が終わったら、許可範囲で近いレベルへ「実際に変更」（表示も更新）
function syncGoalLevel(){
  if(!state.settings.goalLevelAnchor) state.settings.goalLevelAnchor=state.settings.goalLevel;
  const goal=state.settings.goal; let target=null;
  for(const lv of allowedGoalLevels()){ if(hasUnlearned(goal,lv)){ target=lv; break; } }
  if(target){ const setLv=toSettingLevel(goal,target); if(setLv!==state.settings.goalLevel){ state.settings.goalLevel=setLv; save(); } }
  return state.settings.goalLevel;
}
// 単語・熟語を「同時に終わる」比率で need 個取り出す
function balancedPick(unW, unI, need){
  const tw=unW.length, ti=unI.length, tot=tw+ti; if(tot===0||need<=0) return [];
  let wantW = ti===0?need : tw===0?0 : Math.round(need*tw/tot);
  wantW=Math.min(wantW,tw); let wantI=Math.min(need-wantW,ti);
  if(wantW+wantI<need){ if(wantW<tw) wantW=Math.min(tw,need-wantI); else wantI=Math.min(ti,need-wantW); }
  return shuffle(unW.slice()).slice(0,wantW).concat(shuffle(unI.slice()).slice(0,wantI));
}
// 単語と熟語を交互気味に並べる
function interleaveWI(arr){ const w=arr.filter(x=>!(x.pos&&x.pos.indexOf('熟語')>=0)); const i=arr.filter(x=>x.pos&&x.pos.indexOf('熟語')>=0); const out=[]; const ratio=i.length?Math.max(1,Math.round(w.length/i.length)):Infinity; let wi=0,ii=0,c=0; while(wi<w.length||ii<i.length){ if(ii<i.length && (c>=ratio || wi>=w.length)){ out.push(i[ii++]); c=0; } else if(wi<w.length){ out.push(w[wi++]); c++; } } return out; }

  const N=10; syncGoalLevel();
  // 優先順位：ユーザー設定の目標 → 日常会話 → ビジネス → TOEIC → TOEFL → 英検
  const order=[state.settings.goal,'daily','business','toeic','toefl','eiken'].filter((g,i,a)=>a.indexOf(g)===i);
  let items=[];
  for(const g of order){
    if(items.length>=N) break;
    const pcat=PRESET_LIB.find(c=>c.id===g), icat=IDIOM_LIB.find(c=>c.id===g);
    const levels = (g===state.settings.goal)? allowedGoalLevels() : levelIdsFor(g);
    for(const lvId of levels){
      if(items.length>=N) break;
      const unW = pcat ? presetPool(g,lvId).filter(p=>p.srs.state==='new') : [];
      const unI = icat ? idiomStudyPool(g,lvId).filter(p=>p.srs.state==='new') : [];
      items=items.concat(balancedPick(unW, unI, N-items.length));
    }
  }
  // すべてのプリセットが学習済み → AI生成（単語7：熟語3）
  if(items.length<N && aiReady()){
    const need=N-items.length; const wN=Math.round(need*0.7), iN=need-wN;
    toast('AIが問題を生成中…');
    const [gw,gi]=await Promise.all([aiGenWords(wN), aiGenIdioms(iN)]);
    items=items.concat(gw,gi);
  }
  // 最終手段：復習可能カード
  if(items.length===0){ const p=reviewablePool(); const sel=selectItems(p,'srs'); if(!sel.length){ toast('学習できる単語・熟語がありません。設定で学習目的を選ぶか、単語を追加しましょう'); return; } items=sel; }
  items=interleaveWI(items).slice(0,N);
  setTab('study'); startTimer();
  session={ items, qi:0, total:items.length, flipped:false, results:[], openIdx:null, catName:'本日の単語・熟語', style:'srs', fromHome:true, daily:'words' };
  renderStudySession();
}

const EXAM_TO_CEFR={ t1:'a2',t2:'b1',t3:'b2',t4:'c1', e1:'a2',e2:'b1',e3:'b2',e4:'c1', f1:'b1',f2:'b2',f3:'c1',f4:'c1' };

  return EXAM_TO_CEFR[lv] || 'b1'; // 試験系→対応CEFR

async function quickCompo3(){

// ワンタップでカード（受信箱）に保存：学習中・プリセット・瞬間英作文から
// 保存先フォルダの決定
function ensureFolder(name){
  let f=Object.values(state.folders).find(x=>x.name===name&&x.parentId===null);
  if(!f){ const id=uid(); state.folders[id]={id,name,parentId:null,createdAt:now()}; f=state.folders[id]; }
  return f;
}
function isIdiomTerm(o){
  if(o&&Array.isArray(o.pos)&&o.pos.some(p=>/熟語|句動詞|イディオム/.test(String(p)))) return true;
  const t=String((o&&o.term)||'').trim();
  return t.split(/\s+/).filter(Boolean).length>=2; // スペース区切りで2語以上＝熟語（ハイフン連結語は1語＝単語）
}
// kind: 'word' | 'idiom' | 'reading' | 'inbox'
function resolveSaveFolder(kind,o){
  const s=state.settings;
  let pref;
  if(kind==='word')    pref=s.saveDestWord;
  else if(kind==='idiom')   pref=s.saveDestIdiom;
  else if(kind==='reading') pref=s.saveDestReading;
  else pref='inbox';
  // 明示フォルダ指定（存在すれば）
  if(pref && pref!=='auto' && pref!=='inbox'){ const f=state.folders[pref]; if(f) return f; }
  if(pref==='inbox') return ensureFolder('受信箱');
  // auto（または未指定）：語数/品詞で単語/熟語に振り分け
  if(kind==='word')  return ensureFolder('単語');
  if(kind==='idiom') return ensureFolder('熟語');
  // reading / その他
  return ensureFolder(isIdiomTerm(o)?'熟語':'単語');
}
function saveDestOptions(cur, kind){
  const autoLabel = kind==='word'?'単語（自動）':kind==='idiom'?'熟語（自動）':'自動（語数で判定）';
  let html=`<option value="auto" ${(!cur||cur==='auto')?'selected':''}>${autoLabel}</option>`;
  html+=`<option value="inbox" ${cur==='inbox'?'selected':''}>受信箱</option>`;
  // 上位フォルダ一覧（受信箱以外）
  Object.values(state.folders).filter(f=>f.parentId===null && f.name!=='受信箱')
    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0))
    .forEach(f=>{ html+=`<option value="${f.id}" ${cur===f.id?'selected':''}>${esc(f.name)}</option>`; });
  return html;
}
function saveItemAsCard(o,kind){
  if(!o||!o.term){ toast('保存できる内容がありません'); return; }
  const exists=Object.values(state.cards).some(c=>c.type!=='text' && String(c.term||'').toLowerCase()===String(o.term).toLowerCase());
  if(exists){ toast('「'+o.term+'」は既に保存済みです'); return; }
  const dest=resolveSaveFolder(kind||'inbox',o);
  const id=uid();
  state.cards[id]={id,folderId:dest.id,term:String(o.term),pron:o.pron||'',mean:o.mean||'',exEn:o.exEn||'',exJa:o.exJa||'',other:o.other||'',pos:Array.isArray(o.pos)?o.pos:[],

let currentFolder=null;
let noteSearch='';
let noteSearchActive=false;
let currentCardView=null; // card id when viewing detail
let noteEditMode=false;

function renderNotes(){
  const v=document.getElementById('view-notes');
  // card detail (read) view
  if(currentCardView && state.cards[currentCardView]){ noteEditMode=false; renderCardDetail(v); return; }
  currentCardView=null;

  // breadcrumbs (display only — not tappable)
  const trail=[]; let f = currentFolder?state.folders[currentFolder]:null;
  while(f){ trail.unshift(f); f=f.parentId?state.folders[f.parentId]:null; }
  const crumbs = `<div class="crumbs"><span class="${currentFolder?'':'here'}">ノート</span>${trail.map((t,i)=>`<span class="sep">›</span><span class="${i===trail.length-1?'here':''}">${esc(t.name)}</span>`).join('')}</div>`;

  const folders=childFolders(currentFolder);
  const cards=folderCards(currentFolder);
  const hasItems = folders.length+cards.length>0;
  if(noteSearch) noteEditMode=false;

  let body;
  if(noteSearch){
    const q=noteSearch.toLowerCase();
    const hits=Object.values(state.cards).filter(c=>{
      const hay = c.type==='text'
        ? (c.title||'')+(c.body||'')+(c.en||'')+(c.enFixed||'')+(c.ja||'')+(c.diaryDate||'')
        : (c.term||'')+(c.mean||'')+(c.exEn||'')+(c.exJa||'')+((c.pos||[]).join(''))+(c.other||'');
      return hay.toLowerCase().includes(q);
    });
    body = hits.length? `<div class="list">${hits.map(cardRow).join('')}</div>` :
      `<div class="empty">${I.search}<div class="t">見つかりません</div><div class="d">別のキーワードで試してください</div></div>`;
  } else if(!hasItems){
    body=`<div class="empty">${I.inbox}<div class="t">まだ空です</div><div class="d">右上の「追加」から<br>フォルダやカードを作成しましょう</div></div>`;
  } else if(noteEditMode){
    body=`
      ${folders.length?`<div class="list" id="folderList">${folders.map(folderRowEdit).join('')}</div>`:''}
      ${cards.length?`<div class="list" id="cardList" style="margin-top:${folders.length?'10px':'0'}">${cards.map(cardRowEdit).join('')}</div>`:''}
      <div style="text-align:center;color:var(--ink-3);font-size:.74rem;margin-top:14px">右の ⠿ を長押しドラッグで並び替え・行をタップで名前変更</div>`;
  } else {
    body=`<div class="list">
      ${folders.map(folderRow).join('')}
      ${cards.map(cardRow).join('')}
    </div>`;
  }

  const atRoot = !currentFolder;
  v.innerHTML=`
    <div class="topbar"><h1>ノート</h1></div>
    <div class="searchbar">${I.search}<input placeholder="単語・意味・品詞を検索" value="${esc(noteSearch)}" onfocus="noteSearchActive=true" oninput="noteSearch=this.value;renderNotes()" />${noteSearch?`<button onclick="noteSearch='';noteSearchActive=false;renderNotes()" style="color:var(--ink-3)">✕</button>`:''}</div>
    ${noteSearch?'':`<div class="note-actions">
      ${noteEditMode
        ? `<button class="btn btn-primary" onclick="noteEditMode=false;renderNotes()">完了</button>`
        : `<button class="btn btn-ghost" onclick="goUpFolder()" ${atRoot?'disabled style="opacity:.4"':''}>${I.back} 戻る</button>`}
      <div style="flex:1"></div>
      ${(hasItems&&!noteEditMode)?`<button class="btn btn-ghost" onclick="noteEditMode=true;renderNotes()">編集</button>`:''}
      <button class="btn btn-primary" onclick="openAddMenu()">${I.plus} 追加</button>
    </div>`}
    ${(noteSearch||noteEditMode)?'':crumbs}
    ${body}`;
  const si=v.querySelector('.searchbar input'); if((noteSearch||noteSearchActive)&&si){ si.focus(); si.setSelectionRange(si.value.length,si.value.length); }
  if(noteEditMode && !noteSearch){
    bindReorder(document.getElementById('folderList'), commitFolderOrder);
    bindReorder(document.getElementById('cardList'), commitCardOrder);
  }
}
function folderRowEdit(f){
  const cnt=cardsInTree(f.id).length, sub=childFolders(f.id).length;
  return `<div class="folder-row reorderable" data-rid="${f.id}">
    <div class="ico">${I.folder}</div>
    <div class="meta" style="cursor:pointer" onclick="editFolder('${f.id}')"><div class="nm">${esc(f.name)}</div><div class="ct">${cnt}枚${sub?` ・ ${sub}フォルダ`:''}・タップで編集</div></div>
    <div class="row-ctrls">
      <button class="rc del" onclick="deleteFolder('${f.id}')" aria-label="削除">${I.trash}</button>
      <button class="rc" onclick="openMoveTo('${f.id}','folder')" aria-label="移動">${I.movef}</button>

  </div>`;
}
function cardRowEdit(c){
  const isText=c.type==='text';
  const tap = isText ? (c.diary?`editDiary('${c.id}')`:(c.memo?`editMemo('${c.id}')`:`editText('${c.id}')`)) : `editCard('${c.id}')`;
  const title = isText?(c.diary?(esc(c.title)||'(無題)'):(c.memo?(esc((c.body||'').slice(0,30))||'(空のメモ)'):(esc(c.title)||'(無題)'))):esc(c.term);
  const sub = isText
    ? (c.diary?('📔 英語日記 ・ '+esc(c.diaryDate||''))
      : (c.memo?'メモ'
        : (esc((c.body||'').slice(0,40))||'<span style=color:var(--ink-3)>本文なし</span>')))
    : (esc(c.mean)||'<span style=color:var(--ink-3)>意味は未入力</span>');
  return `<div class="card-row reorderable" data-rid="${c.id}">
    <div class="term-wrap" style="cursor:pointer" onclick="${tap}">
      <div class="term"${isText?' style="font-family:var(--font-jp);font-size:1rem"':''}>${title}</div>
      <div class="mean">${sub}</div>
    </div>

      <button class="rc del" onclick="deleteCard('${c.id}')" aria-label="削除">${I.trash}</button>
      <button class="rc" onclick="openMoveTo('${c.id}','card')" aria-label="移動">${I.movef}</button>
      <div class="drag-handle" aria-label="並び替え">${I.grip}</div>
    </div>
  </div>`;
}
function folderDepth(fid){ let d=0,f=state.folders[fid]; while(f&&f.parentId){ d++; f=state.folders[f.parentId]; } return d; }
function openMoveTo(id, kind){
  const exclude = kind==='folder' ? new Set(descendantFolderIds(id)) : new Set();
  const curParent = kind==='folder' ? (state.folders[id]&&state.folders[id].parentId) : (state.cards[id]&&state.cards[id].folderId);
  const all=Object.values(state.folders).filter(f=>!exclude.has(f.id)).sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  // order folders so each appears under its parent (simple: sort by full path)
  const path=f=>{ let names=[],x=f; while(x){ names.unshift(x.name); x=x.parentId?state.folders[x.parentId]:null; } return names.join(' › '); };
  all.sort((a,b)=>path(a).localeCompare(path(b),'ja'));
  const rowH=(val,label,depth,disabled)=>`<div class="deck-row" ${disabled?'style="opacity:.4;pointer-events:none"':`onclick="doMoveTo('${id}','${kind}','${val}')"`}>
      <div class="ico" style="width:34px;height:34px;border-radius:9px;background:var(--green-soft);color:var(--green);display:grid;place-items:center;margin-left:${depth*14}px">${I.folder}</div>
      <div class="meta"><div class="nm">${esc(label)}</div></div>${val===(curParent||'')?'<span style="color:var(--ink-3);font-size:.8rem">現在地</span>':`<span class="chev">${I.chev}</span>`}</div>`;
  const list=[ rowH('', '最上位（ルート）', 0, (curParent||'')==='') ]
    .concat(all.map(f=>rowH(f.id, f.name, folderDepth(f.id), f.id===(curParent||'') )));
  openModal(`
    <h2>移動先を選ぶ</h2>
    <p class="d" style="margin:0 0 12px;font-size:.85rem">${kind==='folder'?'フォルダ':'カード'}「${esc(kind==='folder'?(state.folders[id]&&state.folders[id].name):(state.cards[id]&&(state.cards[id].term||state.cards[id].title||'カード')))}」の移動先フォルダを選んでください。</p>
    <div class="deck-pick" style="max-height:50vh;overflow:auto">${list.join('')}</div>
    <div class="modal-actions" style="margin-top:14px"><button class="btn btn-ghost" onclick="closeModal()">キャンセル</button></div>`);
}
function doMoveTo(id, kind, dest){
  const target = dest || null;
  if(kind==='folder'){
    if(id===target){ toast('同じ場所です'); return; }
    if(target && descendantFolderIds(id).indexOf(target)>=0){ toast('自分の中には移動できません'); return; }
    if(!state.folders[id]) return;
    state.folders[id].parentId=target; state.folders[id].order=null;
  } else {
    if(!state.cards[id]) return;
    state.cards[id].folderId=target; state.cards[id].order=null;
  }
  save(); closeModal(); renderNotes(); toast('移動しました');
}

/* ---------- folder modal ---------- */
function editFolder(id){
  const f=id?state.folders[id]:null;
  openModal(`
    <h2>${f?'フォルダを編集':'新しいフォルダ'}</h2>
    <div class="mfield"><label>名前</label><input id="fName" value="${f?esc(f.name):''}" placeholder="例：ビジネス英語" /></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveFolder('${id||''}')">${f?'保存':'作成'}</button>
    </div>
    ${f?`<button class="del-link" onclick="deleteFolder('${id}')">このフォルダを削除</button>`:''}
  `);
  setTimeout(()=>document.getElementById('fName').focus(),250);
}
function saveFolder(id){
  const name=document.getElementById('fName').value.trim();
  if(!name){ toast('名前を入力してください'); return; }
  if(id){ state.folders[id].name=name; }
  else { const nid=uid(); state.folders[nid]={id:nid,name,parentId:currentFolder,createdAt:now()}; }
  save(); closeModal(); renderNotes(); toast('保存しました');
}
function deleteFolder(id){
  const cnt=cardsInTree(id).length;
  if(!confirm(`「${state.folders[id].name}」と中身（${cnt}枚のカード）を削除しますか？`)) return;
  descendantFolderIds(id).forEach(fid=>{
    Object.values(state.cards).filter(c=>c.folderId===fid).forEach(c=>delete state.cards[c.id]);
    delete state.folders[fid];
  });
  save(); closeModal(); renderNotes(); toast('削除しました');
}

/* ---------- card modal ---------- */
function inboxFolderId(){ const f=Object.values(state.folders).find(x=>x.name==='受信箱'&&x.parentId===null); return f?f.id:null; }
function getWordFolderId(){ return ensureFolder('単語').id; }
function getIdiomFolderId(){ return ensureFolder('熟語').id; }
function ensureFolderOption(sel,id,name){ if(sel && ![...sel.options].some(o=>o.value===id)){ const o=document.createElement('option'); o.value=id; o.textContent=name; sel.appendChild(o); } }
function editCard(id, prefill){
  const c = id?state.cards[id]:(prefill||{});
  let defFolder = c.folderId||currentFolder;
  const ib=inboxFolderId();
  if(c.id && ib && c.folderId===ib && (c.mean||'').trim()){ defFolder=getWordFolderId(); } // inbox item that now has meaning -> 単語
  if(!id && prefill && prefill.term && !defFolder){ defFolder = isIdiomTerm(prefill)?getIdiomFolderId():getWordFolderId(); } // 新規（読み上げ/AI/翻訳）は語数で単語/熟語へ
  const folderOpts = folderSelectOptions(defFolder);
  openModal(`
    <h2>${id?'カードを編集':'新しいカード'}</h2>
    <div class="mfield"><label>単語・フレーズ（英語）</label>
      <input id="cTerm" class="term-input" value="${esc(c.term)}" placeholder="reluctant" />
      ${aiEnabled()?`<button class="ai-gen-btn" id="aiGenBtn" onclick="aiFillCard()">${I.sparkle} AIで意味・例文を生成</button>`:''}
    </div>
    <div class="mfield"><label>発音（任意）</label><input id="cPron" value="${esc(c.pron)}" placeholder="/rɪˈlʌktənt/" /></div>
    <div class="mfield"><label>意味</label><textarea id="cMean" placeholder="気が進まない、しぶしぶの">${esc(c.mean)}</textarea></div>
    <div class="mfield"><label>例文（英語）</label><textarea id="cExEn" placeholder="She was reluctant to leave.">${esc(c.exEn)}</textarea></div>
    <div class="mfield"><label>例文の訳（任意）</label><textarea id="cExJa" placeholder="彼女は帰りたがらなかった。">${esc(c.exJa)}</textarea></div>
    <div class="mfield"><label>品詞（カンマ区切り・複数可）</label><input id="cPos" value="${esc((c.pos||[]).join(', '))}" placeholder="形容詞, 名詞" /></div>
    <div class="mfield"><label>その他（任意）</label><textarea id="cOther" placeholder="類似表現、別の品詞での意味、使い方のメモなど">${esc(c.other||'')}</textarea></div>
    <div class="mfield"><label>保存先フォルダ</label><select id="cFolder">${folderOpts}</select></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCard('${id||''}')">${id?'保存':'追加'}</button>
    </div>
    ${id?`<button class="del-link" onclick="deleteCard('${id}')">このカードを削除</button>`:''}
  `);
}
function folderSelectOptions(sel){
  let html='';
  const walk=(pid,depth)=>{
    childFolders(pid).forEach(f=>{
      html+=`<option value="${f.id}" ${f.id===sel?'selected':''}>${'　'.repeat(depth)}${esc(f.name)}</option>`;
      walk(f.id,depth+1);
    });
  };
  // ensure at least one folder
  if(Object.keys(state.folders).length===0){ const id=uid(); state.folders[id]={id,name:'マイ単語帳',parentId:null,createdAt:now()}; }
  walk(null,0);
  return html;
}
function saveCard(id){
  const term=document.getElementById('cTerm').value.trim();
  if(!term){ toast('単語を入力してください'); return; }
  const pos=document.getElementById('cPos').value.split(',').map(s=>s.trim()).filter(Boolean);
  const folderId=document.getElementById('cFolder').value;
  const data={
    term, pron:document.getElementById('cPron').value.trim(),
    mean:document.getElementById('cMean').value.trim(),
    exEn:document.getElementById('cExEn').value.trim(),
    exJa:document.getElementById('cExJa').value.trim(),
    other:document.getElementById('cOther').value.trim(),
    pos, folderId
  };
  if(id){ Object.assign(state.cards[id], data); }
  else { const nid=uid(); state.cards[nid]={id:nid,...data,srs:{state:'new',due:now(),interval:0,ease:2.5,reps:0,lapses:0},createdAt:now()}; }
  save(); closeModal();
  if(currentTab==='notes'){ if(id && !noteEditMode) currentCardView=id; renderNotes(); } else if(currentTab==='ai'){ renderAI(); } else renderHome();
  toast('ノートに保存しました');
}
function deleteCard(id){
  if(!confirm('このカードを削除しますか？')) return;
  delete state.cards[id]; if(currentCardView===id) currentCardView=null;
  save(); closeModal(); renderNotes(); toast('削除しました');
}

function idiomTotalCount(){ let n=0; IDIOM_LIB.forEach(c=>c.levels.forEach(l=>n+=l.items.length)); return n; }
// ===== 熟語学習：カテゴリ廃止 → 全熟語を統合した一次元プール =====
// 並びは IDIOM_LIB の順（daily→business→toeic→toefl→eiken）。新規熟語は末尾追加でグループ番号が安定する。
function idiomAllItems(){
  const out=[];
  IDIOM_LIB.forEach(cat=>cat.levels.forEach(l=>l.items.forEach(raw=>{
    const o=idiomItem(raw, cat.fmt==='choice'?'choice':'fill');
    out.push({ q:o.q, answer:o.answer, mean:o.mean });
  })));
  return out;
}
// カテゴリ・形式に依存しない安定SRSキー（フラッシュカードと4択で進捗を共有）
function idiomKeyU(it){ return 'iu|'+String((it&&it.answer)||'').toLowerCase()+'|'+String((it&&it.q)||''); }
const IDIOM_GROUP_SIZE=100;
function idiomGroupCount(){ return Math.max(1, Math.ceil(idiomAllItems().length/IDIOM_GROUP_SIZE)); }
function idiomGroupRange(g){ const all=idiomAllItems(); const start=g*IDIOM_GROUP_SIZE; const end=Math.min(all.length, start+IDIOM_GROUP_SIZE); return [start+1, end]; }
function idiomGroupItems(g){ const all=idiomAllItems(); return all.slice(g*IDIOM_GROUP_SIZE, g*IDIOM_GROUP_SIZE+IDIOM_GROUP_SIZE); }
// style選択・件数表示用（各要素 {raw, srs}）
function idiomGroupPool(g){ return idiomGroupItems(g).map(it=>({ raw:it, srs:getProg(idiomKeyU(it)) })); }
// フラッシュカード用（startStudyに渡す学習カード形状）
function idiomGroupCards(g){ return idiomGroupItems(g).map(it=>({ term:it.answer, pron:'', mean:it.mean, exEn:(it.q||'').replace('____',it.answer), exJa:'', pos:['熟語'], other:'', srs:getProg(idiomKeyU(it)) })); }
// 任意の熟語から4択問題を生成（他の熟語のanswerをダミー選択肢に）
function makeIdiomChoiceItem(it, allItems){
  const pool=(allItems||idiomAllItems()).filter(x=>String(x.answer).toLowerCase()!==String(it.answer).toLowerCase());
  const distractors=shuffle(pool.slice()).slice(0,3).map(x=>x.answer);
  const choices=shuffle([it.answer, ...distractors]);
  return { q:it.q, choices, ansIdx:choices.indexOf(it.answer), answer:it.answer, mean:it.mean, type:'choice' };
}
