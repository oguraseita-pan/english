<style>
:root{
  --paper:#F6F4EE;
  --surface:#FFFFFF;
  --surface-2:#FBFAF5;
  --ink:#1F2A28;
  --ink-2:#5C6B65;
  --ink-3:#92A09A;
  --line:#E7E3D8;
  --line-2:#EFEBE1;
  --green:#2F6F5E;
  --green-d:#245446;
  --green-soft:#E4EFE9;
  --amber:#F2B33D;
  --amber-d:#D9971C;
  --amber-soft:#FBEBC9;
  --r-again:#D8654F;
  --r-hard:#E0934A;
  --r-good:#2F6F5E;
  --r-easy:#4B7BA8;
  --shadow:0 1px 2px rgba(31,42,40,.06), 0 6px 18px rgba(31,42,40,.06);
  --shadow-lg:0 8px 40px rgba(31,42,40,.16);
  --radius:18px;
  --radius-sm:12px;
  --tabbar-h:64px;
  --safe-b:env(safe-area-inset-bottom, 0px);
  --safe-t:env(safe-area-inset-top, 0px);
  --font-ui:'Inter',-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;
  --font-en:'Fraunces',Georgia,serif;
}
html[data-theme="dark"]{
  --paper:#14181A;
  --surface:#1C2123;
  --surface-2:#222829;
  --ink:#ECEAE2;
  --ink-2:#A7B0AC;
  --ink-3:#76817C;
  --line:#2E3537;
  --line-2:#262C2E;
  --green:#4FA890;
  --green-d:#3C8C77;
  --green-soft:#1E2E2A;
  --amber:#F2B33D;
  --amber-soft:#33301F;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 18px rgba(0,0,0,.3);
  --shadow-lg:0 8px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
html{min-height:100%;background:var(--paper);}
body{
  font-family:var(--font-ui);
  background:var(--paper);
  min-height:100vh;
  min-height:100dvh;
  color:var(--ink);
  font-size:16px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:16px;color:inherit;}
::selection{background:var(--amber-soft);}

/* ---------- App shell ---------- */
#app{max-width:680px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;}
.view{display:none;padding:calc(var(--safe-t) + 8px) 18px calc(var(--tabbar-h) + var(--safe-b) + 28px);animation:fade .25s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:6px;margin-bottom:18px;}
.thread-top{position:sticky;top:0;z-index:20;background:var(--paper);margin:calc(-1 * (var(--safe-t) + 8px)) -18px 12px;padding:calc(var(--safe-t) + 10px) 18px 10px;box-shadow:0 1px 0 var(--line);}
.topbar h1{font-family:var(--font-en);font-weight:600;font-size:1.55rem;letter-spacing:-.01em;margin:0;}
.topbar .sub{color:var(--ink-2);font-size:.82rem;margin-top:1px;}
.icon-btn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--surface);box-shadow:var(--shadow);color:var(--ink-2);transition:transform .12s,background .15s;}
.icon-btn:active{transform:scale(.92);}
.icon-btn svg{width:20px;height:20px;}

/* mark / highlighter underline signature */
.mark{position:relative;display:inline;}
.mark::after{content:"";position:absolute;left:-2px;right:-2px;bottom:1px;height:38%;background:var(--amber-soft);z-index:-1;border-radius:3px;transform:rotate(-.6deg);}
.wordmark{display:flex;align-items:center;gap:9px;}
.wordmark .logo{width:34px;height:34px;flex:none;}

/* ---------- Cards / surfaces ---------- */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
.tile{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 16px;display:flex;flex-direction:column;gap:2px;}

/* ---------- Home ---------- */
.hero{background:linear-gradient(150deg,var(--green) 0%,var(--green-d) 100%);color:#F4F1E8;border-radius:24px;padding:22px;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(36,84,70,.28);}
.hero .leafbg{position:absolute;right:-26px;top:-26px;width:170px;height:170px;opacity:.16;}
.hero .due-num{font-family:var(--font-en);font-size:3.6rem;line-height:1;font-weight:600;}
.hero .due-label{opacity:.85;font-size:.9rem;margin-top:2px;}
.hero .cta{margin-top:16px;display:inline-flex;align-items:center;gap:8px;background:#F6F4EE;color:var(--green-d);font-weight:700;padding:12px 20px;border-radius:14px;font-size:.98rem;transition:transform .12s;}
.hero .cta:active{transform:scale(.96);}
.hero .cta.muted{background:rgba(255,255,255,.16);color:#F4F1E8;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.stat-row .tile{align-items:flex-start;padding:14px 12px;}
.stat-row .v{font-family:var(--font-en);font-size:1.6rem;font-weight:600;line-height:1;}
.stat-row .k{color:var(--ink-2);font-size:.74rem;margin-top:6px;}
.stat-row .v.flame{color:var(--amber-d);}

.section-title{font-weight:600;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:24px 4px 10px;}

.quickadd{display:flex;gap:8px;align-items:center;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px 8px 8px 16px;}
.quickadd input{flex:1;border:none;background:none;outline:none;padding:8px 0;}
.quickadd input::placeholder{color:var(--ink-3);}
.qa-btn{background:var(--green);color:#fff;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;transition:transform .12s;}
.qa-btn:active{transform:scale(.9);}

.bar-chart{display:flex;align-items:flex-end;gap:6px;height:84px;padding:6px 2px 0;}
.bar-chart .bar{flex:1;background:var(--green-soft);border-radius:6px 6px 3px 3px;min-height:4px;position:relative;display:flex;justify-content:center;}
.bar-chart .bar > span{position:absolute;bottom:-20px;font-size:.62rem;color:var(--ink-3);}
.bar-chart .bar .fill{position:absolute;bottom:0;left:0;right:0;background:var(--green);border-radius:6px 6px 3px 3px;}

/* ---------- Notes / tree ---------- */
.crumbs{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:.86rem;color:var(--ink-2);margin-bottom:14px;}
.crumbs button{color:var(--ink-2);padding:2px 0;}
.crumbs .here{color:var(--ink);font-weight:600;}
.crumbs .sep{color:var(--ink-3);}

.note-actions{display:flex;gap:8px;margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:.9rem;padding:10px 14px;border-radius:12px;transition:transform .12s,background .15s;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--green);color:#fff;}
.btn-ghost{background:var(--surface);box-shadow:var(--shadow);color:var(--ink);}
.btn-amber{background:var(--amber);color:#3a2e0c;}
.btn svg{width:17px;height:17px;}
.btn.full{width:100%;justify-content:center;}

.list{display:flex;flex-direction:column;gap:9px;}
.folder-row,.card-row{display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:13px 14px;transition:transform .12s;}
.folder-row:active,.card-row:active{transform:scale(.985);}
.folder-row .ico{width:38px;height:38px;border-radius:10px;background:var(--amber-soft);color:var(--amber-d);display:grid;place-items:center;flex:none;}
.folder-row .ico svg{width:20px;height:20px;}
.folder-row .meta{flex:1;min-width:0;}
.folder-row .nm{font-weight:600;}
.folder-row .ct{font-size:.76rem;color:var(--ink-3);}
.folder-row .ct.one{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-ctrls{display:flex;align-items:center;gap:6px;flex:none;}
.row-ctrls .rc{width:34px;height:34px;border-radius:9px;background:var(--surface-2);color:var(--ink-2);display:grid;place-items:center;font-size:.9rem;font-weight:700;}
.row-ctrls .rc:disabled{opacity:.3;}
.row-ctrls .rc.del{color:var(--r-again);}
.row-ctrls .rc svg{width:17px;height:17px;}
.reorderable{transition:transform .16s ease;}
.reorderable.dragging{transition:none;box-shadow:0 14px 32px rgba(0,0,0,.20);z-index:40;opacity:.98;}
.drag-handle{width:40px;height:40px;border-radius:10px;background:var(--surface-2);color:var(--ink-3);display:grid;place-items:center;flex:none;touch-action:none;cursor:grab;-webkit-user-select:none;user-select:none;}
.drag-handle:active{cursor:grabbing;background:var(--green-soft);color:var(--green);}
.drag-handle svg{width:20px;height:20px;pointer-events:none;}
.chev{color:var(--ink-3);flex:none;}

.card-row .term-wrap{flex:1;min-width:0;}
.card-row .term{font-family:var(--font-en);font-size:1.12rem;font-weight:500;line-height:1.2;}
.card-row .mean{font-size:.84rem;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-row .due-dot{width:8px;height:8px;border-radius:50%;flex:none;}
.spk{width:38px;height:38px;border-radius:10px;background:var(--green-soft);color:var(--green);display:grid;place-items:center;flex:none;transition:transform .12s;}
.ico-doc{width:38px;height:38px;border-radius:10px;background:var(--amber-soft);color:var(--amber-d);display:grid;place-items:center;flex:none;}
.ico-doc svg{width:20px;height:20px;}
.spk:active{transform:scale(.88);}
.spk svg{width:18px;height:18px;}
.tag-chip{display:inline-block;font-size:.68rem;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);padding:1px 8px;border-radius:20px;margin-right:4px;}
.pos-chip{display:inline-block;font-size:.74rem;font-weight:600;background:var(--green-soft);color:var(--green);padding:3px 11px;border-radius:20px;margin:0 6px 6px 0;}

/* card detail (read view) */
.cd-back{display:inline-flex;align-items:center;gap:5px;color:var(--ink-2);font-weight:600;font-size:.9rem;margin-bottom:12px;padding:6px 2px;}
.cd-back svg{width:18px;height:18px;}
.cd-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;}
.cd-head{display:flex;align-items:flex-start;gap:12px;}
.cd-term{flex:1;font-family:var(--font-en);font-size:2rem;font-weight:500;line-height:1.15;word-break:break-word;}
.cd-pron{color:var(--ink-2);font-size:1rem;margin-top:4px;}
.cd-pos{margin-top:14px;}
.cd-sec{margin-top:18px;}
.cd-sec > .lab{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:6px;}
.cd-sec .val{font-size:1.04rem;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.cd-ex{background:var(--surface-2);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:12px 14px;}
.cd-ex .en{font-family:var(--font-en);font-size:1.05rem;line-height:1.45;}
.cd-ex .ja{color:var(--ink-2);font-size:.9rem;margin-top:5px;}
.cd-actions{display:flex;gap:10px;margin-top:18px;}

.empty{text-align:center;color:var(--ink-3);padding:46px 20px;}
.empty svg{width:54px;height:54px;opacity:.4;margin-bottom:12px;}
.empty .t{font-weight:600;color:var(--ink-2);margin-bottom:4px;}
.empty .d{font-size:.86rem;}

.searchbar{display:flex;align-items:center;gap:9px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:10px 14px;margin-bottom:14px;}
.searchbar input{flex:1;border:none;background:none;outline:none;}
.searchbar svg{width:18px;height:18px;color:var(--ink-3);flex:none;}

/* ---------- Study ---------- */
.deck-pick{display:flex;flex-direction:column;gap:10px;}
.deck-row{display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px;transition:transform .12s;}
.deck-row:active{transform:scale(.985);}
.deck-row .meta{flex:1;}
.deck-row .nm{font-weight:600;}
.deck-row .ct{font-size:.78rem;color:var(--ink-3);}
.deck-row .badge{background:var(--green);color:#fff;font-weight:700;font-size:.82rem;min-width:30px;height:26px;padding:0 9px;border-radius:13px;display:grid;place-items:center;}
.mode-card{display:flex;align-items:center;gap:14px;background:var(--surface);box-shadow:var(--shadow);border-radius:16px;padding:16px;margin-bottom:12px;transition:transform .12s;cursor:pointer;}
.mode-card:active{transform:scale(.985);}
.mode-card .mc-ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;flex:none;}
.mode-card .mc-ic svg{width:24px;height:24px;}
.mode-card .mc-body{flex:1;min-width:0;}
.mode-card .mc-t{font-weight:700;font-size:1.05rem;}
.mode-card .mc-d{font-size:.8rem;color:var(--ink-3);margin-top:2px;}
.mode-card .badge{background:var(--green);color:#fff;font-weight:700;font-size:.82rem;min-width:30px;height:26px;padding:0 9px;border-radius:13px;display:grid;place-items:center;flex:none;}
.mode-card .badge.zero{background:var(--line);color:var(--ink-3);}
.opt-btn{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:15px 16px;margin-bottom:10px;transition:transform .12s;}
.opt-btn:active{transform:scale(.985);}
.opt-btn .oic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;background:var(--green-soft);color:var(--green);}
.opt-btn .oic svg{width:22px;height:22px;}
.opt-btn .ot{font-weight:700;}
.opt-btn .od{font-size:.8rem;color:var(--ink-3);margin-top:2px;}
.deck-row .badge.zero{background:var(--line);color:var(--ink-3);}

.study-wrap{display:flex;flex-direction:column;min-height:70vh;min-height:70dvh;}
.study-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.progress{flex:1;height:7px;background:var(--line);border-radius:4px;margin:0 12px;overflow:hidden;}
.progress > div{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
.study-count{font-size:.8rem;color:var(--ink-2);font-variant-numeric:tabular-nums;}

.flash{perspective:1600px;flex:1;display:flex;}
.flash-inner{position:relative;width:100%;transition:transform .5s cubic-bezier(.4,.1,.2,1);transform-style:preserve-3d;min-height:340px;}
.flash-inner.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border-radius:24px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;}
.face.back{transform:rotateY(180deg);justify-content:flex-start;padding-top:34px;overflow-y:auto;}
.face .face-tag{position:absolute;top:16px;left:18px;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600;}
.face .term{font-family:var(--font-en);font-size:2.5rem;font-weight:500;line-height:1.15;letter-spacing:-.01em;}
.face .pron{color:var(--ink-2);margin-top:8px;font-size:1rem;}
.face .spk-big{margin-top:20px;width:54px;height:54px;border-radius:50%;background:var(--green-soft);color:var(--green);display:grid;place-items:center;}
.face .spk-big svg{width:24px;height:24px;}
.face .tap-hint{position:absolute;bottom:18px;color:var(--ink-3);font-size:.78rem;}
.face.back .b-term{font-family:var(--font-en);font-size:1.5rem;font-weight:500;}
.face.back .b-mean{font-size:1.3rem;font-weight:600;margin-top:10px;}
.face.back .b-ex{margin-top:18px;background:var(--surface-2);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:12px 14px;text-align:left;width:100%;}
.face.back .b-ex .en{font-family:var(--font-en);font-size:1.02rem;line-height:1.4;}
.face.back .b-ex .ja{color:var(--ink-2);font-size:.88rem;margin-top:5px;}
.face.back .b-note{margin-top:14px;font-size:.88rem;color:var(--ink-2);text-align:left;width:100%;white-space:pre-wrap;}

.rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
.rate-btn{padding:14px 4px 11px;border-radius:14px;color:#fff;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .1s;box-shadow:var(--shadow);}
.rate-btn:active{transform:scale(.93);}
.rate-btn .lab{font-size:.86rem;}
.rate-btn .ivl{font-size:.66rem;opacity:.85;font-weight:600;}
.reveal-btn{margin-top:16px;width:100%;background:var(--green);color:#fff;font-weight:700;font-size:1.02rem;padding:16px;border-radius:16px;transition:transform .12s;box-shadow:var(--shadow);}
.reveal-btn:active{transform:scale(.97);}

.session-done{text-align:center;padding:50px 20px;}
.session-done .big{font-family:var(--font-en);font-size:2rem;font-weight:600;}
.session-done svg{width:74px;height:74px;color:var(--green);margin-bottom:14px;}

/* quiz */
.quiz-q{font-family:var(--font-en);font-size:2rem;text-align:center;font-weight:500;margin:30px 0 8px;}
.quiz-opts{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.quiz-opt{background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:15px 16px;text-align:left;font-weight:500;transition:transform .1s;border:2px solid transparent;}
.quiz-opt:active{transform:scale(.985);}
.quiz-opt.correct{border-color:var(--r-good);background:var(--green-soft);}
.quiz-opt.wrong{border-color:var(--r-again);background:#FBE9E5;}
html[data-theme="dark"] .quiz-opt.wrong{background:#2E1F1C;}

/* 瞬間英作文 (instant composition) */
.mic-btn{width:48px;height:48px;border-radius:50%;background:var(--green-soft);color:var(--green);display:grid;place-items:center;flex:none;transition:transform .12s;}
.mic-btn:active{transform:scale(.9);}
.mic-btn.listening{background:var(--r-again);color:#fff;animation:micpulse 1.1s infinite;}
.mic-btn svg{width:22px;height:22px;}
@keyframes micpulse{0%{box-shadow:0 0 0 0 rgba(192,80,64,.5)}70%{box-shadow:0 0 0 13px rgba(192,80,64,0)}100%{box-shadow:0 0 0 0 rgba(192,80,64,0)}}
.compo-kind{font-size:.72rem;color:var(--ink-3);font-weight:700;letter-spacing:.06em;margin-top:8px;}
.compo-jp{font-size:1.42rem;font-weight:600;line-height:1.55;margin:6px 0 4px;}
.compo-hint{font-size:.78rem;color:var(--ink-3);}
.compo-inrow{display:flex;align-items:flex-end;gap:10px;margin-top:18px;}
.compo-inrow textarea{flex:1;background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:13px 14px;font-family:var(--font-en);font-size:1.06rem;resize:none;min-height:48px;line-height:1.4;}
.compo-ref{margin-top:18px;background:var(--surface-2);border-left:3px solid var(--green);border-radius:0 10px 10px 0;padding:13px 15px;}
.compo-ref .lab{font-size:.72rem;color:var(--ink-3);font-weight:700;margin-bottom:5px;}
.compo-ref .en{font-family:var(--font-en);font-size:1.12rem;line-height:1.4;}
.verdict{font-size:1.7rem;font-weight:800;line-height:1;}
.verdict.o{color:var(--r-good);} .verdict.t{color:var(--amber-d);} .verdict.x{color:var(--r-again);}
.compo-fb{margin-top:14px;background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:14px 15px;font-size:.95rem;line-height:1.65;}
.compo-fb .fb-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.compo-fb .fixed{font-family:var(--font-en);background:var(--green-soft);border-radius:10px;padding:9px 12px;margin-top:8px;}
.compo-fb .alts{margin-top:9px;color:var(--ink-2);font-size:.88rem;}
.compo-fb .alts li{margin:2px 0;}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--green);animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.theme-chip{display:inline-block;background:var(--surface);box-shadow:var(--shadow);border:1.5px solid transparent;border-radius:20px;padding:9px 15px;margin:0 8px 9px 0;font-size:.88rem;font-weight:600;color:var(--ink);transition:transform .1s;}
.theme-chip:active{transform:scale(.94);border-color:var(--green);}
.sub-label{font-size:.74rem;color:var(--ink-3);font-weight:700;letter-spacing:.05em;margin:14px 0 8px;}
.compo-speak{display:flex;flex-direction:column;align-items:center;margin:30px 0 4px;}
.mic-big{width:108px;height:108px;border-radius:50%;background:var(--green-soft);color:var(--green);display:grid;place-items:center;box-shadow:0 10px 26px rgba(36,84,70,.18);transition:transform .12s;}
.mic-big:active{transform:scale(.93);}
.mic-big.listening{background:var(--r-again);color:#fff;animation:micpulse 1.1s infinite;}
.mic-big svg{width:46px;height:46px;}
.mic-cap{margin-top:13px;font-size:.92rem;color:var(--ink-2);font-weight:600;}
.compo-edit{width:100%;background:transparent;text-align:center;font-family:var(--font-en);font-size:1.16rem;margin-top:18px;padding:10px 12px;border-bottom:2px solid var(--line);}
.compo-edit:focus{border-color:var(--green);}
.compo-result-head{text-align:center;padding:12px 0 6px;}
.speech-theme{font-size:1.25rem;font-weight:700;line-height:1.55;background:var(--surface);box-shadow:var(--shadow);border-radius:16px;padding:18px;text-align:center;margin-top:6px;}
.speech-timer{font-family:var(--font-en);font-size:2.4rem;font-weight:600;text-align:center;margin:12px 0 2px;}
.speech-input{width:100%;background:var(--surface);box-shadow:var(--shadow);border-radius:14px;padding:13px 14px;font-family:var(--font-en);font-size:1.02rem;resize:none;margin-top:14px;line-height:1.4;}
.compo-result-head svg{width:48px;height:48px;color:var(--green);}
.compo-result-head .big{font-family:var(--font-en);font-size:2rem;font-weight:600;margin-top:6px;}
.compo-result-head .sub2{color:var(--ink-2);font-size:.85rem;}
.result-row{background:var(--surface);box-shadow:var(--shadow);border-radius:14px;margin-bottom:9px;overflow:hidden;}
.rr-head{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;}
.rr-meta{flex:1;min-width:0;}
.rr-jp{font-weight:600;font-size:.95rem;}
.rr-ans{font-family:var(--font-en);font-size:.82rem;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rr-detail{padding:2px 14px 14px;border-top:1px solid var(--line);}
.rr-detail .blk{margin-top:11px;}
.rr-detail .lab{font-size:.7rem;color:var(--ink-3);font-weight:700;margin-bottom:3px;}
.rr-detail .en{font-family:var(--font-en);line-height:1.4;}

/* ---------- AI ---------- */
.ai-tabs{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.ai-tabs button{flex:none;padding:8px 14px;border-radius:20px;font-size:.85rem;font-weight:600;background:var(--surface);box-shadow:var(--shadow);color:var(--ink-2);white-space:nowrap;}
.ai-tabs button.on{background:var(--green);color:#fff;}
.chat-log{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;min-height:40vh;}
.msg{max-width:86%;padding:12px 15px;border-radius:16px;font-size:.95rem;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.msg.user{align-self:flex-end;background:var(--green);color:#fff;border-bottom-right-radius:5px;}
.msg.ai{align-self:flex-start;background:var(--surface);box-shadow:var(--shadow);border-bottom-left-radius:5px;}
.msg.ai .save-card{margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:var(--amber);color:#3a2e0c;font-weight:700;font-size:.8rem;padding:7px 12px;border-radius:10px;}
.msg.ai .retry-btn{margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);color:var(--ink);font-weight:600;font-size:.82rem;padding:7px 12px;border-radius:10px;}
.msg.ai .retry-btn svg{width:15px;height:15px;}
.msg.ai .ex-list{display:flex;flex-direction:column;gap:13px;}
.msg.ai .ex-item .ex-en{font-family:var(--font-en);font-size:1.02rem;line-height:1.4;}
.msg.ai .ex-item .ex-ja{font-size:.86rem;color:var(--ink-2);margin-top:3px;}
.msg.ai .ex-item .save-card{margin-top:8px;}
.chat-input{position:sticky;bottom:calc(var(--tabbar-h) + var(--safe-b) + 8px);display:flex;gap:8px;align-items:flex-end;background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);padding:8px 8px 8px 14px;}
.chat-input textarea{flex:1;border:none;outline:none;background:none;resize:none;max-height:120px;padding:8px 0;line-height:1.4;}
.send-btn{background:var(--green);color:#fff;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;flex:none;transition:transform .12s;}
.send-btn:active{transform:scale(.9);}
.send-btn:disabled{opacity:.4;}
.ai-hint{font-size:.84rem;color:var(--ink-2);background:var(--amber-soft);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.ai-hint b{color:var(--ink);}
.typing{display:inline-flex;gap:4px;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-3);animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.25;}30%{opacity:1;}}

/* ---------- Settings ---------- */
.set-group{margin-bottom:22px;}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);box-shadow:var(--shadow);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:9px;}
.set-row .l{font-weight:500;}
.set-row .d{font-size:.78rem;color:var(--ink-3);margin-top:2px;}
.set-row input[type=text],.set-row input[type=password],.set-row select{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;outline:none;}
.field{display:block;background:var(--surface);box-shadow:var(--shadow);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:9px;}
.field label{display:block;font-weight:500;margin-bottom:8px;}
.field input,.field select{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px;outline:none;}
.field .d{font-size:.78rem;color:var(--ink-3);margin-top:7px;line-height:1.5;}
/* switch */
.switch{position:relative;width:48px;height:28px;flex:none;}
.switch input{opacity:0;width:0;height:0;}
.switch .sl{position:absolute;inset:0;background:var(--line);border-radius:20px;transition:.2s;}
.switch .sl::before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.switch input:checked + .sl{background:var(--green);}
.switch input:checked + .sl::before{transform:translateX(20px);}
.slider-row input[type=range]{width:130px;accent-color:var(--green);}

/* ---------- Bottom tab bar ---------- */
.tabbar{position:fixed;bottom:0;left:0;right:0;max-width:680px;margin:0 auto;height:calc(var(--tabbar-h) + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);border-top:1px solid var(--line);display:flex;z-index:40;}
html[data-theme="dark"] .tabbar{background:rgba(28,33,35,.86);}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-3);font-size:.66rem;font-weight:600;}
.tabbar button svg{width:23px;height:23px;}
.tabbar button.on{color:var(--green);}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(20,24,22,.45);backdrop-filter:blur(2px);z-index:60;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;animation:fade .2s;}
.modal{position:relative;background:var(--paper);width:100%;max-width:680px;border-radius:24px 24px 0 0;padding:8px 18px calc(22px + var(--safe-b));max-height:92vh;overflow-y:auto;animation:slideup .28s cubic-bezier(.2,.7,.2,1);}
.modal-close{position:absolute;top:14px;right:14px;width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:1.45rem;line-height:1;color:var(--ink-2);background:var(--surface-2);z-index:6;}
.modal-close:active{transform:scale(.92);}
.x-btn{font-size:1.6rem;width:46px;height:46px;line-height:1;}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.modal .grip{width:40px;height:5px;background:var(--line);border-radius:3px;margin:6px auto 14px;}
.modal h2{font-family:var(--font-en);font-weight:600;font-size:1.3rem;margin:0 0 4px;}
.modal .mfield{margin-bottom:13px;}
.modal .mfield label{display:block;font-size:.8rem;font-weight:600;color:var(--ink-2);margin-bottom:6px;}
.modal .mfield input,.modal .mfield textarea,.modal .mfield select{width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;outline:none;transition:border-color .15s;}
.modal .mfield input:focus,.modal .mfield textarea:focus{border-color:var(--green);}
.modal .mfield textarea{resize:vertical;min-height:64px;line-height:1.4;}
.modal .term-input{font-family:var(--font-en);font-size:1.2rem !important;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions .btn{flex:1;justify-content:center;padding:14px;}
.del-link{display:block;width:100%;text-align:center;color:var(--r-again);font-weight:600;font-size:.88rem;padding:14px;margin-top:6px;}
.key-set{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface-2);border-radius:12px;padding:11px 14px;font-size:.9rem;color:var(--ink);}
.key-set .lbl{display:inline-flex;align-items:center;gap:7px;}
.key-set svg{width:16px;height:16px;color:var(--green);}
.ai-gen-btn{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;color:var(--green);background:var(--green-soft);padding:6px 11px;border-radius:9px;margin-top:6px;}
.ai-gen-btn:disabled{opacity:.5;}

/* ---------- Toast ---------- */
#toast{position:fixed;bottom:calc(var(--tabbar-h) + var(--safe-b) + 18px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:13px;font-size:.88rem;font-weight:500;z-index:80;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow-lg);max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.skeleton{color:var(--ink-3);font-size:.86rem;}
a{color:var(--green);}
</style>
</head>
<body>
<div id="app">

  <!-- ===== HOME ===== -->
  <section class="view active" id="view-home"></section>

  <!-- ===== NOTES ===== -->
  <section class="view" id="view-notes"></section>

  <section class="view" id="view-study"></section>

</div>

<script>
"use strict";
/* =========================================================================
   Sprout — 英語学習アプリ  (single-file, vanilla JS, localStorage)
   ========================================================================= */

/* ---------- icons ---------- */
const I = {
  speaker:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M16 9a4 4 0 0 1 0 6"/><path d="M19 6a8 8 0 0 1 0 12"/></svg>',

  cardPlus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M12 9v6M9 12h6"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  trophy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M6 4h12v5a6 6 0 0 1-12 0z"/><path d="M6 5H3v2a4 4 0 0 0 3 3.8M18 5h3v2a4 4 0 0 1-3 3.8"/></svg>',
  gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.2A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 0 1 0-4h.2A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H7a1.6 1.6 0 0 0 1-1.5V1a2 2 0 0 1 4 0v.2a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 21.4 9H22a2 2 0 0 1 0 4h-.2a1.6 1.6 0 0 0-1.4 1z"/></svg>',
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>',
  sparkle:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6z"/></svg>',
  inbox:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h5l2 3h4l2-3h5"/><path d="M5 5h14l2 7v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-6z"/></svg>',
  flame:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 4-3 5-3 9a3 3 0 0 0 6 0c0-1-.5-2-1-3 2 1 4 3 4 6a6 6 0 0 1-12 0c0-4 4-6 6-12z"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>',
  grip:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>',
  mic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2zM19 3v18"/></svg>',
  flame:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c1 4-2 5-2 8a4 4 0 0 0 8 0c0-1-.5-2-1-3 2 1 3 3.5 3 6a8 8 0 1 1-16 0c0-4 3-6 4-9 1 1 1.5 2 2 3z"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h6"/></svg>',
  speech:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.4 9 9 0 0 1-4-1l-4 1 1-3.5a8.38 8.38 0 0 1-1-4A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>',
};

/* ---------- state & storage ---------- */
const STORE_KEY = 'sprout_v1';
let state;

function defaultState(){
  return {
    folders:{}, cards:{},
    threads:[], aiThreadSeed:false,
    settings:{ aiProvider:'openai', apiKey:'', model:'gpt-4o-mini', geminiKey:'', geminiModel:'gemini-2.5-flash', dark:false, ttsRate:0.9, newPerDay:20 },
    stats:{ reviews:{}, streak:0, lastStudy:null },
    history:{ compo:[], speech:[] },
    seeded:false
  };
}
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ state = Object.assign(defaultState(), JSON.parse(raw)); }
    else state = defaultState();
  }catch(e){ state = defaultState(); }
  state.settings = Object.assign(defaultState().settings, state.settings || {});
  if(!state.stats) state.stats = defaultState().stats;
  if(!state.history || typeof state.history!=='object') state.history = {compo:[],speech:[]};
  if(!Array.isArray(state.history.compo)) state.history.compo=[];
  if(!Array.isArray(state.history.speech)) state.history.speech=[];
  if(!Array.isArray(state.threads)) state.threads = [];
  // migrate cards: tags -> pos (品詞), note -> other (その他)
  Object.values(state.cards||{}).forEach(c=>{
    if(!Array.isArray(c.pos)) c.pos = Array.isArray(c.tags) ? c.tags.slice() : [];
    if(typeof c.other !== 'string') c.other = c.note || '';
  });
  save(); // persist any migrated/normalized fields
}

/* ---------- generic drag-to-reorder (pointer: touch+mouse) ---------- */
let _drag=null;
function bindReorder(container, onReorder){
  if(!container) return;
  container.querySelectorAll('.drag-handle').forEach(h=>{
    h.addEventListener('pointerdown', e=>reorderStart(e, container, onReorder));
  });
}
function reorderStart(e, container, onReorder){
  const row=e.target.closest('.reorderable'); if(!row) return;
  e.preventDefault(); e.stopPropagation();
  const rows=[...container.querySelectorAll('.reorderable')];
  const rects=rows.map(r=>r.getBoundingClientRect());
  const fromIndex=rows.indexOf(row);
  _drag={ container, row, rows, rects, onReorder, fromIndex, count:fromIndex,
          startY:e.clientY, pid:e.pointerId, h:e.target,
          gap:(rects[fromIndex]?rects[fromIndex].height:48)+9 };
  row.classList.add('dragging');
  try{ e.target.setPointerCapture(e.pointerId); }catch(_){}
  e.target.addEventListener('pointermove', reorderMove);
  e.target.addEventListener('pointerup', reorderEnd);
  e.target.addEventListener('pointercancel', reorderEnd);
}
function reorderMove(e){
  if(!_drag) return;
  const d=_drag;
  d.row.style.transform=`translateY(${e.clientY-d.startY}px) scale(1.03)`;
  let count=0; const y=e.clientY;
  d.rects.forEach(r=>{ if(y > r.top + r.height/2) count++; });
  d.count=count;
  const insertAt = count>d.fromIndex ? count-1 : count;
  d.rows.forEach((r,i)=>{
    if(r===d.row) return;
    let shift=0;
    if(d.fromIndex<insertAt && i>d.fromIndex && i<=insertAt) shift=-d.gap;
    else if(d.fromIndex>insertAt && i>=insertAt && i<d.fromIndex) shift=d.gap;
    r.style.transform = shift?`translateY(${shift}px)`:'';
  });
}
function reorderEnd(){
  if(!_drag) return;
  const d=_drag; _drag=null;
  d.row.classList.remove('dragging');
  d.rows.forEach(r=>{ r.style.transform=''; });
  try{ d.h.releasePointerCapture(d.pid); }catch(_){}
  d.h.removeEventListener('pointermove', reorderMove);
  d.h.removeEventListener('pointerup', reorderEnd);
  d.h.removeEventListener('pointercancel', reorderEnd);
  const ids=d.rows.map(r=>r.dataset.rid);
  const item=ids.splice(d.fromIndex,1)[0];
  let insertAt = d.count>d.fromIndex ? d.count-1 : d.count;
  insertAt=Math.max(0, Math.min(ids.length, insertAt));
  ids.splice(insertAt,0,item);
  d.onReorder(ids);
}
function commitFolderOrder(ids){ ids.forEach((id,i)=>{ if(state.folders[id]) state.folders[id].order=i; }); save(); renderNotes(); }
function commitCardOrder(ids){ ids.forEach((id,i)=>{ if(state.cards[id]) state.cards[id].order=i; }); save(); renderNotes(); }
function commitThreadOrder(ids){ const map={}; state.threads.forEach(t=>map[t.id]=t); state.threads=ids.map(id=>map[id]).filter(Boolean); save(); renderAI(); }
function childFolders(pid){ return Object.values(state.folders).filter(f=>f.parentId===pid).sort((a,b)=>{
  if(a.order!=null&&b.order!=null) return a.order-b.order;
  if(a.order!=null) return -1; if(b.order!=null) return 1;
  return a.name.localeCompare(b.name,'ja'); }); }
function folderCards(fid){ return Object.values(state.cards).filter(c=>c.folderId===fid).sort((a,b)=>{
  if(a.order!=null&&b.order!=null) return a.order-b.order;
  if(a.order!=null) return -1; if(b.order!=null) return 1;
  return b.createdAt-a.createdAt; }); }
function descendantFolderIds(fid){
  let ids=[fid]; childFolders(fid).forEach(f=>ids=ids.concat(descendantFolderIds(f.id))); return ids;
}
function cardsInTree(fid){
  const ids = fid===null ? Object.keys(state.folders) : descendantFolderIds(fid);
  const set = new Set(ids);
  return Object.values(state.cards).filter(c=> fid===null ? true : set.has(c.folderId));
}
function dueCards(list){ const t=now(); return list.filter(c=>c.srs.due<=t); }
function newCards(list){ return list.filter(c=>c.srs.state==='new'); }

let voices=[];

function speak(text){
  if(!('speechSynthesis' in window)){ toast('この端末は読み上げに非対応です'); return; }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=state.settings.ttsRate||0.9;
  const v = voices.find(v=>/en-US/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}

function renderNotes(){
  const v=document.getElementById('view-notes');
  // card detail (read) view
  if(currentCardView && state.cards[currentCardView]){ noteEditMode=false; renderCardDetail(v); return; }
  currentCardView=null;

  // breadcrumbs (display only — not tappable)
  const trail=[]; let f = currentFolder?state.folders[currentFolder]:null;
  while(f){ trail.unshift(f); f=f.parentId?state.folders[f.parentId]:null; }
  const crumbs = `<div class="crumbs"><span class="${currentFolder?'':'here'}">ノート</span>${trail.map((t,i)=>`<span class="sep">›</span><span class="${i===trail.length-1?'here':''}">${esc(t.name)}</span>`).join('')}</div>`;

  const folders=childFolders(currentFolder);
  const cards=folderCards(currentFolder);
  const hasItems = folders.length+cards.length>0;
  if(noteSearch) noteEditMode=false;

  let body;
  if(noteSearch){
    const q=noteSearch.toLowerCase();
    const hits=Object.values(state.cards).filter(c=>{
      const hay = c.type==='text'
        ? (c.title||'')+(c.body||'')
        : (c.term||'')+(c.mean||'')+(c.exEn||'')+(c.exJa||'')+((c.pos||[]).join(''))+(c.other||'');
      return hay.toLowerCase().includes(q);
    });
    body = hits.length? `<div class="list">${hits.map(cardRow).join('')}</div>` :
      `<div class="empty">${I.search}<div class="t">見つかりません</div><div class="d">別のキーワードで試してください</div></div>`;
  } else if(!hasItems){
    body=`<div class="empty">${I.inbox}<div class="t">まだ空です</div><div class="d">右上の「追加」から<br>フォルダやカードを作成しましょう</div></div>`;
  } else if(noteEditMode){
    body=`
      ${folders.length?`<div class="list" id="folderList">${folders.map(folderRowEdit).join('')}</div>`:''}
      ${cards.length?`<div class="list" id="cardList" style="margin-top:${folders.length?'10px':'0'}">${cards.map(cardRowEdit).join('')}</div>`:''}
      <div style="text-align:center;color:var(--ink-3);font-size:.74rem;margin-top:14px">右の ⠿ を長押しドラッグで並び替え・行をタップで名前変更</div>`;
  } else {
    body=`<div class="list">
      ${folders.map(folderRow).join('')}
      ${cards.map(cardRow).join('')}
    </div>`;
  }

  const atRoot = !currentFolder;
  v.innerHTML=`
    <div class="topbar"><h1>ノート</h1></div>
    <div class="searchbar">${I.search}<input placeholder="単語・意味・品詞を検索" value="${esc(noteSearch)}" oninput="noteSearch=this.value;renderNotes()" />${noteSearch?`<button onclick="noteSearch='';renderNotes()" style="color:var(--ink-3)">✕</button>`:''}</div>
    ${noteSearch?'':`<div class="note-actions">
      ${noteEditMode
        ? `<button class="btn btn-primary" onclick="noteEditMode=false;renderNotes()">完了</button>`
        : `<button class="btn btn-ghost" onclick="goUpFolder()" ${atRoot?'disabled style="opacity:.4"':''}>${I.back} 戻る</button>`}
      <div style="flex:1"></div>
      ${(hasItems&&!noteEditMode)?`<button class="btn btn-ghost" onclick="noteEditMode=true;renderNotes()">編集</button>`:''}
      <button class="btn btn-primary" onclick="openAddMenu()">${I.plus} 追加</button>
    </div>`}
    ${(noteSearch||noteEditMode)?'':crumbs}
    ${body}`;
  const si=v.querySelector('.searchbar input'); if(noteSearch&&si){ si.focus(); si.setSelectionRange(si.value.length,si.value.length); }
  if(noteEditMode && !noteSearch){
    bindReorder(document.getElementById('folderList'), commitFolderOrder);
    bindReorder(document.getElementById('cardList'), commitCardOrder);
  }
}

/* ---------- SRS engine ---------- */
function fmtDays(d){ if(d>=30){return Math.round(d/30)+'ヶ月';} if(d>=365){return Math.round(d/365)+'年';} return d+'日'; }
function previewIvl(c,r){
  const s=c.srs;
  if(s.state==='new'||s.state==='learning'){ return ['<1分','10分','1日','3日'][r]; }
  if(r===0) return '<1分';
  if(r===1) return fmtDays(Math.max(1,Math.round(s.interval*1.2)));
  if(r===2) return fmtDays(Math.max(1,Math.round(s.interval*s.ease)));
  return fmtDays(Math.max(1,Math.round(s.interval*(s.ease+0.15)*1.3)));
}
function schedule(c,r){
  const s=c.srs;
  if(s.state==='new'||s.state==='learning'){
    if(r===0){ s.state='learning'; s.interval=0; s.due=now()+60*1000; }
    else if(r===1){ s.state='learning'; s.due=now()+10*60*1000; }
    else if(r===2){ s.state='review'; s.interval=1; s.reps=1; s.due=now()+DAY; }
    else { s.state='review'; s.interval=3; s.reps=1; s.due=now()+3*DAY; }
  } else {
    if(r===0){ s.lapses++; s.ease=Math.max(1.3,s.ease-0.2); s.state='learning'; s.interval=0; s.reps=0; s.due=now()+60*1000; }
    else {
      if(r===1){ s.ease=Math.max(1.3,s.ease-0.15); s.interval=Math.max(1,Math.round(s.interval*1.2)); }
      else if(r===2){ s.interval=Math.max(1,Math.round(s.interval*s.ease)); }
      else { s.ease+=0.15; s.interval=Math.max(1,Math.round(s.interval*(s.ease)*1.3)); }
      s.reps++; s.state='review'; s.due=now()+s.interval*DAY;
    }
  }
}

function startSession(folderId, mode){
  mode = mode||'srs';
  const base=(folderId===null ? Object.values(state.cards) : cardsInTree(folderId)).filter(c=>c.type!=='text');
  if(mode==='order'){
    const items=[...base].sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    if(items.length===0){ toast('このデッキにはカードがありません'); return; }
    session={ mode:'order', items, idx:0, total:items.length, flipped:false, folderId };
    renderStudySession(); return;
  }
  const t=now();
  const due=base.filter(c=>c.srs.state!=='new'&&c.srs.due<=t);
  const news=base.filter(c=>c.srs.state==='new').slice(0,state.settings.newPerDay||20);
  const pool=shuffle([...due,...news]);
  if(pool.length===0){ toast('このデッキは今学習するカードがありません'); return; }
  session={ mode:'srs', queue:pool.map(c=>c.id), graduated:new Set(), total:pool.length, flipped:false, folderId };
  renderStudySession();
}
function startPreset(catId){
  const dk=PRESET_DECKS.find(d=>d.id===catId); if(!dk){ toast('プリセットが見つかりません'); return; }
  const items=dk.cards.map(c=>({term:c.term,pron:c.pron||'',mean:c.mean||'',exEn:c.exEn||'',exJa:c.exJa||'',pos:c.pos||[],other:c.other||''}));
  closeModal();
  session={ mode:'preset', items, idx:0, total:items.length, flipped:false, catName:dk.name };
  renderStudySession();
}
function renderStudySession(){
  const v=document.getElementById('view-study');
  const srs = session.mode==='srs';
  let c, prog, countLabel;
  if(srs){
    if(session.queue.length===0){ finishSession(); return; }
    c=state.cards[session.queue[0]];
    if(!c){ session.queue.shift(); renderStudySession(); return; }
    prog=Math.round(session.graduated.size/session.total*100);
    countLabel='残り '+(session.total - session.graduated.size);
  } else {
    if(session.idx>=session.items.length){ finishSession(); return; }
    c=session.items[session.idx];
    prog=Math.round(session.idx/session.total*100);
    countLabel=(session.idx+1)+'/'+session.total;
  }
  const tag = srs ? (c.srs.state==='new'?'NEW':'問題') : (session.mode==='preset'?(session.catName||'プリセット'):'問題');
  v.innerHTML=`
    <div class="study-wrap">
      <div class="study-top">
        <button class="icon-btn x-btn" onclick="if(confirm('学習を終了しますか？'))endSessionEarly()" style="box-shadow:none;background:transparent">✕</button>
        <div class="progress"><div style="width:${prog}%"></div></div>
        <div class="study-count">${countLabel}</div>
      </div>
      <div class="flash" onclick="flipCard()">
        <div class="flash-inner ${session.flipped?'flipped':''}">
          <div class="face front">
            <div class="face-tag">${esc(tag)}</div>
            <div class="term">${esc(c.term)}</div>
            ${c.pron?`<div class="pron">${esc(c.pron)}</div>`:''}
            <button class="spk-big" onclick="event.stopPropagation();speak('${esc(c.term).replace(/'/g,"\\'")}')">${I.speaker}</button>
            <div class="tap-hint">タップして答えを表示</div>
          </div>
          <div class="face back">
            <div class="face-tag">答え</div>
            <div class="b-term">${esc(c.term)} <button class="spk" style="display:inline-grid;vertical-align:middle;width:30px;height:30px" onclick="event.stopPropagation();speak('${esc(c.term).replace(/'/g,"\\'")}')">${I.speaker}</button></div>
            <div class="b-mean">${esc(c.mean)||'<span style=color:var(--ink-3);font-weight:400>意味が未入力です</span>'}</div>
            ${c.exEn?`<div class="b-ex"><div class="en">${esc(c.exEn)}</div>${c.exJa?`<div class="ja">${esc(c.exJa)}</div>`:''}</div>`:''}
            ${(c.pos&&c.pos.length)?`<div class="b-note">${c.pos.map(p=>`<span class="pos-chip">${esc(p)}</span>`).join('')}</div>`:''}
            ${c.other?`<div class="b-note">${esc(c.other)}</div>`:''}
          </div>
        </div>
      </div>
      ${session.flipped
        ? (srs
          ? `<div class="rate-row">
              <button class="rate-btn" style="background:var(--r-again)" onclick="rate(0)"><span class="lab">もう一度</span><span class="ivl">${previewIvl(c,0)}</span></button>
              <button class="rate-btn" style="background:var(--r-hard)" onclick="rate(1)"><span class="lab">むずかしい</span><span class="ivl">${previewIvl(c,1)}</span></button>
              <button class="rate-btn" style="background:var(--r-good)" onclick="rate(2)"><span class="lab">できた</span><span class="ivl">${previewIvl(c,2)}</span></button>
              <button class="rate-btn" style="background:var(--r-easy)" onclick="rate(3)"><span class="lab">かんたん</span><span class="ivl">${previewIvl(c,3)}</span></button>
            </div>`
          : `<button class="btn btn-primary full" style="padding:15px" onclick="nextFlash()">${session.idx+1>=session.total?'終わる':'次へ'}</button>`)
        : `<button class="reveal-btn" onclick="flipCard()">答えを見る</button>`}
    </div>`;
}
function nextFlash(){ session.idx++; session.flipped=false; renderStudySession(); }
function flipCard(){ if(!session.flipped){ session.flipped=true; renderStudySession(); } }
function rate(r){
  const id=session.queue.shift();
  const c=state.cards[id];
  schedule(c,r);
  // record review
  const d=todayStr(); state.stats.reviews[d]=(state.stats.reviews[d]||0)+1;
  updateStreak();
  // requeue if still due within session (again / learning step soon)
  if(c.srs.due <= now()+11*60*1000 && c.srs.state==='learning'){ session.queue.push(id); }
  else { session.graduated.add(id); }
  session.flipped=false;
  save();
  renderStudySession();
}
function updateStreak(){
  const t=todayStr();
  if(state.stats.lastStudy===t) return;
  const y=new Date(Date.now()-DAY).toISOString().slice(0,10);
  if(state.stats.lastStudy===y) state.stats.streak++;
  else state.stats.streak=1;
  state.stats.lastStudy=t;
}
function finishSession(){
  const cnt=session.total;
  const wasSrs=session.mode==='srs';
  session=null;
  document.getElementById('view-study').innerHTML=`
    <div class="session-done">
      ${I.check.replace('stroke-width="2.5"','stroke-width="2"')}
      <div class="big">おつかれさま！</div>
      <p style="color:var(--ink-2)">${cnt}枚を${wasSrs?'学習':'確認'}しました。${wasSrs?`<br>連続 ${state.stats.streak}日 🔥`:''}</p>
      <button class="btn btn-primary full" style="margin-top:18px;padding:15px" onclick="renderStudy()">学習に戻る</button>
    </div>`;
}
function endSessionEarly(){ session=null; renderStudy(); }

function answerQuiz(btn,isCorrect){
  if(quiz.answered) return; quiz.answered=true;
  document.querySelectorAll('#quizOpts .quiz-opt').forEach(b=>{
    if(b.dataset.mean===quiz.correct) b.classList.add('correct');
    b.style.pointerEvents='none';
  });
  if(isCorrect) quiz.score++; else btn.classList.add('wrong');
  setTimeout(()=>{ if(quiz){ quiz.idx++; renderQuiz(); } }, 950);
}

/* ---------- voice input (Web Speech API) ---------- */
let _recog=null, _recogBtn=null, _recogTimer=null;
function speechSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function stopDictation(){ if(_recog){ try{ _recog.stop(); }catch(_){ } } }
function toggleDictation(inputId, btn, autoSubmit){
  if(!speechSupported()){ toast('この端末は音声入力に非対応です（入力でも答えられます）'); return; }
  if(_recog){ stopDictation(); return; } // tap again = finish now
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR(); _recog=r; _recogBtn=btn;
  r.lang='en-US'; r.interimResults=true; r.continuous=false; r.maxAlternatives=1;
  const inp=document.getElementById(inputId);
  const base=inp?inp.value.trim():'';
  let got=false;
  if(btn) btn.classList.add('listening');
  const cap=document.getElementById('micCap'); if(cap) cap.textContent='聞き取り中…（タップで停止）';
  clearTimeout(_recogTimer);
  _recogTimer=setTimeout(()=>{ stopDictation(); }, 12000); // safety: never hang
  r.onresult=(e)=>{
    let txt=''; for(let i=0;i<e.results.length;i++){ txt+=e.results[i][0].transcript; }
    if(txt.trim()) got=true;
    if(inp){ inp.value=(base?base+' ':'')+txt; if(inp.tagName==='TEXTAREA'&&typeof autoGrow==='function') autoGrow(inp); }
  };
  r.onspeechend=()=>{ stopDictation(); }; // stop as soon as the user goes quiet
  r.onerror=(e)=>{ if(e.error==='not-allowed'||e.error==='service-not-allowed') toast('マイクの使用が許可されていません'); };
  r.onend=()=>{
    clearTimeout(_recogTimer);
    if(_recogBtn) _recogBtn.classList.remove('listening');
    const c2=document.getElementById('micCap'); if(c2) c2.textContent='タップして話す';
    _recog=null; _recogBtn=null;
    // auto-grade as soon as speech finishes
    if(autoSubmit && got && compo && !compo.answered && !compo.checking){
      const i2=document.getElementById('compoInput');
      if(i2 && i2.value.trim()) checkCompo();
    }
  };
  try{ r.start(); }catch(_){ clearTimeout(_recogTimer); toast('音声入力を開始できませんでした'); if(btn) btn.classList.remove('listening'); _recog=null; }
}

function normTxt(s){ return (s||'').toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim(); }
function compoItemsFrom(list){
  const items=[];
  list.forEach(c=>{
    if(c.exJa && c.exEn) items.push({jp:c.exJa, en:c.exEn, kind:'文'});
    else if(c.mean && c.term) items.push({jp:c.mean, en:c.term, kind:'語・フレーズ'});
  });
  return items;
}

async function genTheme(theme){
  if(!aiReady()){ toast('テーマ出題にはAIが必要です'); return; }
  const level=(document.getElementById('thLevel')&&document.getElementById('thLevel').value)||'中級';
  closeModal();
  compo={ loading:true, theme, items:[], idx:0, answered:false, checking:false, fb:null, userAns:'', results:[], source:'theme' };
  renderCompo();
  try{
    const sys='You create instant-composition (瞬間英作文) practice for a Japanese learner. Output ONLY a JSON object: {"items":[{"jp":"日本語の文","en":"natural English translation"}]} with exactly 8 items. Sentences must be short, practical and natural to say aloud, and must match the given theme and level. The "jp" is Japanese, "en" is its natural English. No markdown, no code fences.';
    const u=`テーマ: ${theme}\nレベル: ${level}`;
    const content=await callAI([{role:'system',content:sys},{role:'user',content:u}],{json:true,temp:0.6});
    if(!compo || !compo.loading) return; // user exited
    let arr=[]; try{ const j=JSON.parse(content); arr=Array.isArray(j)?j:(j.items||[]); }catch(e){ arr=[]; }
    const items=arr.filter(x=>x&&x.jp&&x.en).map(x=>({jp:String(x.jp),en:String(x.en),kind:'テーマ：'+theme}));
    if(items.length===0){ toast('問題を生成できませんでした。もう一度お試しください'); compo=null; renderStudy(); return; }
    compo={ items, idx:0, answered:false, checking:false, fb:null, userAns:'', results:[], log:[], openIdx:null, source:'theme', theme };
    renderCompo();
  }catch(err){
    if(!compo) return;
    const m=err.message||'';
    toast('生成に失敗：'+(/429/.test(m)?'利用上限の可能性':/50[0234]/.test(m)?'サーバー混雑':/40[013]/.test(m)?'キーを確認':'通信エラー'));
    compo=null; renderStudy();
  }
}

async function checkCompo(){
  if(!compo || compo.checking || compo.answered) return;
  const myIdx=compo.idx;
  const it=compo.items[compo.idx];
  const inp=document.getElementById('compoInput');
  const user=(inp?inp.value:'').trim();
  if(!user){ toast('英文を入力（または音声入力）してください'); return; }
  stopDictation();
  compo.userAns=user;
  if(aiReady()){
    compo.checking=true; renderCompo();
    let fb;
    try{
      const sys='You are a supportive English teacher grading 瞬間英作文 (instant composition) by a Japanese learner. Output ONLY JSON: {"verdict":"○"|"△"|"×","comment":"short Japanese feedback (1-2 sentences)","fixed":"a natural corrected English version of the learner sentence","alts":["up to 2 alternative natural English expressions"]}. ○ = correct & natural, △ = understandable but unnatural/minor errors, × = wrong meaning. Judge by meaning vs the Japanese, not exact match with the reference. Be encouraging. comment MUST be Japanese. No markdown.';
      const u=`日本語: ${it.jp}\n参考の英語: ${it.en}\n学習者の英語: ${user}`;
      const content=await callAI([{role:'system',content:sys},{role:'user',content:u}],{json:true,temp:0.3});
      let j=null; try{ j=JSON.parse(content); }catch(e){ j=null; }
      fb = (j&&j.verdict) ? j : {verdict:'△', comment:(content||'採点結果を取得できませんでした。お手本と見比べてください。'), fixed:'', alts:[]};
    }catch(err){
      const m=err.message||'';
      fb={verdict:'', comment:'採点に失敗しました（'+(/429/.test(m)?'利用上限の可能性':/50[0234]/.test(m)?'サーバー混雑':/40[013]/.test(m)?'キーを確認':'通信エラー')+'）。お手本と見比べてください。', fixed:'', alts:[]};
    }
    if(!compo || compo.idx!==myIdx || compo.answered) return; // user exited/advanced during await
    compo.fb=fb; compo.checking=false;
  } else {
    const ok = normTxt(user)===normTxt(it.en);
    compo.fb={ verdict: ok?'○':'△',
      comment: ok?'お手本と一致しました！' : 'お手本と見比べて確認しましょう。設定でAIをオンにすると、添削や言い換えも表示されます。',
      fixed:'', alts:[] };
  }
  compo.answered=true;
  compo.results.push(compo.fb.verdict||'△');
  compo.log = compo.log || [];
  compo.log.push({ jp:it.jp, en:it.en, userAns:user, fb:compo.fb, kind:it.kind });
  renderCompo();
}

function startSpeechRec(){
  if(!speechSupported()){ toast('この端末は音声入力に非対応です（下のテキストに入力もできます）'); return; }
  if(_srec){ stopSpeechRec(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR(); _srec=r; r.lang='en-US'; r.interimResults=true; r.continuous=true;
  let finalText = speech.transcript||'';
  r.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){ const res=e.results[i]; if(res.isFinal) finalText=(finalText+' '+res[0].transcript).trim(); else interim+=res[0].transcript; }
    if(speech) speech.transcript=finalText;
    const ta=document.getElementById('speechText'); if(ta) ta.value=(finalText+(interim?' '+interim:'')).trim();
  };
  r.onerror=(e)=>{ if(e.error==='not-allowed'||e.error==='service-not-allowed') toast('マイクの使用が許可されていません'); };
  r.onend=()=>{ if(speech && speech.recording && speech.seconds>0){ try{ r.start(); }catch(_){ } } else { if(speech) speech.recording=false; const b=document.getElementById('speechMic'); if(b) b.classList.remove('listening'); } };
  speech.recording=true;

  },1000);
  renderSpeech();
}

  chat:{label:'チューター',convo:true,ph:'英語について何でも質問できます',phs:'メッセージを入力…',sys:'You are a friendly, encouraging English tutor for a Japanese learner. Reply concisely in Japanese unless asked otherwise. Use simple explanations and give example sentences.'},
  card:{label:'単語をカード化',convo:false,ph:'単語を送るとカード化できます',phs:'単語・フレーズ…',sys:'CARD'},
  correct:{label:'英文添削',convo:false,ph:'添削したい英文を入力',phs:'英文を入力…',sys:'You are an English proofreader for a Japanese learner. Correct the English the user writes, show the corrected version, then briefly explain the key fixes in Japanese.'},
  example:{label:'例文作成',convo:false,ph:'日本語または英語を入力（例：認識を合わせる / proceed）',phs:'日本語/英語を入力…',sys:'EXAMPLE'},
  nuance:{label:'ニュアンス解説',convo:false,ph:'違いを知りたい語を入力（例：see / watch）',phs:'語を入力…',sys:'You explain nuance and usage differences of English words/phrases for Japanese learners, in Japanese, with examples.'},
  translate:{label:'翻訳',convo:false,ph:'日本語↔英語を翻訳します',phs:'文章を入力…',sys:'Translate between Japanese and English naturally. If the input is Japanese, give natural English; if English, give natural Japanese. Add a short note on nuance if helpful.'}
};
const CARD_SYS='You output ONLY JSON for an English vocab flashcard for a Japanese learner. Schema: {"term":string,"pron":IPA string,"mean":concise Japanese meaning,"exEn":natural English example,"exJa":Japanese translation of the example,"pos":array of ALL applicable Japanese parts of speech for this term (e.g. ["形容詞","名詞"]; if both a noun and adjective exist, include both. For phrases use ["フレーズ"] or ["句動詞"]),"other":a short Japanese note of extra info — for a phrase give similar expressions; for a word give other parts of speech/meanings or usage tips}. mean, exJa, pos and other MUST be in Japanese. No markdown, no code fences.';

const EXAMPLE_SYS='You generate everyday English for a Japanese learner. First detect the input language. If the input is JAPANESE: output 3 natural English expressions that convey it, the kind commonly used in daily life. If the input is ENGLISH: output 3 natural everyday example sentences that CONTAIN the given English word/phrase. Output ONLY JSON: {"items":[{"en":"English expression or sentence","ja":"its natural Japanese translation"}]} with EXACTLY 3 items. Keep them short, common and useful in daily life. No markdown, no code fences.';

function ensureThreads(){
  if(!Array.isArray(state.threads)) state.threads=[];
  if(state.threads.length===0 && !state.aiThreadSeed){
    ['chat','card','correct','example','nuance','translate'].forEach(k=>{
      state.threads.push({id:uid(),title:AI_MODES[k].label,mode:k,sys:'',messages:[],createdAt:now()});
    });
    state.aiThreadSeed=true; save();
  }
}
function getThread(id){ return state.threads.find(t=>t.id===id); }
function threadFunc(t){ return t.mode==='custom' ? {label:t.title,convo:true,ph:'メッセージを入力…',phs:'メッセージを入力…'} : (AI_MODES[t.mode]||AI_MODES.chat); }
function threadBadge(t){ return t.mode==='custom' ? 'カスタム指示' : (AI_MODES[t.mode]?AI_MODES[t.mode].label:'チューター'); }
function spkInk(){ return I.sparkle.replace('fill="currentColor"','fill="var(--ink-3)"'); }
function keyHintHtml(){ return `<div class="ai-hint">AI機能を使うには <b>${aiProviderName()}のAPIキー</b> が必要です。<br>「設定 → AI連携」でキーを入力してください。
  <button class="btn btn-primary" style="margin-top:10px;padding:9px 14px" onclick="setTab('settings');renderSettings()">設定をひらく</button></div>`; }

function aiProvider(){ return state.settings.aiProvider || 'openai'; }
function aiKey(){ return aiProvider()==='gemini' ? (state.settings.geminiKey||'') : (state.settings.apiKey||''); }
function aiEnabled(){ return aiProvider() !== 'none'; }
function aiReady(){ return aiEnabled() && !!aiKey(); }
function aiProviderName(){ return aiProvider()==='gemini' ? 'Gemini' : 'OpenAI'; }

function renderAI(){
  const v=document.getElementById('view-ai');
  if(!aiEnabled()){
    v.innerHTML=`
      <div class="topbar"><h1>AI</h1></div>
      <div class="empty" style="padding:46px 22px">${spkInk()}
        <div class="t">AI機能はオフです</div>
        <div class="d">設定でAIプロバイダー（OpenAI または 無料枠のあるGemini）を選ぶと、<br>チューター・添削・カード化などが使えます。</div>
        <button class="btn btn-primary" style="margin-top:16px;padding:11px 18px" onclick="setTab('settings');renderSettings()">設定をひらく</button>
      </div>`;
    return;
  }
  ensureThreads();
  if(activeThreadId && getThread(activeThreadId)) renderThread();

      <div><h1>AI</h1><div class="sub">スレッドごとに機能を使い分け</div></div>
      ${list.length?`<button class="btn btn-ghost" style="padding:8px 13px" onclick="aiEditMode=!aiEditMode;renderAI()">${aiEditMode?'完了':'並び替え・編集'}</button>`:''}
    </div>

function ntSync(){ const t=document.getElementById('ntTitle'); if(t) ntTitle=t.value; const p=document.getElementById('ntPrompt'); if(p) ntPrompt=p.value; }

    <h2>新しいスレッド</h2>
    <div class="mfield"><label>機能</label>
      <select id="ntFunc" onchange="ntSync();ntFunc=this.value;renderNewThread()">

function createThread(){
  ntSync();
  if(ntFunc==='custom' && !ntPrompt.trim()){ toast('カスタム指示を入力してください'); return; }
  const id=uid();
  state.threads.push({ id, title:(ntTitle.trim()||defaultTitle()), mode:ntFunc, sys:(ntFunc==='custom'?ntPrompt.trim():''), messages:[], createdAt:now() });
  save(); closeModal(); activeThreadId=id; aiEditMode=false; renderAI();
}
function renameThread(id){
  const t=getThread(id); if(!t) return;
  openModal(`
    <h2>スレッドを編集</h2>
    <div class="mfield"><label>名前</label><input id="rnTitle" value="${esc(t.title)}" /></div>
    ${t.mode==='custom'?`<div class="mfield"><label>AIへの指示（プロンプト）</label><textarea id="rnPrompt">${esc(t.sys||'')}</textarea></div>`:`<div class="mfield"><div class="d">機能：${esc(threadBadge(t))}</div></div>`}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveRename('${id}')">保存</button>
    </div>
    <button class="del-link" onclick="deleteThread('${id}')">このスレッドを削除</button>`);
}
function saveRename(id){
  const t=getThread(id); if(!t) return;
  const ti=document.getElementById('rnTitle').value.trim(); if(ti) t.title=ti;
  const p=document.getElementById('rnPrompt'); if(p) t.sys=p.value.trim();
  save(); closeModal(); renderAI();
}
function moveThread(id,dir){
  const i=state.threads.findIndex(t=>t.id===id); if(i<0) return;
  const j=i+dir; if(j<0||j>=state.threads.length) return;
  const arr=state.threads; [arr[i],arr[j]]=[arr[j],arr[i]];
  save(); renderAI();
}
function deleteThread(id){
  const t=getThread(id); if(!t) return;
  if(!confirm('「'+t.title+'」を削除しますか？会話も消えます。')) return;
  state.threads=state.threads.filter(x=>x.id!==id);
  if(activeThreadId===id) activeThreadId=null;
  save(); closeModal(); renderAI();
}

/* ---- single thread (chat) ---- */
function renderThread(){
  const v=document.getElementById('view-ai');
  const t=getThread(activeThreadId);
  if(!t){ activeThreadId=null; renderThreadList(); return; }
  const f=threadFunc(t);
  v.innerHTML=`
    <div class="topbar thread-top" style="gap:6px">
      <button class="icon-btn" style="box-shadow:none;background:transparent;width:38px" onclick="activeThreadId=null;renderAI()" aria-label="一覧へ戻る">${I.back}</button>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:1.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.title)}</h1>
        <div class="sub">${esc(threadBadge(t))}</div>
      </div>
      <button class="icon-btn" onclick="clearThread()" aria-label="会話をクリア" title="この会話を消去">${I.trash}</button>
    </div>
    ${!aiReady()?keyHintHtml():''}
    ${t.mode==='card'?`<div class="ai-hint" style="background:var(--green-soft)">単語やフレーズを送ると、意味・発音・例文を生成して<b>カードに保存</b>できます。例：「serendipity」</div>`:''}
    <div class="chat-log" id="chatLog">
      ${t.messages.length===0
        ? `<div class="empty" style="padding:30px 20px">${spkInk()}<div class="t">${esc(t.title)}</div><div class="d">${esc(f.ph)}</div></div>`
        : t.messages.map((m,i)=>msgHtml(m,i)).join('')}
    </div>
    <div class="chat-input">
      <textarea id="chatInput" rows="1" placeholder="${esc(f.phs)}" oninput="autoGrow(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!isMobile()){event.preventDefault();sendAI();}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendAI()" ${aiBusy?'disabled':''}>${I.send}</button>
    </div>`;
  const log=document.getElementById('chatLog'); if(log) log.scrollTop=log.scrollHeight;
}
function clearThread(){
  const t=getThread(activeThreadId); if(!t) return;
  if(t.messages.length && !confirm('この会話を消去しますか？')) return;
  t.messages=[]; save(); renderThread();
}
function msgHtml(m,i){
  if(m.role==='user') return `<div class="msg user">${esc(m.content)}</div>`;
  if(m.examples && m.examples.length){
    const blocks=m.examples.map((x,j)=>`
      <div class="ex-item">
        <div class="ex-en">${esc(x.en)} <button class="spk" style="display:inline-grid;vertical-align:middle;width:26px;height:26px" onclick="speak('${esc(x.en).replace(/'/g,"\\'")}')">${I.speaker}</button></div>
        ${x.ja?`<div class="ex-ja">${esc(x.ja)}</div>`:''}
        <button class="save-card" onclick="saveAIExample(${i},${j})">${I.plus} ノートに保存</button>
      </div>`).join('');
    return `<div class="msg ai"><div class="ex-list">${blocks}</div></div>`;
  }
  let extra='';
  if(m.card){ extra=`<button class="save-card" onclick="saveAICard(${i})">${I.plus} カードに保存</button>`; }
  const isErr = m.error || (typeof m.content==='string' && m.content.indexOf('⚠️')===0);
  if(isErr){ extra+=`<button class="retry-btn" onclick="retryAI(${i})">${I.refresh} 再試行</button>`; }
  return `<div class="msg ai">${esc(m.content)}${extra}</div>`;
}
function saveAIExample(i,j){
  const t=getThread(activeThreadId); if(!t) return;
  const m=t.messages[i]; if(!m||!m.examples) return;
  const x=m.examples[j]; if(!x) return;
  editText(null,{title:x.en||'', body:x.ja||''});
}
function saveAICard(i){
  const t=getThread(activeThreadId); if(!t) return;
  const m=t.messages[i]; if(!m||!m.card) return;
  const c=m.card;
  editCard(null,{term:c.term||'',pron:c.pron||'',mean:c.mean||'',exEn:c.exEn||'',exJa:c.exJa||'',pos:Array.isArray(c.pos)?c.pos:(c.pos?[c.pos]:[]),other:c.other||''});
}
function autoGrow(t){ t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,120)+'px'; }
function isMobile(){ return /Mobi|Android|iPhone/i.test(navigator.userAgent); }

async function sendAI(){
  if(aiBusy) return;
  const t=getThread(activeThreadId); if(!t) return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;
  if(!aiReady()){ toast(aiEnabled()?'設定でAPIキーを入力してください':'設定でAIをオンにしてください'); return; }
  inp.value=''; autoGrow(inp);
  t.messages.push({role:'user',content:text}); save();
  await generateReply(t, text);
}
function retryAI(i){
  if(aiBusy) return;
  const t=getThread(activeThreadId); if(!t) return;
  const m=t.messages[i];
  const isErr = m && (m.error || (typeof m.content==='string' && m.content.indexOf('⚠️')===0));
  if(!isErr) return;
  let text=m.retryFor;
  if(!text){ for(let k=i-1;k>=0;k--){ if(t.messages[k].role==='user'){ text=t.messages[k].content; break; } } }
  if(!text){ toast('再試行できる内容が見つかりません'); return; }
  t.messages.splice(i,1); save(); // remove the error bubble
  generateReply(t, text);
}
async function generateReply(t, text){
  aiBusy=true; renderThread();
  const log=document.getElementById('chatLog');
  if(log){ log.insertAdjacentHTML('beforeend','<div class="msg ai" id="typing"><div class="typing"><span></span><span></span><span></span></div></div>'); log.scrollTop=log.scrollHeight; }
  try{
    if(t.mode==='card'){
      const content=await callAI([{role:'system',content:CARD_SYS},{role:'user',content:text}],{json:true,temp:0.5});
      let card; try{ card=JSON.parse(content); }catch(e){ card=null; }
      if(card&&card.term){
        const posLine=(Array.isArray(card.pos)&&card.pos.length)?`\n品詞：${card.pos.join('・')}`:'';
        const otherLine=card.other?`\nその他：${card.other}`:'';
        t.messages.push({role:'assistant',content:`📘 ${card.term} ${card.pron||''}${posLine}\n意味：${card.mean||''}\n例：${card.exEn||''}\n　　${card.exJa||''}${otherLine}`,card});
      } else {
        t.messages.push({role:'assistant',content});
      }
    } else if(t.mode==='example'){
      const content=await callAI([{role:'system',content:EXAMPLE_SYS},{role:'user',content:text}],{json:true,temp:0.6});
      let items=[]; try{ const j=JSON.parse(content); items=Array.isArray(j)?j:(j.items||[]); }catch(e){ items=[]; }
      items=items.filter(x=>x&&x.en).slice(0,3).map(x=>({en:String(x.en),ja:x.ja?String(x.ja):''}));
      if(items.length){ t.messages.push({role:'assistant',content:items.map((x,k)=>`${k+1}. ${x.en}${x.ja?'\n　'+x.ja:''}`).join('\n\n'),examples:items}); }
      else { t.messages.push({role:'assistant',content}); }
    } else {
      const sys = t.mode==='custom' ? (t.sys||'You are a helpful assistant for a Japanese English-learner. Reply in Japanese unless asked otherwise.') : AI_MODES[t.mode].sys;
      const convo = t.mode==='custom' ? true : !!AI_MODES[t.mode].convo;
      const history = convo ? t.messages.slice(-10).map(m=>({role:m.role,content:m.content})) : [{role:'user',content:text}];
      const msgs=[{role:'system',content:sys},...history];
      const content=await callAI(msgs,{temp:0.7});
      t.messages.push({role:'assistant',content});
    }
  }catch(err){
    let msg=err.message||'エラーが発生しました';
    if(msg==='NO_KEY') msg='APIキーが未設定です。設定から入力してください。';
    else if(msg==='AI_OFF') msg='AIがオフです。設定からオンにしてください。';
    else if(/40[013]/.test(msg)) msg='APIキーが無効か、リクエストが拒否されました。設定を確認してください。';
    else if(/429/.test(msg)) msg=aiProvider()==='gemini'?'無料枠の上限に達した可能性があります。少し時間をおいて再試行してください。':'利用制限/残高切れの可能性があります（OpenAIの請求設定を確認）。';
    else if(/50[0234]/.test(msg)) msg='AIサーバーが一時的に混雑しています。少し待ってから、もう一度送信してください。';
    else if(/Failed to fetch|NetworkError/i.test(msg)) msg='通信に失敗しました。ネット接続を確認してください。';
    t.messages.push({role:'assistant',content:'⚠️ '+msg, error:true, retryFor:text});
  }
  save(); aiBusy=false; renderThread();
}
async function callOpenAI(messages,opts){
  const key=state.settings.apiKey;
  if(!key) throw new Error('NO_KEY');
  const body={ model:state.settings.model||'gpt-4o-mini', messages, temperature:(opts&&opts.temp!=null)?opts.temp:0.7 };
  if(opts&&opts.json) body.response_format={type:'json_object'};
  const res=await aiFetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify(body)
  });
  const data=await res.json();
  return data.choices[0].message.content.trim();
}
// fetch with one automatic retry on transient server errors (5xx)
async function aiFetch(url,init){
  for(let attempt=0; attempt<2; attempt++){
    let res;
    try{ res=await fetch(url,init); }
    catch(e){ if(attempt===0){ await new Promise(r=>setTimeout(r,1200)); continue; } throw e; }
    if(res.ok) return res;
    if(res.status>=500 && attempt===0){ await new Promise(r=>setTimeout(r,1500)); continue; }
    throw new Error('API '+res.status);
  }
}
async function callAI(messages,opts){
  opts=opts||{};
  const p=aiProvider();
  if(p==='none') throw new Error('AI_OFF');
  if(p==='gemini') return callGemini(messages,opts);
  return callOpenAI(messages,opts);
}
async function callGemini(messages,opts){
  const key=state.settings.geminiKey;
  if(!key) throw new Error('NO_KEY');
  const model=state.settings.geminiModel||'gemini-2.5-flash';
  const sys=messages.filter(m=>m.role==='system').map(m=>m.content).join('\n');
  const contents=messages.filter(m=>m.role!=='system').map(m=>({
    role: m.role==='assistant' ? 'model' : 'user',
    parts:[{text:m.content}]
  }));
  const body={ contents, generationConfig:{ temperature:(opts.temp!=null)?opts.temp:0.7 } };
  if(sys) body.systemInstruction={ parts:[{text:sys}] };
  if(opts.json) body.generationConfig.responseMimeType='application/json';
  const url='https://generativelanguage.googleapis.com/v1beta/models/'+encodeURIComponent(model)+':generateContent?key='+encodeURIComponent(key);
  const res=await aiFetch(url,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  const parts=cand && cand.content && cand.content.parts;
  if(!parts || !parts.length) throw new Error('EMPTY');
  return parts.map(p=>p.text||'').join('').trim();
}

/* ---------- AI fill inside card editor ---------- */
async function aiFillCard(){
  if(!aiReady()){ toast(aiEnabled()?'設定でAPIキーを入力してください':'設定でAIをオンにしてください'); return; }
  const term=document.getElementById('cTerm').value.trim();
  if(!term){ toast('先に単語を入力してください'); return; }
  const btn=document.getElementById('aiGenBtn'); btn.disabled=true; btn.innerHTML=I.sparkle+' 生成中…';
  try{
    const sys='Output ONLY JSON for an English vocab flashcard for a Japanese learner. Schema: {"pron":IPA,"mean":concise Japanese meaning,"exEn":natural English example,"exJa":Japanese translation,"pos":array of ALL applicable Japanese parts of speech (e.g. ["形容詞","名詞"]),"other":short Japanese note of extra info (similar expressions for phrases, other parts of speech/meanings or usage tips for words)}. Japanese for mean/exJa/pos/other. No markdown.';
    const content=await callAI([{role:'system',content:sys},{role:'user',content:term}],{json:true,temp:0.4});
    const c=JSON.parse(content);
    if(c.pron) document.getElementById('cPron').value=c.pron;
    if(c.mean) document.getElementById('cMean').value=c.mean;
    if(c.exEn) document.getElementById('cExEn').value=c.exEn;
    if(c.exJa) document.getElementById('cExJa').value=c.exJa;
    if(Array.isArray(c.pos)&&c.pos.length) document.getElementById('cPos').value=c.pos.join(', ');
    else if(typeof c.pos==='string'&&c.pos) document.getElementById('cPos').value=c.pos;
    if(c.other) document.getElementById('cOther').value=c.other;
    // a word that got meaning generated should default to the 単語 folder (out of 受信箱)
    const sel=document.getElementById('cFolder'); const ib=inboxFolderId();
    if(sel && ib && sel.value===ib){ const wid=getWordFolderId(); ensureFolderOption(sel,wid,'単語'); sel.value=wid; toast('生成しました（保存先を「単語」に変更）'); }
    else toast('生成しました（確認して保存）');
  }catch(err){ toast('生成に失敗: '+(/40[013]/.test(err.message)?'キーが無効':/429/.test(err.message)?'利用上限の可能性':/50[0234]/.test(err.message)?'サーバー混雑（再試行を）':'通信エラー')); }
  btn.disabled=false; btn.innerHTML=I.sparkle+' AIで意味・例文を生成';
}

/* ====================================================================

   ==================================================================== */
