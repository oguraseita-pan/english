    <div class="section-title">AI連携</div>
    <div class="set-group">
      <div class="field">
        <label>AIプロバイダー</label>
        <select id="setProvider" onchange="state.settings.aiProvider=this.value;save();renderSettings()">
          <option value="none" ${s.aiProvider==='none'?'selected':''}>使わない（AIオフ）</option>
          <option value="openai" ${s.aiProvider==='openai'?'selected':''}>OpenAI（ChatGPT）</option>
          <option value="gemini" ${s.aiProvider==='gemini'?'selected':''}>Google Gemini（無料枠あり）</option>
        </select>
        <div class="d">AIは任意です。「使わない」を選んでも、ノート・暗記・クイズ・読み上げなどキー不要の機能はすべて使えます。</div>
      </div>
      ${s.aiProvider==='openai'?`
      <div class="field">
        <label>OpenAI APIキー</label>
        ${(s.apiKey && !keyOpen)
          ? `<div class="key-set"><span class="lbl">${I.check} 設定済み（••••${esc(s.apiKey.slice(-4))}）</span><button class="btn btn-ghost" style="padding:7px 13px" onclick="keyOpen=true;renderSettings()">変更</button></div>`
          : `<input type="password" id="setKey" value="${esc(s.apiKey)}" placeholder="sk-..." autocomplete="off" />`}
        <div class="d">キーはこの端末のブラウザにのみ保存され、OpenAIに直接送信されます。<a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">キーを取得 ↗</a></div>
      </div>
      <div class="field">
        <label>モデル</label>
        <select id="setModel">
          <option value="gpt-4o-mini" ${s.model==='gpt-4o-mini'?'selected':''}>gpt-4o-mini（安価・推奨）</option>
          <option value="gpt-4o" ${s.model==='gpt-4o'?'selected':''}>gpt-4o（高性能）</option>
          <option value="gpt-4.1-mini" ${s.model==='gpt-4.1-mini'?'selected':''}>gpt-4.1-mini</option>
        </select>
        <div class="d">利用料はOpenAIアカウントに従量課金されます。mini系なら数百回でも数十円程度です。</div>
      </div>
      <button class="btn btn-primary full" style="padding:13px" onclick="saveSettings()">${I.check} 保存</button>
      `:''}
      ${s.aiProvider==='gemini'?`
      <div class="field">
        <label>Gemini APIキー</label>
        ${(s.geminiKey && !keyOpen)
          ? `<div class="key-set"><span class="lbl">${I.check} 設定済み（••••${esc(s.geminiKey.slice(-4))}）</span><button class="btn btn-ghost" style="padding:7px 13px" onclick="keyOpen=true;renderSettings()">変更</button></div>`
          : `<input type="password" id="setGeminiKey" value="${esc(s.geminiKey)}" placeholder="AIza..." autocomplete="off" />`}
        <div class="d">Google AI Studioで無料取得でき（カード登録不要）、無料枠内なら料金はかかりません。<a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">キーを取得 ↗</a></div>
      </div>
      <div class="field">
        <label>モデル</label>
        <select id="setGeminiModel">
          <option value="gemini-2.5-flash" ${s.geminiModel==='gemini-2.5-flash'?'selected':''}>gemini-2.5-flash（推奨）</option>
          <option value="gemini-2.5-flash-lite" ${s.geminiModel==='gemini-2.5-flash-lite'?'selected':''}>gemini-2.5-flash-lite（無料枠が多め）</option>
          <option value="gemini-2.5-pro" ${s.geminiModel==='gemini-2.5-pro'?'selected':''}>gemini-2.5-pro（高性能）</option>
        </select>
        <div class="d">無料枠は1分・1日あたりの回数に上限があり、超えると一時的に制限されます。入力内容がGoogleの改善に使われる場合があります。</div>
      </div>
      <button class="btn btn-primary full" style="padding:13px" onclick="saveSettings()">${I.check} 保存</button>
      `:''}
      ${s.aiProvider==='none'?`<div class="field" style="text-align:center;color:var(--ink-2)">AIはオフです。いつでもここからオンにできます。</div>`:''}
    </div>

    <div class="section-title">学習</div>
    <div class="set-group">
      <div class="set-row"><div><div class="l">1日の新規カード上限</div></div>

        </select></div>
      <div class="set-row slider-row"><div><div class="l">読み上げの速さ</div><div class="d">${(s.ttsRate).toFixed(1)}x</div></div>
        <input type="range" min="0.5" max="1.3" step="0.1" value="${s.ttsRate}" oninput="state.settings.ttsRate=parseFloat(this.value);this.parentNode.querySelector('.d').textContent=parseFloat(this.value).toFixed(1)+'x';save()" /></div>
      <div class="set-row"><div><div class="l">ダークモード</div></div>
        <label class="switch"><input type="checkbox" ${s.dark?'checked':''} onchange="state.settings.dark=this.checked;applyTheme();save()"><span class="sl"></span></label></div>

    <div class="section-title">データ（バックアップ）</div>
    <div class="set-group">
      <div class="set-row" style="cursor:pointer" onclick="exportData()"><div><div class="l">バックアップを書き出す</div><div class="d">全データをJSONファイルで保存</div></div><span class="chev">${I.chev}</span></div>
      <div class="set-row" style="cursor:pointer" onclick="document.getElementById('importFile').click()"><div><div class="l">バックアップを読み込む</div><div class="d">JSONから復元（上書き）</div></div><span class="chev">${I.chev}</span></div>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importData(this)" />

    <div style="text-align:center;color:var(--ink-3);font-size:.74rem;margin-top:10px">Sprout · データはこの端末に保存されます<br>定期的にバックアップの書き出しをおすすめします</div>
  `;
}
function saveSettings(){
  const prov=document.getElementById('setProvider'); if(prov) state.settings.aiProvider=prov.value;
  const k=document.getElementById('setKey'); if(k) state.settings.apiKey=k.value.trim();
  const m=document.getElementById('setModel'); if(m) state.settings.model=m.value;
  const gk=document.getElementById('setGeminiKey'); if(gk) state.settings.geminiKey=gk.value.trim();
  const gm=document.getElementById('setGeminiModel'); if(gm) state.settings.geminiModel=gm.value;
  keyOpen=false;
  save(); toast('設定を保存しました'); renderSettings();
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='sprout-backup-'+todayStr()+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('バックアップを書き出しました');
}
function importData(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data.cards||!data.folders) throw new Error();
      if(!confirm('現在のデータを上書きして読み込みますか？')) return;
      state=Object.assign(defaultState(),data); save(); applyTheme(); toast('復元しました'); renderSettings();
    }catch(e){ toast('読み込めませんでした（ファイル形式を確認）'); }
  };
  r.readAsText(file); input.value='';
}
function resetAll(){
  if(!confirm('本当にすべてのデータ（カード・ノート・設定）を消去しますか？この操作は取り消せません。')) return;
  localStorage.removeItem(STORE_KEY); load(); seed(); applyTheme(); toast('初期化しました'); setTab('home');
}

/* ====================================================================
   MODAL / THEME / LOGO / INIT
   ==================================================================== */
function openModal(html){ const m=document.getElementById('modal'); m.innerHTML='<div class="grip"></div><button class="modal-close" onclick="closeModal()" aria-label="閉じる">✕</button>'+html; document.getElementById('modalBg').classList.add('open'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.settings.dark?'dark':'light');
  const tc=document.querySelector('meta[name="theme-color"]');
  if(tc) tc.setAttribute('content', state.settings.dark?'#14181A':'#F6F4EE');
}
function logoSvg(size,cls){
  return `<svg class="${cls||''}" width="${size}" height="${size}" viewBox="0 0 120 120" fill="none" style="${cls?'':'flex:none'}">
    <path d="M60 100V52" stroke="${cls?'#F4F1E8':'var(--green)'}" stroke-width="7" stroke-linecap="round"/>
    <path d="M60 62C60 40 76 28 96 28C96 50 80 62 60 62Z" fill="${cls?'#F4F1E8':'var(--amber)'}"/>
    <path d="M60 74C60 56 46 46 28 46C28 64 44 74 60 74Z" fill="${cls?'rgba(244,241,232,.7)':'var(--green)'}"/>
  </svg>`;
}

function init(){
  load();
  if(!state.seeded) seed();
  ensureThreads();
  applyTheme();
  // tab bar
  document.querySelectorAll('.tabbar button').forEach(b=>{
    b.addEventListener('click',()=>setTab(b.dataset.tab));
  });
  // modal close on backdrop
  document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });
  // build settings once (it's rendered on demand too)
  renderSettings();
  renderHome();
  // register a tiny service worker for offline (best-effort, ignored on file://)
  if('serviceWorker' in navigator && location.protocol==='https:'){
    const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',()=>{});`;
    try{
      const url=URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}));
      navigator.serviceWorker.register(url).catch(()=>{});
    }catch(e){}
  }
}
init();
</script>
