/* ---------- SRS engine ---------- */
// 忘却曲線プリセット。good/easyの伸び率・初期定着日数・easeの増減・上限日数を制御
const SRS_PRESETS = {
  slow:     { gradeGood:1, gradeEasy:2, goodMul:1.0, easyMul:1.15, easyBonus:0.10, hardMul:1.1, label:'ゆっくり' },
  standard: { gradeGood:1, gradeEasy:3, goodMul:1.0, easyMul:1.3,  easyBonus:0.15, hardMul:1.2, label:'標準' },
  fast:     { gradeGood:2, gradeEasy:4, goodMul:1.15,easyMul:1.45, easyBonus:0.20, hardMul:1.3, label:'ハイペース' }
};
function srsCfg(){
  const s=state.settings||{};
  const p=SRS_PRESETS[s.srsPreset]||SRS_PRESETS.standard;
  const cap=(typeof s.srsMaxIvl==='number'&&s.srsMaxIvl>0)?s.srsMaxIvl:0; // 0=無制限
  return Object.assign({}, p, { maxIvl:cap });
}
function capIvl(d){ const c=srsCfg().maxIvl; return c>0?Math.min(d,c):d; }
function fmtDays(d){ if(d>=365){return (Math.round(d/365*10)/10)+'年';} if(d>=30){return Math.round(d/30)+'ヶ月';} return d+'日'; }
function previewIvl(c,r){ return previewIvlSrs(c.srs,r); }
function previewIvlSrs(s,r){
  const cf=srsCfg();
  if(s.state==='new'||s.state==='learning'){
    if(r===0) return '<1分'; if(r===1) return '10分';
    if(r===2) return fmtDays(capIvl(cf.gradeGood));
    return fmtDays(capIvl(cf.gradeEasy));
  }
  if(r===0) return '<1分';
  if(r===1) return fmtDays(capIvl(Math.max(1,Math.round(s.interval*cf.hardMul))));
  if(r===2) return fmtDays(capIvl(Math.max(1,Math.round(s.interval*s.ease*cf.goodMul))));
  return fmtDays(capIvl(Math.max(1,Math.round(s.interval*(s.ease+cf.easyBonus)*cf.easyMul))));
}
function schedule(c,r){ scheduleSrs(c.srs,r); }
function scheduleSrs(s,r){
  s.lastGrade=r;
  const cf=srsCfg();
  if(s.state==='new'||s.state==='learning'){
    if(r===0){ s.state='learning'; s.interval=0; s.due=now()+60*1000; }
    else if(r===1){ s.state='learning'; s.due=now()+10*60*1000; }
    else if(r===2){ s.state='review'; s.interval=capIvl(cf.gradeGood); s.reps=1; s.due=now()+s.interval*DAY; }
    else { s.state='review'; s.interval=capIvl(cf.gradeEasy); s.reps=1; s.due=now()+s.interval*DAY; }
  } else {
    if(r===0){ s.lapses++; s.ease=Math.max(1.3,s.ease-0.2); s.state='learning'; s.interval=0; s.reps=0; s.due=now()+60*1000; }
    else {
      if(r===1){ s.ease=Math.max(1.3,s.ease-0.15); s.interval=capIvl(Math.max(1,Math.round(s.interval*cf.hardMul))); }
      else if(r===2){ s.interval=capIvl(Math.max(1,Math.round(s.interval*s.ease*cf.goodMul))); }
      else { s.ease+=cf.easyBonus; s.interval=capIvl(Math.max(1,Math.round(s.interval*s.ease*cf.easyMul))); }
      s.reps++; s.state='review'; s.due=now()+s.interval*DAY;
    }
  }
}
// ---- persistent progress for preset/idiom items ----
function newSrs(){ return {state:'new',due:0,interval:0,ease:2.5,reps:0,lapses:0}; }
function getProg(key){ if(!state.progress) state.progress={}; if(!state.progress[key]) state.progress[key]=newSrs(); return state.progress[key]; }
function presetKey(catId,lvlId,term){ return 'p|'+catId+'|'+lvlId+'|'+String(term).toLowerCase(); }
function idiomKeySig(catId,lvlId,sig){ return 'i|'+catId+'|'+lvlId+'|'+String(sig); }
function masteryLabel(s){ if(!s||s.state==='new') return ['未学習','var(--ink-3)']; if(s.state==='learning') return ['学習中','var(--amber-d)']; if(s.interval>=21) return ['習得済み','var(--blue)']; return ['復習中','var(--green)']; }
function rankUnmastered(s){ if(s.state==='new') return 0; if(s.state==='learning') return 1; return 2 + Math.min(s.reps,8)*0.1 + Math.min(s.interval,90)*0.001; }
// 未習得＝まだ習得済みでない（new/learning/復習中）
function isUnmastered(s){ return !s || s.state==='new' || s.state==='learning' || (s.interval||0)<21; }
// 復習＝直近の判定が不正確（lastGrade 0/1）で終わっているもの
function isReviewItem(s){ return !!s && s.lastGrade!=null && s.lastGrade<=1; }
// 一覧上部に出すステータス別件数（忘却曲線の状態で動的に変化）
function statusCounts(pool){
  let n=0,l=0,m=0;
  pool.forEach(p=>{ const s=p.srs; if(!s||s.state==='new') n++; else if(s.state==='learning'||(s.interval||0)<21) l++; else m++; });
  return {新規:n, 学習中:l, 習得済:m};
}
function unmasteredCount(pool){ return pool.filter(p=>isUnmastered(p.srs)).length; }
function reviewCount(pool){ return pool.filter(p=>isReviewItem(p.srs)).length; }
// select up to 10 items from a pool (each item carries .srs) by learning style
function selectItems(pool, style){
  const t=now();
  let arr;
  if(style==='random'){ arr=shuffle(pool.slice()); }
  else if(style==='unmastered'){ arr=pool.filter(p=>isUnmastered(p.srs)).sort((a,b)=>rankUnmastered(a.srs)-rankUnmastered(b.srs)); if(!arr.length) arr=pool.slice().sort((a,b)=>rankUnmastered(a.srs)-rankUnmastered(b.srs)); }
  else if(style==='review'){ arr=pool.filter(p=>isReviewItem(p.srs)).sort((a,b)=>(a.srs.due||0)-(b.srs.due||0)); }
  else if(style==='order'){ arr=pool.slice(); }
  else { // 'srs' 忘却曲線：期限到来＋新規を優先、足りなければ近い順で補完
    const due=pool.filter(p=>p.srs.state!=='new'&&p.srs.due<=t).sort((a,b)=>a.srs.due-b.srs.due);
    const news=pool.filter(p=>p.srs.state==='new');
    const rest=pool.filter(p=>p.srs.state!=='new'&&p.srs.due>t).sort((a,b)=>a.srs.due-b.srs.due);
    arr=[...due,...news,...rest];
  }
  return arr.slice(0,10);
}
// ---- pools ----
function deckPool(folderId){ return (folderId===null?Object.values(state.cards):cardsInTree(folderId)).filter(c=>c.type!=='text'); }
function presetPool(catId,lvlId){
  const cat=PRESET_LIB.find(c=>c.id===catId); if(!cat) return [];
  if(lvlId==='__all__'){
    const out=[]; cat.levels.forEach(l=>l.words.forEach(w=>{ const c=presetWord(w); c.srs=getProg(presetKey(catId,l.id,c.term)); out.push(c); })); return out;
  }
  const lv=cat.levels.find(l=>l.id===lvlId); if(!lv) return [];
  return lv.words.map(w=>{ const c=presetWord(w); c.srs=getProg(presetKey(catId,lvlId,c.term)); return c; });
}
function idiomFlashPool(catId,lvlId){
  const cat=IDIOM_LIB.find(c=>c.id===catId); if(!cat) return [];
  if(lvlId==='__all__'){
    const out=[]; cat.levels.forEach(l=>l.items.forEach(it=>out.push({ term:it[1], pron:'', mean:it[2]||'', exEn:it[0].replace('____',it[1]), exJa:'', pos:['熟語'], other:'', srs:getProg(idiomKeySig(catId,l.id,it[1])) }))); return out;
  }
  const lv=cat.levels.find(l=>l.id===lvlId); if(!lv) return [];
  return lv.items.map(it=>({ term:it[1], pron:'', mean:it[2]||'', exEn:it[0].replace('____',it[1]), exJa:'', pos:['熟語'], other:'', srs:getProg(idiomKeySig(catId,lvlId,it[1])) }));
}
// choiceイディオムの集約プール（__all__対応）
function idiomChoicePool(catId,lvlId){
  const cat=IDIOM_LIB.find(c=>c.id===catId); if(!cat) return [];
  const levels = lvlId==='__all__' ? cat.levels : cat.levels.filter(l=>l.id===lvlId);
  const out=[];
  levels.forEach(l=>l.items.forEach(raw=>out.push({ raw, lid:l.id, srs:getProg(idiomKeySig(catId,l.id,raw[0])) })));
  return out;
}

function startSession(folderId, style){
  style = style||'srs';
  const pool=deckPool(folderId);
  if(!pool.length){ toast('このデッキにはカードがありません'); return; }
  const ordered = style==='order' ? pool.slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)) : pool;
  startStudy(ordered, style, 'オリジナルデッキ');
}
function startPreset(catId, levelId, style){
  const cat=PRESET_LIB.find(c=>c.id===catId); if(!cat){ toast('カテゴリが見つかりません'); return; }

function showWordList(kind, catId, levelId){

  if(kind==='idiomg'){
    const g=parseInt(catId,10); const r=idiomGroupRange(g);
    pool=idiomGroupItems(g).map(it=>({ term:it.answer, pron:'', mean:it.mean, exEn:(it.q||'').replace('____',it.answer), exJa:'', pos:['熟語'], other:'', srs:getProg(idiomKeyU(it)) }));
    name='熟語 '+r[0]+'–'+r[1];
    wordList={ pool, name, kind:'idiomg', gIdx:g, openIdx:null, grouped:false };
    renderWordList(); return;
  }
  if(kind==='preset'){
    const c=PRESET_LIB.find(x=>x.id===catId); if(!c){ toast('見つかりません'); return; }
    const lvName = all ? 'すべて' : (c.levels.find(x=>x.id===levelId)||{}).name;
    if(!lvName){ toast('見つかりません'); return; }
    if(all){ pool=[]; c.levels.forEach(l=>l.words.forEach(w=>{ const o=presetWord(w); o.srs=getProg(presetKey(catId,l.id,o.term)); o._lv=l.name; pool.push(o); })); }
    else pool=presetPool(catId,levelId);
    name=c.name+' / '+lvName;
  } else {
    const c=IDIOM_LIB.find(x=>x.id===catId); if(!c){ toast('見つかりません'); return; }

    if(!lvName){ toast('見つかりません'); return; }
    name=c.name+' / '+lvName;
    if(c.fmt==='choice'){
      pool=idiomChoicePool(catId,levelId).map(p=>{ const o=idiomItem(p.raw,'choice'); const lv=c.levels.find(l=>l.id===p.lid); return { term:o.answer, mean:o.mean, exEn:o.q.replace('____',o.answer), exJa:'', pos:['熟語'], other:'', srs:p.srs, _lv:lv?lv.name:'' }; });
    } else if(all){
      pool=[]; c.levels.forEach(l=>l.items.forEach(it=>pool.push({ term:it[1], pron:'', mean:it[2]||'', exEn:it[0].replace('____',it[1]), exJa:'', pos:['熟語'], other:'', srs:getProg(idiomKeySig(catId,l.id,it[1])), _lv:l.name })));
    } else pool=idiomFlashPool(catId,levelId);
  }
  wordList={ pool, name, kind, catId, levelId, openIdx:null, grouped:all };
  renderWordList();
}
function renderWordList(){
  const v=document.getElementById('view-study');

function setupWlSticky(){

function startIdiomU(g, style, fmt){
  style=style||'srs';
  const r=idiomGroupRange(g); const name='熟語 '+r[0]+'–'+r[1];
  closeModal();
  if(fmt==='flash'){
    const cards=idiomGroupCards(g);
    if(!cards.length){ toast('この範囲は準備中です'); return; }
    startStudy(cards, style, name); // selectItems + カード保存ボタンを再利用
    return;
  }
  // 4択穴埋め
  const pool=idiomGroupPool(g);

  if(!picked.length){ toast(style==='review'?'復習対象がありません':(style==='unmastered'?'未習得の項目がありません':'対象がありません')); return; }
  const all=idiomAllItems();
  const items=picked.map(p=>{ const o=makeIdiomChoiceItem(p.raw, all); o.srs=p.srs; return o; });
  idiom={ catName:name, fmt:'choice', items, idx:0, answered:false, userAns:null, userAnsText:'', correct:null, score:0, log:[], openIdx:null, isU:true, gIdx:g, style, fmtU:'choice' };
  renderIdiom();
}
function idiomLevelPick(catId){

function idiomStylePick(catId, levelId){
  const cat=IDIOM_LIB.find(c=>c.id===catId); if(!cat){ toast('カテゴリが見つかりません'); return; }
  const lvName = levelId==='__all__' ? 'すべて' : (cat.levels.find(l=>l.id===levelId)||{}).name;

  const pool = cat.fmt==='choice' ? idiomChoicePool(catId,levelId) : idiomFlashPool(catId,levelId);
  openModal(`
    <h2>${esc(cat.name)} / ${esc(lvName)}</h2>

function startIdiom(catId, levelId, style){
  style=style||'srs';
  const cat=IDIOM_LIB.find(c=>c.id===catId); if(!cat){ toast('カテゴリが見つかりません'); return; }
  const lvName = levelId==='__all__' ? 'すべて' : (cat.levels.find(l=>l.id===levelId)||{}).name;
  if(!lvName){ toast('レベルが見つかりません'); return; }
  closeModal();
  if(cat.fmt==='choice'){
    // 進捗を持つプール → スタイルで最大10問を選択
    const pool=idiomChoicePool(catId,levelId);
    if(!pool.length){ toast('この教材は準備中です'); return; }
    const picked=selectItems(pool, style);
    if(!picked.length){ toast(style==='review'?'復習対象がありません':'対象がありません'); return; }
    const items=picked.map(p=>{ const o=idiomItem(p.raw,'choice'); o.srs=p.srs; return o; });
    idiom={ catName:cat.name+' / '+lvName, fmt:'choice', items, idx:0, answered:false, userAns:null, userAnsText:'', correct:null, score:0, log:[], openIdx:null, catId, levelId, style };
    renderIdiom(); return;
  }
  // フラッシュカード：進捗付きプールをスタイルで選択
  const fpool=idiomFlashPool(catId,levelId);
  if(!fpool.length){ toast('この教材は準備中です'); return; }
  startStudy(fpool, style, cat.name+' / '+lvName);
}
function blankHtml(q){ return esc(q).replace('____','<span style="display:inline-block;min-width:64px;border-bottom:2px solid var(--green);text-align:center;font-weight:700;color:var(--green)">　？　</span>'); }
function restartIdiom(){
  if(idiom&&idiom.isU){ const g=idiom.gIdx,s=idiom.style; idiom=null; startIdiomU(g,s,'choice'); return; }
  if(!idiom||!idiom.catId) return; const c=idiom.catId,l=idiom.levelId,s=idiom.style||'srs'; idiom=null; startIdiom(c,l,s);
}
function idiomContinue(){
  if(idiom&&idiom.isU){ const g=idiom.gIdx,s=idiom.style;
    if(s==='review'||s==='unmastered'){ const left=selectItems(idiomGroupPool(g),s); if(!left.length){ toast(s==='review'?'復習対象はもうありません 🎉':'未習得の項目はもうありません 🎉'); return; } }
    idiom=null; startIdiomU(g,s,'choice'); return;
  }
  if(!idiom||!idiom.catId) return; const c=idiom.catId,l=idiom.levelId,s=idiom.style||'srs';
  if(s==='review'||s==='unmastered'){ const pool=idiomChoicePool(c,l); const left=selectItems(pool,s); if(!left.length){ toast(s==='review'?'復習対象はもうありません 🎉':'未習得の項目はもうありません 🎉'); return; } }

}

function idiomFeedback(it){

      ${(!ok&&idiom.fmt==='fill')?`<div style="margin-top:6px"><div class="lab">あなたの解答</div><div>${esc(idiom.userAnsText||'(無回答)')}</div></div>`:''}

      <div style="margin-top:6px"><div class="lab">意味・ポイント</div><div>${esc(it.mean)}</div></div>
    </div>

function pickIdiomChoice(i){
  if(idiom.answered) return;
  const it=idiom.items[idiom.idx];
  idiom.userAns=i; idiom.correct=(i===it.ansIdx);
  if(idiom.correct) idiom.score++;
  if(it.srs){ scheduleSrs(it.srs, idiom.correct?2:0); const d=todayStr(); state.stats.reviews[d]=(state.stats.reviews[d]||0)+1; updateStreak(); incDaily('idioms'); save(); }
  pushIdiomLog(); idiom.answered=true; renderIdiom();
}
function checkIdiomFill(){
  if(idiom.answered) return;
  const it=idiom.items[idiom.idx];
  const inp=document.getElementById('idiomInput'); const val=inp?inp.value:'';
  idiom.userAnsText=val;
  idiom.correct = normTxt(val)===normTxt(it.answer) && normTxt(val)!=='';
  if(idiom.correct) idiom.score++;
  pushIdiomLog(); idiom.answered=true; renderIdiom();
}
function pushIdiomLog(){
  const it=idiom.items[idiom.idx];
  idiom.log.push({ q:it.q, answer:it.answer, mean:it.mean, correct:idiom.correct, userAns: idiom.fmt==='fill'?(idiom.userAnsText||''):((it.choices&&it.choices[idiom.userAns])||'') });
}

function saveCurrentStudyCard(){ const c=session&&session.items[session.qi]; if(c){ const o={term:c.term, mean:c.mean, pron:c.pron, exEn:c.exEn, exJa:c.exJa, pos:c.pos, other:c.other}; saveItemAsCard(o, isIdiomTerm(o)?'idiom':'word'); } }
// ===== メモ（term基準でユーザーメモを保存）=====
function memoKey(c){ return 'm|'+String((c&&c.term)||'').toLowerCase(); }
function getMemo(c){ return (state.memos&&state.memos[memoKey(c)])||''; }
function setMemoFor(c,txt){ if(!state.memos) state.memos={}; const k=memoKey(c); txt=String(txt||'').trim(); if(txt) state.memos[k]=txt; else delete state.memos[k]; save(); }
function onStudyMemoInput(el){ const c=session&&session.items[session.qi]; if(c) setMemoFor(c, el.value); }
// ===== ブックマーク（ノートの「ブックマーク」フォルダに保存）=====
function isBookmarked(term){ const f=Object.values(state.folders).find(x=>x.name==='ブックマーク'&&x.parentId===null); if(!f) return false; return Object.values(state.cards).some(c=>c.type!=='text'&&c.folderId===f.id&&String(c.term||'').toLowerCase()===String(term||'').toLowerCase()); }
function toggleBookmarkItem(o){
  if(!o||!o.term) return false;
  const f=ensureFolder('ブックマーク');
  const ex=Object.values(state.cards).find(c=>c.type!=='text'&&c.folderId===f.id&&String(c.term||'').toLowerCase()===String(o.term).toLowerCase());
  if(ex){ delete state.cards[ex.id]; save(); toast('ブックマークを解除しました'); return false; }
  const id=uid();
  state.cards[id]={id,folderId:f.id,term:String(o.term),pron:o.pron||'',mean:o.mean||'',exEn:o.exEn||'',exJa:o.exJa||'',other:o.other||'',pos:Array.isArray(o.pos)?o.pos:[],srs:{state:'new',due:now(),interval:0,ease:2.5,reps:0,lapses:0},createdAt:now()};
  save(); toast('「'+o.term+'」をブックマークに追加'); return true;
}
function toggleBookmarkStudy(){ const c=session&&session.items[session.qi]; if(!c) return; toggleBookmarkItem({term:c.term,pron:c.pron,mean:c.mean,exEn:c.exEn,exJa:c.exJa,pos:c.pos,other:c.other}); renderStudySession(); }

function startStudy(pool, style, catName){
  const items=selectItems(pool, style);

  closeModal();
  session={ items, qi:0, total:items.length, flipped:false, exShown:false, results:[], openIdx:null, catName:catName||'学習', style, pool, sourceStyle:style };

function flipCard(){
  if(session.flipped) return;

  const c=session.items[session.qi];
  if(c){ const isId=c.pos&&c.pos.indexOf('熟語')>=0; if(isId&&c.exEn) speak(c.exEn); else if(c.term) speak(c.term); }   // 熟語は例文、単語は語を読み上げ
  renderStudySession();

function gradeStudy(r){

const READ_GENRES=[['daily','日常会話'],['business','ビジネス'],['essay','エッセイ'],['novel','小説'],['news','ニュース'],['science','科学・技術'],['custom','自由に指定']];
const READ_LEVELS=[['A2','A2','初級'],['B1','B1','中級'],['B2','B2','中上級'],['C1','C1','上級']];
const READ_LENGTHS=[[100,'短い'],[200,'普通'],[400,'長い']];
const READ_GENRE_DESC={news:'a short news article',business:'a business / workplace scenario text',novel:'a short fictional story excerpt',daily:'an everyday conversation or diary-style text',essay:'a short opinion essay',science:'an accessible science / technology explainer'};
const READ_LEVEL_DESC={A2:'CEFR A2 (elementary). Use simple, high-frequency vocabulary and short, clear sentences.',B1:'CEFR B1 (intermediate). Everyday vocabulary with some variety and moderate sentence length.',B2:'CEFR B2 (upper-intermediate). Varied vocabulary, some abstract ideas and more complex sentences.',C1:'CEFR C1 (advanced). Rich, precise and idiomatic vocabulary with complex, nuanced sentences.'};

function readingSetup(){
  reading={stage:'setup', genre:(reading&&reading.genre)||'news', level:(reading&&reading.level)||'B1', length:(reading&&reading.length)||200, custom:(reading&&reading.custom)||''};

}
function readPick(field,val){ if(reading){ reading[field]=val; renderReading(); } }
function readLabel(field){
  if(field==='genre' && reading.genre==='custom') return '自由';
  const map={genre:READ_GENRES,level:READ_LEVELS,length:READ_LENGTHS};
  const o=(map[field]||[]).find(x=>String(x[0])===String(reading[field]));

}
function readPills(field,opts){

    return `<button class="opt-pill${sel}" onclick="readPick('${field}',${val})">${o[1]}${sub}</button>`;
  }).join('')+'</div>';
}
let _passSpeaking=false;

function readingPassageHtml(en){

    return esc(p);

}

function readingExit(){ try{ speechSynthesis.cancel(); }catch(_){}; _passSpeaking=false; reading=null; renderStudy(); }
function readingToSetup(){ if(!reading) return; try{ speechSynthesis.cancel(); }catch(_){}; _passSpeaking=false; reading.stage='setup'; renderReading(); }
function readingSetupBack(){ if(reading&&reading.en){ reading.stage='read'; renderReading(); } else { readingExit(); } }
async function startReading(){
  if(!aiReady()){ toast(aiEnabled()?'設定でAPIキーを入力してください':'リーディングにはログイン（またはAI設定）が必要です'); return; }
  let topicDesc;
  if(reading.genre==='custom'){
    const c=(reading.custom||'').trim();
    if(!c){ toast('内容を入力してください'); return; }
    topicDesc=`a passage on this specific topic / request: "${c}"`;
  } else { topicDesc=READ_GENRE_DESC[reading.genre]||'a short article'; }
  try{ speechSynthesis.cancel(); }catch(_){}; _passSpeaking=false;
  reading.stage='loading'; reading.showJa=false; reading.lookup=null; renderReading();
  try{
    const ld=READ_LEVEL_DESC[reading.level]||'';
    const n=reading.length||200;
    const sys=`You create English reading practice for Japanese learners. Output ONLY JSON, no markdown, no code fences. Schema: {"title": a short English title, "en": the reading passage in English only, "ja": a full natural Japanese translation of the passage, "words": an array of up to 8 of the more difficult words or idioms that actually appear in the passage, each {"term": the word or idiom (base/dictionary form is fine), "mean": a concise Japanese meaning}}. Write ${topicDesc}. Difficulty: ${ld} Length: about ${n} words. Make it coherent, self-contained and engaging, in natural English.`;
    const content=await callAI([{role:'system',content:sys},{role:'user',content:'Generate one passage now as JSON.'}],{json:true,temp:0.85});
    const o=JSON.parse(content);
    if(!o || !o.en) throw new Error('empty');
    reading.title=o.title||''; reading.en=String(o.en); reading.ja=o.ja||'';
    reading.words=Array.isArray(o.words)?o.words.filter(w=>w&&w.term):[];
    reading.stage='read';
  }catch(err){
    const m=(err&&err.message)||'';
    toast('生成に失敗: '+(/NO_SESSION|auth/i.test(m)?'ログインが必要':/429/.test(m)?'利用上限の可能性':/50[0234]/.test(m)?'サーバー混雑（再試行を）':/empty|JSON/i.test(m)?'もう一度お試しを':'通信エラー'));
    reading.stage=reading.en?'read':'setup';
  }
  renderReading();
}

function speakPassage(){
  if(!('speechSynthesis' in window)){ toast('この端末は読み上げに非対応です'); return; }
  if(!reading||!reading.en) return;
  if(speechSynthesis.speaking||speechSynthesis.pending){ try{ speechSynthesis.cancel(); }catch(_){}; _passSpeaking=false; updateReadSpk(); return; }
  try{ speechSynthesis.cancel(); }catch(_){}
  const u=new SpeechSynthesisUtterance(reading.en);
  u.lang='en-US'; u.rate=state.settings.ttsRate||0.9;
  const vc=voices.find(v=>/en-US/i.test(v.lang))||voices.find(v=>/^en/i.test(v.lang)); if(vc) u.voice=vc;
  u.onend=()=>{ _passSpeaking=false; updateReadSpk(); };
  u.onerror=()=>{ _passSpeaking=false; updateReadSpk(); };
  _passSpeaking=true; updateReadSpk();
  speechSynthesis.speak(u);
}
function updateReadSpk(){ const l=document.getElementById('readSpkLbl'); if(l) l.textContent=_passSpeaking?'停止':'読み上げ'; const b=document.getElementById('readSpkBtn'); if(b) b.classList.toggle('speaking',_passSpeaking); }
/* タップ＝単語 / 長押し→タップ＝熟語（連続する語） */
function bindReadPass(){
  const pass=document.getElementById('readPass'); if(!pass) return;
  pass.onpointerdown=(e)=>{
    const sp=e.target.closest&&e.target.closest('.rw'); if(!sp) return;
    _rdStartIdx=+sp.dataset.i; _rdLong=false; _rdStartX=e.clientX; _rdStartY=e.clientY;
    clearTimeout(_rdTimer);
    _rdTimer=setTimeout(()=>{ if(_rdStartIdx==null) return; _rdLong=true; _rdPhraseStart=_rdStartIdx; highlightRange(_rdPhraseStart,_rdPhraseStart); toast('熟語の最後の語をタップ'); }, 400);
  };
  pass.onpointermove=(e)=>{
    if(_rdStartIdx==null) return;
    if(Math.abs(e.clientX-_rdStartX)>12||Math.abs(e.clientY-_rdStartY)>12){ clearTimeout(_rdTimer); if(!_rdLong) _rdStartIdx=null; }
  };
  pass.onpointerup=(e)=>{
    clearTimeout(_rdTimer);
    const wasLong=_rdLong; _rdLong=false; _rdStartIdx=null;
    if(wasLong) return; // 長押しで始点を設定。終点のタップを待つ
    const sp=e.target.closest&&e.target.closest('.rw'); if(!sp) return;
    if(_rdPhraseStart!=null){
      const i=+sp.dataset.i, a=Math.min(_rdPhraseStart,i), b=Math.max(_rdPhraseStart,i);
      _rdPhraseStart=null; clearRangeHighlight();
      lookupPhrase((reading.tokens||[]).slice(a,b+1).join(' '));
    } else {
      readingTapWord(sp);
    }
  };
  pass.onpointercancel=()=>{ clearTimeout(_rdTimer); _rdStartIdx=null; _rdLong=false; };
}
function highlightRange(a,b){ document.querySelectorAll('#readPass .rw').forEach(s=>{ const i=+s.dataset.i; s.classList.toggle('psel', i>=a&&i<=b); }); }
function clearRangeHighlight(){ document.querySelectorAll('#readPass .rw.psel').forEach(s=>s.classList.remove('psel')); }
async function readingTapWord(el){
  const word=(el&&el.dataset.w)||''; if(!word) return;
  let known=null;
  if(reading.words) known=reading.words.find(w=>w.term && w.term.toLowerCase()===word.toLowerCase());
  reading.lookup={word, mean:known?known.mean:'', loading:!known}; paintReadPop();
  if(known) return;
  if(translateReady()){
    try{ const r=await translateText(word,'JA'); reading.lookup={word, mean:r.text, loading:false}; }
    catch(e){ reading.lookup={word, mean:'(意味を取得できませんでした)', loading:false}; }
  } else {
    reading.lookup={word, mean:'(意味の取得にはログインが必要です)', loading:false};
  }
  paintReadPop();
}
async function lookupPhrase(phrase){
  phrase=(phrase||'').trim(); if(!phrase) return;
  let known=reading.words&&reading.words.find(w=>w.term && w.term.toLowerCase()===phrase.toLowerCase());
  reading.lookup={word:phrase, mean:known?known.mean:'', loading:!known}; paintReadPop();
  if(known) return;
  if(translateReady()){
    try{ const r=await translateText(phrase,'JA'); reading.lookup={word:phrase, mean:r.text, loading:false}; }
    catch(e){ reading.lookup={word:phrase, mean:'(翻訳できませんでした)', loading:false}; }
  } else { reading.lookup={word:phrase, mean:'(翻訳にはログインが必要です)', loading:false}; }
  paintReadPop();
}
function paintReadPop(){
  const el=document.getElementById('readPop'); if(!el) return;

/* ---------- voice input (Web Speech API) ---------- */
let _recog=null, _recogBtn=null, _recogTimer=null;
function speechSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function stopDictation(){ if(_recog){ try{ _recog.stop(); }catch(_){ } } }
function toggleDictation(inputId, btn, autoSubmit){
  if(!speechSupported()){ toast('この端末は音声入力に非対応です（入力でも答えられます）'); return; }
  if(_recog){ stopDictation(); return; } // tap again = finish now
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR(); _recog=r; _recogBtn=btn;
  r.lang='en-US'; r.interimResults=true; r.continuous=false; r.maxAlternatives=1;
  const inp=document.getElementById(inputId);
  const base=inp?inp.value.trim():'';
  let got=false;
  if(btn) btn.classList.add('listening');
  const cap=document.getElementById('micCap'); if(cap) cap.textContent='聞き取り中…（タップで停止）';
  clearTimeout(_recogTimer);
  _recogTimer=setTimeout(()=>{ stopDictation(); }, 12000); // safety: never hang
  r.onresult=(e)=>{
    let txt=''; for(let i=0;i<e.results.length;i++){ txt+=e.results[i][0].transcript; }
    if(txt.trim()) got=true;
    if(inp){ inp.value=(base?base+' ':'')+txt; if(inp.tagName==='TEXTAREA'&&typeof autoGrow==='function') autoGrow(inp); }
  };
  r.onspeechend=()=>{ stopDictation(); }; // stop as soon as the user goes quiet
  r.onerror=(e)=>{ if(e.error==='not-allowed'||e.error==='service-not-allowed') toast('マイクの使用が許可されていません'); };
  r.onend=()=>{
    clearTimeout(_recogTimer);
    if(_recogBtn) _recogBtn.classList.remove('listening');
    const c2=document.getElementById('micCap'); if(c2) c2.textContent='タップして話す';
    _recog=null; _recogBtn=null;
    // 音声認識が終わっても自動では答えを表示しない（ユーザーが「答えを表示」を押す）
    if(autoSubmit && got && compo && !compo.revealed && !compo.checking){
      const i2=document.getElementById('compoInput');
      if(i2 && i2.value.trim()) revealCompo();
    }
  };
  try{ r.start(); }catch(_){ clearTimeout(_recogTimer); toast('音声入力を開始できませんでした'); if(btn) btn.classList.remove('listening'); _recog=null; }
}

async function genTheme(theme){
  if(!aiReady()){ toast('テーマ出題にはAIが必要です'); return; }
  const level=(document.getElementById('thLevel')&&document.getElementById('thLevel').value)||'中級';
  closeModal();
  compo={ loading:true, theme, items:[], idx:0, revealed:false, verdict:null, checking:false, fb:null, userAns:'', results:[], source:'theme' };
  renderCompo();
  try{
    const sys='You create instant-composition (瞬間英作文) practice for a Japanese learner. Output ONLY a JSON object: {"items":[{"jp":"日本語の文","en":"natural English translation"}]} with exactly 8 items. Sentences must be short, practical and natural to say aloud, and must match the given theme and level. The "jp" is Japanese, "en" is its natural English. No markdown, no code fences.';
    const u=`テーマ: ${theme}\nレベル: ${level}`;
    const content=await callAI([{role:'system',content:sys},{role:'user',content:u}],{json:true,temp:0.6});
    if(!compo || !compo.loading) return; // user exited
    let arr=[]; try{ const j=JSON.parse(content); arr=Array.isArray(j)?j:(j.items||[]); }catch(e){ arr=[]; }
    const items=arr.filter(x=>x&&x.jp&&x.en).map(x=>({jp:String(x.jp),en:String(x.en),kind:'テーマ：'+theme}));
    if(items.length===0){ toast('問題を生成できませんでした。もう一度お試しください'); compo=null; renderStudy(); return; }
    compo={ items, idx:0, revealed:false, verdict:null, checking:false, fb:null, userAns:'', results:[], log:[], openIdx:null, source:'theme', theme };
    renderCompo();
  }catch(err){
    if(!compo) return;
    if(isAiLimit(err)){ compo=null; renderStudy(); openAiLimit(err.message==='AI_LIMIT_FREE'?'free':'paid'); return; }
    const m=err.message||'';
    toast('生成に失敗：'+(/429/.test(m)?'利用上限の可能性':/50[0234]/.test(m)?'サーバー混雑':/40[013]/.test(m)?'キーを確認':'通信エラー'));
    compo=null; renderStudy();
  }
}

function revealCompo(){

async function gradeCompoAI(myIdx){
  if(!compo || compo.idx!==myIdx) return;
  const it=compo.items[myIdx];
  const user=compo.userAns||'';
  compo.checking=true; renderCompo();
  let fb;
  try{
    const sys='You are a supportive English teacher grading 瞬間英作文 (instant composition) by a Japanese learner. Output ONLY JSON: {"verdict":"○"|"△"|"×","comment":"short Japanese feedback (1-2 sentences)","fixed":"a natural corrected English version of the learner sentence","alts":["up to 2 alternative natural English expressions"]}. ○ = correct & natural, △ = understandable but minor errors, × = wrong meaning. Judge by meaning vs the Japanese, not exact match. Be encouraging. comment MUST be Japanese. No markdown.';
    const u=`日本語: ${it.jp}\n参考の英語: ${it.en}\n学習者の英語: ${user}`;
    const content=await callAI([{role:'system',content:sys},{role:'user',content:u}],{json:true,temp:0.3});
    let j=null; try{ j=JSON.parse(content); }catch(e){ j=null; }
    fb = (j&&j.verdict) ? j : {verdict:'', comment:(content||''), fixed:'', alts:[]};
  }catch(err){
    if(isAiLimit(err)){ compo.checking=false; renderCompo(); openAiLimit(err.message==='AI_LIMIT_FREE'?'free':'paid'); return; }
    const m=err.message||'';
    fb={verdict:'', comment:'AI添削に失敗（'+(/429/.test(m)?'利用上限の可能性':/50[0234]/.test(m)?'サーバー混雑':/40[013]/.test(m)?'キーを確認':'通信エラー')+'）。お手本と見比べて自己採点してください。', fixed:'', alts:[]};
  }
  if(!compo || compo.idx!==myIdx || !compo.revealed) return; // 離脱/進行した
  compo.fb=fb; compo.checking=false;
  if(fb.verdict && compo.verdict===null) compo.verdict=fb.verdict; // AIの判定を初期値に（ユーザーは修正可）
  renderCompo();
}

function exitSpeech(){ stopSpeechRec(); clearInterval(_stimer); speech=null; renderStudy(); }
function startSpeechRec(){
  if(!speechSupported()){ toast('この端末は音声入力に非対応です（下のテキストに入力もできます）'); return; }
  if(_srec){ stopSpeechRec(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR(); _srec=r; r.lang='en-US'; r.interimResults=true; r.continuous=true;
  let finalText = speech.transcript||'';
  r.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){ const res=e.results[i]; if(res.isFinal) finalText=(finalText+' '+res[0].transcript).trim(); else interim+=res[0].transcript; }
    if(speech) speech.transcript=finalText;
    const ta=document.getElementById('speechText'); if(ta) ta.value=(finalText+(interim?' '+interim:'')).trim();
  };
  r.onerror=(e)=>{ if(e.error==='not-allowed'||e.error==='service-not-allowed') toast('マイクの使用が許可されていません'); };
  r.onend=()=>{ if(speech && speech.recording && speech.seconds>0){ try{ r.start(); }catch(_){ } } else { if(speech) speech.recording=false; const b=document.getElementById('speechMic'); if(b) b.classList.remove('listening'); } };
  speech.recording=true;
  try{ r.start(); }catch(_){ toast('録音を開始できませんでした'); speech.recording=false; _srec=null; return; }
  clearInterval(_stimer);
  _stimer=setInterval(()=>{
    if(!speech){ clearInterval(_stimer); return; }
    speech.seconds--;
    const el=document.getElementById('speechTimer'); if(el) el.textContent=fmtClock(speech.seconds);
    if(speech.seconds<=0){ clearInterval(_stimer); stopSpeechRec(); }
  },1000);
  renderSpeech();
}
function stopSpeechRec(){ if(speech) speech.recording=false; clearInterval(_stimer); if(_srec){ try{ _srec.stop(); }catch(_){ } _srec=null; } if(speech&&speech.phase==='speak') renderSpeech(); }
async function gradeSpeech(){
  const ta=document.getElementById('speechText'); if(ta && speech) speech.transcript=ta.value.trim();
  if(!speech.transcript){ toast('話した内容（または入力）がありません'); return; }
  stopSpeechRec();
  if(!aiReady()){ toast('添削にはAIが必要です。設定でオンにしてください'); return; }
  speech.phase='grading'; renderSpeech();
  try{
    const sys='You are an encouraging English speaking coach for a Japanese learner who just did a ~1-minute spoken monologue (the text is speech-to-text and may be rough). Given the theme and transcript, output ONLY JSON: {"corrected":"a natural, cleaned-up English version of what they tried to say","points":["up to 4 short Japanese notes about grammar, word choice or nuance to fix"],"richer":["up to 3 more natural and richer English expressions/sentences they could have used"]}. Be supportive and concrete. The "points" MUST be in Japanese. No markdown, no code fences.';
    const u=`Theme: ${speech.theme}\nTranscript: ${speech.transcript}`;
    const content=await callAI([{role:'system',content:sys},{role:'user',content:u}],{json:true,temp:0.4,hard:true});
    let j=null; try{ j=JSON.parse(content); }catch(e){ j=null; }
    if(!speech) return;
    speech.fb = (j&&(j.corrected||j.points||j.richer)) ? {corrected:j.corrected||'',points:Array.isArray(j.points)?j.points:[],richer:Array.isArray(j.richer)?j.richer:[]} : {corrected:'',points:[content||'添削結果を取得できませんでした。'],richer:[]};
  }catch(err){
    if(!speech) return;
    if(isAiLimit(err)){ speech.phase='speak'; renderSpeech(); openAiLimit(err.message==='AI_LIMIT_FREE'?'free':'paid'); return; }
    const m=err.message||'';
    speech.fb={corrected:'',points:['添削に失敗：'+(/429/.test(m)?'利用上限の可能性':/50[0234]/.test(m)?'サーバー混雑':/40[013]/.test(m)?'キーを確認':'通信エラー')],richer:[]};
  }
  speech.phase='result';
  pushSpeechHistory();
  renderSpeech();
}
function pushSpeechHistory(){

function ensureThreads(){
  if(!Array.isArray(state.threads)) state.threads=[];
  if(state.threads.length===0 && !state.aiThreadSeed){
    ['chat','card','example','correct','translate'].forEach(k=>{
      state.threads.push({id:uid(),title:AI_MODES[k].label,mode:k,sys:'',messages:[],createdAt:now()});
    });
    state.aiThreadSeed=true; save();
  }
  migrateThreads();
}
function migrateThreads(){
  if(!Array.isArray(state.threads)) return;
  let changed=false;
  state.threads.forEach(t=>{
    if(t.mode==='nuance'){
      t.mode='chat'; // 旧ニュアンス/日記スレッドはチューターに統合
      changed=true;
    }
  });
  // 旧AI英語日記スレッドはホームの「本日の英語日記」に移行したため、添削スレッドへ変換
  state.threads.forEach(t=>{ if(t.mode==='card' && t.title==='単語をカード化'){ t.title='Ankiカード化'; changed=true; } });
  state.threads.forEach(t=>{ if(t.mode==='diary'){ t.mode='correct'; t.title='英文添削'; changed=true; } });
  // 英文添削スレッドの重複を1つに集約（中身があるものを優先して残す）
  const corrects=state.threads.filter(t=>t.mode==='correct');
  if(corrects.length>1){
    const keep=corrects.find(t=>t.messages&&t.messages.length)||corrects[0];
    state.threads=state.threads.filter(t=>t.mode!=='correct'||t===keep);
    changed=true;
  }
  if(changed) save();
}

async function sendAI(){
  if(aiBusy) return;
  const t=getThread(activeThreadId); if(!t) return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;

  inp.value=''; autoGrow(inp); setDraft(t.id,'');
  t.messages.push({role:'user',content:text}); save();
  await generateReply(t, text);
}
function retryAI(i){
  if(aiBusy) return;
  const t=getThread(activeThreadId); if(!t) return;
  const m=t.messages[i];
  const isErr = m && (m.error || (typeof m.content==='string' && m.content.indexOf('⚠️')===0));
  if(!isErr) return;
  let text=m.retryFor;
  if(!text){ for(let k=i-1;k>=0;k--){ if(t.messages[k].role==='user'){ text=t.messages[k].content; break; } } }
  if(!text){ toast('再試行できる内容が見つかりません'); return; }
  t.messages.splice(i,1); save(); // remove the error bubble
  generateReply(t, text);
}
async function generateReply(t, text){
  aiBusy=true; renderThread();
  const log=document.getElementById('chatLog');
  if(log){ log.insertAdjacentHTML('beforeend','<div class="msg ai" id="typing"><div class="typing"><span></span><span></span><span></span></div></div>'); log.scrollTop=log.scrollHeight; }
  try{
    if(t.mode==='card'){
      const content=await callAI([{role:'system',content:CARD_SYS},{role:'user',content:text}],{json:true,temp:0.5});
      let card; try{ card=JSON.parse(content); }catch(e){ card=null; }
      if(card&&card.term){
        const posLine=(Array.isArray(card.pos)&&card.pos.length)?`\n品詞：${card.pos.join('・')}`:'';
        const otherLine=card.other?`\nその他：${card.other}`:'';
        t.messages.push({role:'assistant',content:`📘 ${card.term} ${card.pron||''}${posLine}\n意味：${card.mean||''}\n例：${card.exEn||''}\n　　${card.exJa||''}${otherLine}`,card});
      } else {
        t.messages.push({role:'assistant',content});
      }
    } else if(t.mode==='example'){
      const content=await callAI([{role:'system',content:EXAMPLE_SYS},{role:'user',content:text}],{json:true,temp:0.6});
      let items=[]; try{ const j=JSON.parse(content); items=Array.isArray(j)?j:(j.items||[]); }catch(e){ items=[]; }
      items=items.filter(x=>x&&x.en).slice(0,3).map(x=>({en:String(x.en),ja:x.ja?String(x.ja):''}));
      if(items.length){ t.messages.push({role:'assistant',content:items.map((x,k)=>`${k+1}. ${x.en}${x.ja?'\n　'+x.ja:''}`).join('\n\n'),examples:items}); }
      else { t.messages.push({role:'assistant',content}); }
    } else {
      const sys = t.mode==='custom' ? (t.sys||'You are a helpful assistant for a Japanese English-learner. Reply in Japanese unless asked otherwise.') : AI_MODES[t.mode].sys;
      const convo = t.mode==='custom' ? true : !!AI_MODES[t.mode].convo;
      const history = convo ? t.messages.slice(-10).map(m=>({role:m.role,content:m.content})) : [{role:'user',content:text}];
      const msgs=[{role:'system',content:sys},...history];
      const content=await callAI(msgs,{temp:0.7});
      t.messages.push({role:'assistant',content});
    }
  }catch(err){
    if(isAiLimit(err)){
      const lm = err.message==='AI_LIMIT_FREE' ? '本日の無料AIは上限です。広告を見て+5回、またはライト以上で実質無制限に。' : '本日のAI利用が上限に達しました。時間をおいてお試しください。';
      t.messages.push({role:'assistant',content:'⚠️ '+lm, error:true});
      save(); aiBusy=false; renderThread();
      openAiLimit(err.message==='AI_LIMIT_FREE'?'free':'paid');
      return;
    }
    let msg=err.message||'エラーが発生しました';
    if(msg==='NO_KEY') msg='APIキーが未設定です。設定から入力してください。';
    else if(msg==='AI_OFF') msg='AIがオフです。設定からオンにしてください。';
    else if(/40[013]/.test(msg)) msg='APIキーが無効か、リクエストが拒否されました。設定を確認してください。';
    else if(/429/.test(msg)) msg=aiProvider()==='gemini'?'無料枠の上限に達した可能性があります。少し時間をおいて再試行してください。':'利用制限/残高切れの可能性があります（OpenAIの請求設定を確認）。';
    else if(/50[0234]/.test(msg)) msg='AIサーバーが一時的に混雑しています。少し待ってから、もう一度送信してください。';
    else if(/Failed to fetch|NetworkError/i.test(msg)) msg='通信に失敗しました。ネット接続を確認してください。';
    t.messages.push({role:'assistant',content:'⚠️ '+msg, error:true, retryFor:text});
  }
  save(); aiBusy=false; renderThread();
}
async function callOpenAI(messages,opts){
  const key=state.settings.apiKey;
  if(!key) throw new Error('NO_KEY');
  const body={ model:state.settings.model||'gpt-4o-mini', messages, temperature:(opts&&opts.temp!=null)?opts.temp:0.7 };
  if(opts&&opts.json) body.response_format={type:'json_object'};
  const res=await aiFetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify(body)
  });
  const data=await res.json();
  return data.choices[0].message.content.trim();
}
// fetch with one automatic retry on transient server errors (5xx)
async function aiFetch(url,init){
  for(let attempt=0; attempt<2; attempt++){
    let res;
    try{ res=await fetch(url,init); }
    catch(e){ if(attempt===0){ await new Promise(r=>setTimeout(r,1200)); continue; } throw e; }
    if(res.ok) return res;
    if(res.status>=500 && attempt===0){ await new Promise(r=>setTimeout(r,1500)); continue; }
    throw new Error('API '+res.status);
  }
}
/* ========= AI利用カウント・プラン上限・モデルルーティング =========
   ・上限・モデルは「アプリ提供AI（ログイン中=managedAI）」のときだけ適用。
   ・自分のAPIキー利用（BYO）は各自がGoogle/OpenAIに支払うため上限なし。
   ・翻訳（DeepL中継）はこのカウント対象外（別関数・別エンドポイント）。 */
const AI_FREE_BASE=5, AI_AD_BONUS=5, AI_AD_MAX=3;            // Free: 5/日 ＋ 広告1本=+5（最大3本→20/日）
const AI_LIGHT_CAP=200;                                      // Light: 実質無制限（内部ソフト上限）
const AI_PREMIUM_CAP=150, AI_PREMIUM_PRO_CAP=5;             // Premium: 実質無制限(150) ＋ 難所Pro 5/日
const AI_MODEL_LITE='gemini-2.5-flash-lite';
const AI_MODEL_FLASH='gemini-2.5-flash';
const AI_MODEL_PRO='gemini-2.5-pro';
function planTier(){ const b=state.billing||{}; return (b.plan==='light'||b.plan==='premium')?b.plan:'free'; }
function ensureAiDay(){ const t=todayStr(); if(!state.aiUsage || state.aiUsage.date!==t){ state.aiUsage={date:t, uses:0, adResets:0, proUses:0}; } }
function aiUsesToday(){ ensureAiDay(); return state.aiUsage.uses||0; }
function aiProUsesToday(){ ensureAiDay(); return state.aiUsage.proUses||0; }
function aiAdResetsToday(){ ensureAiDay(); return state.aiUsage.adResets||0; }
function aiDailyCap(){ const t=planTier(); if(t==='light') return AI_LIGHT_CAP; if(t==='premium') return AI_PREMIUM_CAP; return AI_FREE_BASE + AI_AD_BONUS*Math.min(aiAdResetsToday(), AI_AD_MAX); }
function aiRemaining(){ return Math.max(0, aiDailyCap()-aiUsesToday()); }
function aiCanAdReset(){ return planTier()==='free' && aiAdResetsToday()<AI_AD_MAX; }
function incAiUse(pro){ ensureAiDay(); state.aiUsage.uses=(state.aiUsage.uses||0)+1; if(pro) state.aiUsage.proUses=(state.aiUsage.proUses||0)+1; save(); }
function aiModelFor(opts){
  const t=planTier();
  if(t==='premium'){
    if(opts && opts.hard && aiProUsesToday()<AI_PREMIUM_PRO_CAP){ opts._pro=true; return AI_MODEL_PRO; }
    return AI_MODEL_FLASH;
  }
  return AI_MODEL_LITE; // free / light
}
function isAiLimit(e){ const m=(e&&e.message)||e||''; return m==='AI_LIMIT_FREE'||m==='AI_LIMIT'; }

async function callAI(messages,opts){
  opts=opts||{};
  if(managedAI()){
    ensureAiDay();
    if(aiUsesToday()>=aiDailyCap()) throw new Error(planTier()==='free'?'AI_LIMIT_FREE':'AI_LIMIT');
    const model=aiModelFor(opts);
    const out=await callManaged(messages, Object.assign({}, opts, {model}));
    incAiUse(opts._pro);
    return out;
  }
  const p=aiProvider();
  if(p==='none') throw new Error('AI_OFF');
  if(p==='gemini') return callGemini(messages,opts);
  return callOpenAI(messages,opts);
}
// アプリ提供のAI：Supabase Edge Function 経由（APIキーはサーバーに隠す）
async function callManaged(messages,opts){
  let token='';
  try{ const { data }=await _sb.auth.getSession(); token=(data&&data.session)?data.session.access_token:''; }catch(e){}
  if(!token) throw new Error('NO_SESSION');
  const res=await aiFetch(CLOUD.url.replace(/\/$/,'')+'/functions/v1/ai',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,'apikey':CLOUD.anonKey},
    body:JSON.stringify({ messages, json:!!opts.json, temp:(opts.temp!=null)?opts.temp:0.7, model:opts.model||undefined })
  });
  const data=await res.json();
  if(data && data.error) throw new Error(data.error);
  return ((data&&data.text)||'').trim();
}

async function translateText(text, target){

  });
  let data={}; try{ data=await res.json(); }catch(_){ }
  if(!res.ok || (data&&data.error)) throw new Error((data&&data.error)||('http_'+res.status));

async function qaTranslate(){
  const inp=document.getElementById('qaInput');
  const text=(inp?inp.value:'').trim();
  if(!text){ toast('翻訳する語や文を入力してください'); return; }
  if(!translateReady()){ toast('翻訳を使うにはログインが必要です（設定）'); return; }
  const target = hasJP(text)?'EN':'JA';
  transState={status:'loading'}; paintTrans();
  try{
    const r=await translateText(text, target);
    transState={status:'done', src:text, out:r.text, target, cached:!!r.cached};
  }catch(e){
    const m=(e&&e.message)||'';
    let msg='翻訳に失敗しました。通信状況を確認してください。';
    if(m==='NO_SESSION'||m==='auth_required'||m==='auth_invalid') msg='ログインが必要です（設定 → アカウント）。';
    else if(/quota|429|rate_limited/i.test(m)) msg='今月の無料翻訳枠の上限に達した可能性があります。';
    else if(m==='too_long') msg='長すぎます。1000文字以内で翻訳してください。';
    else if(m==='server_not_configured'||m==='deepl_auth') msg='翻訳サーバーが未設定です。';
    transState={status:'error', msg};
  }
  paintTrans();
}

async function callGemini(messages,opts){
  const key=state.settings.geminiKey;
  if(!key) throw new Error('NO_KEY');
  const model=state.settings.geminiModel||'gemini-2.5-flash';
  const sys=messages.filter(m=>m.role==='system').map(m=>m.content).join('\n');
  const contents=messages.filter(m=>m.role!=='system').map(m=>({
    role: m.role==='assistant' ? 'model' : 'user',
    parts:[{text:m.content}]
  }));
  const body={ contents, generationConfig:{ temperature:(opts.temp!=null)?opts.temp:0.7 } };
  if(sys) body.systemInstruction={ parts:[{text:sys}] };
  if(opts.json) body.generationConfig.responseMimeType='application/json';
  const url='https://generativelanguage.googleapis.com/v1beta/models/'+encodeURIComponent(model)+':generateContent?key='+encodeURIComponent(key);
  const res=await aiFetch(url,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const data=await res.json();
  const cand=(data.candidates||[])[0];
  const parts=cand && cand.content && cand.content.parts;
  if(!parts || !parts.length) throw new Error('EMPTY');
  return parts.map(p=>p.text||'').join('').trim();
}

// ===== 紹介システム =====
function selfPaid(){ return !!(state.billing && state.billing.plan && state.billing.plan!=='free'); }
// 紹介割引：自分が紹介し、かつ有料プランの人数 × 5%（上限25%）
function referralDiscountPct(){ const r=state.referral||{}; return Math.min(25,(r.referredPaidCount||0)*5); }
// 継続割引：課金開始日から「30日サイクル」単位で判定（達成サイクルの翌サイクルから有効＝完了済みサイクルで数える）
const CYCLE_MS=30*24*3600*1000;
function billingStart(){ const b=state.billing; return (b&&b.startedAt)?b.startedAt:null; }
function studyDaysInRange(s,e){ let n=0; for(const d in (state.stats.reviews||{})){ if((state.stats.reviews[d]||0)>0){ const t=new Date(d+'T00:00:00').getTime(); if(t>=s && t<e) n++; } } return n; }
function studyDaysThisCycle(){ const st=billingStart(); if(!st) return 0; const k=Math.floor((Date.now()-st)/CYCLE_MS); return studyDaysInRange(st+k*CYCLE_MS, st+(k+1)*CYCLE_MS); }
function loyaltyMonths(){ // ＝連続達成サイクル数
  const st=billingStart(); if(!st) return 0; const completed=Math.floor((Date.now()-st)/CYCLE_MS); let c=0;
  for(let k=completed;k>=1;k--){ if(studyDaysInRange(st+(k-1)*CYCLE_MS, st+k*CYCLE_MS)>=STREAK_GOAL_DAYS) c++; else break; } return c;
}
const LOYALTY_TIERS=[[3,5],[6,10],[12,15]];
function loyaltyDiscountPct(){ const m=loyaltyMonths(); let p=0; for(const tr of LOYALTY_TIERS){ if(m>=tr[0]) p=tr[1]; } return p; }
function loyaltyNext(){ const m=loyaltyMonths(); for(const tr of LOYALTY_TIERS){ if(m<tr[0]) return {months:tr[0], pct:tr[1]}; } return null; }
function effectiveDiscountPct(){ if(!selfPaid()) return 0; return Math.min(40, referralDiscountPct()+loyaltyDiscountPct()); }
// 課金時に確定する割引（加入していなくても算出＝加入すれば確定する率）
function lockableDiscountPct(){ return Math.min(40, referralDiscountPct()+loyaltyDiscountPct()); }
// 割引は「1ヶ月プラン」のみ適用（3ヶ月・年額は既に割引価格のため）
function discountAppliesTerm(term){ return term==='1m'; }
function termLockableDiscountPct(term){ return discountAppliesTerm(term) ? lockableDiscountPct() : 0; }
// 実際に請求されている（課金時点で確定済みの）割引
function appliedDiscountPct(){ const b=state.billing; return (selfPaid() && b && typeof b.lockedDiscount==='number') ? b.lockedDiscount : 0; }
function discountedPrice(base){ return Math.round(base*(1-effectiveDiscountPct()/100)); }
function priceAt(base, pct){ return Math.round(base*(1-(pct||0)/100)); }

function handleCheckoutReturn(search){
  try{
    const q=new URLSearchParams(typeof search==='string'?search:(location.search||''));
    const c=q.get('checkout');
    const pr=q.get('portal');
    if(!c && !pr) return false;
    if(c==='success'){ toast('決済が完了しました。プランを反映しています…'); if(STRIPE.enabled){ showCheckoutPending(); pollPlanAfterCheckout(); } }
    else if(c==='cancel'){ toast('決済をキャンセルしました'); }
    else if(pr==='return'){ if(STRIPE.enabled) refreshPlanAfterPortal(); }
    q.delete('checkout'); q.delete('portal');
    if(typeof history!=='undefined' && history.replaceState){
      const url=location.pathname+(q.toString()?('?'+q.toString()):'')+location.hash;
      history.replaceState(null,'',url);
    }
    return true;
  }catch(_){ return false; }
}

function setCheckoutBanner(html){
  if(typeof document==='undefined'||!document.body) return;
  let el=document.getElementById('checkoutBanner');
  if(!html){ if(el) el.remove(); return; }
  if(!el){ el=document.createElement('div'); el.id='checkoutBanner'; el.className='checkout-banner'; document.body.appendChild(el); }
  el.innerHTML=html;
}
function showCheckoutPending(){ _checkoutPending=true; setCheckoutBanner('<span class="cb-spin"></span><span>決済が完了しました。プランを反映しています…</span>'); }
function checkoutPendingDone(plan){
  _checkoutPending=false;
  const nm=(PLAN_INFO[plan]&&PLAN_INFO[plan].name)||'プラン';
  setCheckoutBanner('<span>✅ '+esc(nm)+'が有効になりました</span>');
  setTimeout(()=>setCheckoutBanner(''),4000);
  if(typeof renderSettings==='function') renderSettings();
  if(typeof rerenderActive==='function') rerenderActive();
}
function checkoutPendingTimeout(){
  _checkoutPending=false;
  setCheckoutBanner('<span>反映に少し時間がかかっています。数分後に自動反映されます。</span><button class="cb-btn" onclick="retryCheckoutSync()">今すぐ確認</button>');
  setTimeout(()=>{ if(!_checkoutPending) setCheckoutBanner(''); },10000);
}
function retryCheckoutSync(){ showCheckoutPending(); pollPlanAfterCheckout(); }
async function pollPlanAfterCheckout(){
  if(!STRIPE.enabled){ setCheckoutBanner(''); _checkoutPending=false; return; }
  let attempts=0;
  const tick=async()=>{
    attempts++;
    if(_sb && loggedIn()){ try{ await syncPlanFromServer(); }catch(_){ } }
    const now=(state.billing&&state.billing.plan)||'free';
    if(now && now!=='free'){ checkoutPendingDone(now); return; }
    if(attempts>=8){ checkoutPendingTimeout(); return; }
    setTimeout(tick, 2000);
  };
  tick();
}
async function refreshPlanAfterPortal(){
  if(!STRIPE.enabled){ setCheckoutBanner(''); return; }
  setCheckoutBanner('<span class="cb-spin"></span><span>プラン情報を更新しています…</span>');
  let n=0;
  const tick=async()=>{
    n++;
    if(_sb && loggedIn()){ try{ await syncPlanFromServer(); }catch(_){ } }
    if(typeof renderSettings==='function') renderSettings();
    if(n>=4){ setCheckoutBanner(''); return; }
    setTimeout(tick, 2000);
  };
  tick();
}
/* ---- サーバー（plan_status, Webhookが書き込む）を正としてプランを反映 ---- */
async function syncPlanFromServer(){
  if(!STRIPE.enabled || !loggedIn() || !_sb) return;
  try{
    const r=await _sb.from('plan_status').select('plan,term,status,current_period_end,cancel_at_period_end').eq('user_id',account.user.id).maybeSingle();
    const row=r&&r.data; if(!row) return;
    const active = row.plan && row.plan!=='free' && (!row.status || row.status==='active' || row.status==='trialing');
    if(active){
      const keepStart=(state.billing&&state.billing.startedAt)||Date.now();
      state.billing=Object.assign({}, state.billing||{}, { plan:row.plan, term:row.term||(state.billing&&state.billing.term)||'1m', status:row.status||'active', periodEnd:row.current_period_end||null, cancelAtPeriodEnd:!!row.cancel_at_period_end, startedAt:keepStart, since:Date.now() });
    } else if(state.billing && state.billing.plan && state.billing.plan!=='free'){
      state.billing={plan:'free', term:null, since:null, startedAt:null, card:null};
    }
    save(); if(typeof renderSettings==='function') renderSettings();
  }catch(_){}
}
function billingConfirm(){
  const keepStart = (selfPaid() && state.billing && state.billing.startedAt) ? state.billing.startedAt : Date.now();
  state.billing={plan:billingSel.plan, term:billingSel.term, since:Date.now(), startedAt:keepStart, lockedDiscount:termLockableDiscountPct(billingSel.term), card:'•••• 4242'};
  save(); upsertPlanStatus(); billingStep=null; renderSettings();
  toast('プランを変更しました（デモ）');
}
function billingDowngrade(){
  if(!confirm('無料プランに変更しますか？（デモ）')) return;
  state.billing={plan:'free', term:null, since:null, startedAt:null, card:null};
  save(); upsertPlanStatus(); billingStep=null; renderSettings(); toast('無料プランに変更しました（デモ）');
}

function currentPlanCardHtml(){

  const end=b.periodEnd?new Date(b.periodEnd):null;
  const endStr=(end&&!isNaN(end.getTime()))?end.toLocaleDateString('ja-JP'):'';

  const dateLine = endStr ? (cancelling?`有効期限 ${endStr}`:`次回更新 ${endStr}`) : '';

function saveSettings(){
  const prov=document.getElementById('setProvider'); if(prov) state.settings.aiProvider=prov.value;
  const k=document.getElementById('setKey'); if(k) state.settings.apiKey=k.value.trim();
  const m=document.getElementById('setModel'); if(m) state.settings.model=m.value;
  const gk=document.getElementById('setGeminiKey'); if(gk) state.settings.geminiKey=gk.value.trim();
  const gm=document.getElementById('setGeminiModel'); if(gm) state.settings.geminiModel=gm.value;
  keyOpen=false;
  save(); toast('設定を保存しました'); renderSettings();
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='sprout-backup-'+todayStr()+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('バックアップを書き出しました');
}
function importData(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data.cards||!data.folders) throw new Error();
      if(!confirm('現在のデータを上書きして読み込みますか？')) return;
      state=Object.assign(defaultState(),data); save(); applyTheme(); toast('復元しました'); renderSettings();
    }catch(e){ toast('読み込めませんでした（ファイル形式を確認）'); }
  };
  r.readAsText(file); input.value='';
}
function resetLearningData(){
  if(!confirm('学習データを初期化します。\n・ノート（フォルダ・カード）\n・追加した単語／メモ／英語日記\n・学習の進捗（習得状況・忘却曲線）と学習時間の履歴\nが削除され、初期サンプルの状態に戻ります。\n（連続学習日数はそのまま／ログイン情報・プランは保持されます）\n\nこの操作は取り消せません。続けますか？')) return;
  const keep={ reviews: state.stats.reviews||{}, streak: state.stats.streak||0, lastStudy: state.stats.lastStudy||null };
  state.folders={}; state.cards={};
  state.progress={}; state.compoSrs={};
  state.history={compo:[],speech:[]};
  state.threads=[]; state.aiThreadSeed=false;
  state.stats={ reviews:keep.reviews, streak:keep.streak, lastStudy:keep.lastStudy, time:{}, dailyCount:{date:null, words:0, idioms:0, compo:0, reviews:0} };
  state.seeded=false; seed();
  if(typeof ensureThreads==='function') ensureThreads();
  save(); renderSettings();
  toast('学習履歴を初期化しました（連続学習日数は保持）');
}
function resetAll(){
  if(!confirm('すべてのデータを消去します。\n・追加した単語／ノート／英語日記\n・学習履歴と進捗（暗記・テスト・日記）\n・設定（APIキーや好みも初期化）\nを消して、初期サンプルの状態に戻します。\nログイン中の場合は、次回の同期でクラウド側にも反映されます。\n\nこの操作は取り消せません。続けますか？')) return;
  localStorage.removeItem(STORE_KEY); load(); seed(); applyTheme(); toast('初期化しました'); setTab('home');
}

// ===== 学習時間の履歴（期間別の総学習時間） =====
function studyTimeBuckets(period){
  const time=state.stats.time||{};
  const today=new Date(); today.setHours(0,0,0,0);
  const ymd=d=>d.toISOString().slice(0,10);
  const secOn=k=>time[k]||0;
  if(period==='1w'){
    const dow=(today.getDay()+6)%7; const mon=new Date(today); mon.setDate(today.getDate()-dow);
    const lab=['月','火','水','木','金','土','日']; const out=[];
    for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); out.push({label:lab[i], sec:secOn(ymd(d))}); }
    return out;
  }
  if(period==='1m'||period==='3m'){
    const weeks = period==='1m'?5:13;
    const dow=(today.getDay()+6)%7; const thisMon=new Date(today); thisMon.setDate(today.getDate()-dow);
    const out=[];
    for(let w=weeks-1; w>=0; w--){
      const ws=new Date(thisMon); ws.setDate(thisMon.getDate()-w*7);
      let sec=0; for(let i=0;i<7;i++){ const d=new Date(ws); d.setDate(ws.getDate()+i); if(d<=today) sec+=secOn(ymd(d)); }
      out.push({label:`${ws.getMonth()+1}/${ws.getDate()}`, sec});
    }
    return out;
  }
  // monthly buckets
  let months = period==='6m'?6:period==='1y'?12:24;
  if(period==='all'){
    const keys=Object.keys(time).sort();
    if(keys.length){ const e=keys[0]; const ey=+e.slice(0,4), em=+e.slice(5,7); months=(today.getFullYear()-ey)*12+(today.getMonth()+1-em)+1; }
    months=Math.max(1,Math.min(months,24));
  }
  const out=[];
  for(let m=months-1;m>=0;m--){
    const dt=new Date(today.getFullYear(), today.getMonth()-m, 1);
    const ym=dt.toISOString().slice(0,7);
    let sec=0; for(const k in time){ if(k.slice(0,7)===ym) sec+=time[k]; }
    out.push({label:`${String(dt.getFullYear()).slice(2)}/${dt.getMonth()+1}`, sec});
  }
  return out;
}
function fmtMin(sec){ const m=Math.round(sec/60); return `${Math.floor(m/60)}時間${m%60}分`; }
function fmtAxis(m){ if(m<=0) return '0'; return m>=60 ? `${(m/60).toFixed(m%60===0?0:1)}時間` : `${m}分`; }
function timeAxis(maxMin,h){ h=h||84; const mid=Math.round(maxMin/2); return `<div class="y-axis" style="height:${h}px"><span>${fmtAxis(maxMin)}</span><span>${maxMin>1?fmtAxis(mid):''}</span><span>0</span></div>`; }
function studyTimeHistoryHtml(){
  const periods=[['1w','1週間'],['1m','1か月'],['3m','3か月'],['6m','6か月'],['1y','1年'],['all','すべて']];
  const buckets=studyTimeBuckets(timeHistPeriod);
  const maxS=Math.max(1,...buckets.map(b=>b.sec));
  const totSec=buckets.reduce((a,b)=>a+b.sec,0);
  const H=170;
  const sel=(timeHistSel!=null && buckets[timeHistSel])?buckets[timeHistSel]:null;
  return `
  <div style="min-height:78vh;padding-top:4px">
  <div class="th-head" style="font-size:1.25rem">学習時間の履歴</div>
  <div class="th-tabs">${periods.map(p=>`<button class="th-tab${timeHistPeriod===p[0]?' on':''}" onclick="setTimeHistPeriod('${p[0]}')">${p[1]}</button>`).join('')}</div>
  <div class="th-readout">${sel?`<span class="th-lab">${esc(sel.label)}</span><span class="th-val">${fmtMin(sel.sec)}</span>`:`<span class="th-hint">棒グラフをタップすると、その期間の学習時間を表示します</span>`}</div>
  <div class="card" style="margin-top:10px;padding-top:18px">
    <div class="chart-wrap">${timeAxis(Math.round(maxS/60),H)}
    <div class="bar-chart ${buckets.length>9?'dense':''}" style="height:${H}px">
      ${buckets.map((b,i)=>`<div class="bar${timeHistSel===i?' sel':''}" onclick="event.stopPropagation();selectTimeBar(${i})"><div class="fill" style="height:${Math.round(b.sec/maxS*(H-14))}px"></div><span>${b.label}</span></div>`).join('')}
    </div></div>
    <div style="text-align:center;color:var(--ink-1);font-weight:800;font-size:1.15rem;margin-top:30px">合計 ${fmtMin(totSec)}</div>
    <div style="text-align:center;color:var(--ink-3);font-size:.78rem;margin-top:3px">期間の総学習時間</div>
  </div>
  <div style="color:var(--ink-3);font-size:.72rem;text-align:center;margin-top:14px">1週間＝日別 ・ 1〜3か月＝週別 ・ 6か月以上＝月別で集計</div>
  </div>`;
}

function setTimeHistPeriod(p){ timeHistPeriod=p; timeHistSel=null; openModal(studyTimeHistoryHtml()); }
function selectTimeBar(i){ timeHistSel=(timeHistSel===i)?null:i; openModal(studyTimeHistoryHtml()); }

function init(){
  load();
  if(!state.seeded) seed();
  ensureThreads();
  applyTheme();
  // tab bar
  document.querySelectorAll('.tabbar button').forEach(b=>{
    b.addEventListener('click',()=>setTab(b.dataset.tab));
  });
  // modal close on backdrop
  document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });
  // build settings once (it's rendered on demand too)
  renderSettings();
  renderHome();
  handleCheckoutReturn();
  cloudInit();
  // register a tiny service worker for offline (best-effort, ignored on file://)
  if('serviceWorker' in navigator && location.protocol==='https:'){
    const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',()=>{});`;
    try{
      const url=URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}));
      navigator.serviceWorker.register(url).catch(()=>{});
    }catch(e){}
  }
}
init();
